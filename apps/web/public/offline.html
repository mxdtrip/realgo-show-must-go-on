<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Нет соединения · Engram</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(130% 70% at 50% -10%, rgba(56, 139, 253, 0.1), transparent 62%),
          #0d1117;
        color: #e6edf3;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: min(420px, 100%);
        text-align: center;
        padding: 32px 28px 28px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        background: rgba(22, 27, 34, 0.72);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 24px 60px -50px rgba(1, 4, 9, 0.92);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.02em;
      }
      .brand::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 3px;
        background: #2f81f7;
        box-shadow: 0 0 0 1px rgba(56, 139, 253, 0.35);
      }
      h1 {
        margin: 22px 0 8px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 auto;
        max-width: 320px;
        color: #7d8590;
        font-size: 14px;
        line-height: 1.5;
      }
      button {
        margin-top: 24px;
        width: 100%;
        padding: 12px 16px;
        border: 0;
        border-radius: 10px;
        background: #2f81f7;
        color: #fff;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 13.5px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        transition: background 0.18s ease;
      }
      button:hover {
        background: #58a6ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">Engram</div>
      <h1>Нет соединения</h1>
      <p>Похоже, вы офлайн. Проверьте интернет — Engram продолжит работу, как только связь восстановится.</p>
      <button type="button" onclick="location.reload()">Повторить</button>
    </main>
  </body>
</html>
