# frp client (home side). Dials out to the VPS running frps and exposes the local
# caddy:80 back through the tunnel. Values come from the environment (see the frpc
# service in docker-compose.yml). No inbound ports are opened at home.
serverAddr = "{{ .Envs.FRP_VPS_HOST }}"
serverPort = 7000
loginFailExit = false

auth.method = "token"
auth.token = "{{ .Envs.FRP_TOKEN }}"

transport.tls.enable = true
# Reconnect keepalive so the tunnel survives NAT/idle drops.
transport.heartbeatInterval = 20
transport.heartbeatTimeout = 60

# Expose the home caddy (which splits /api -> api and everything else -> web) as a
# TCP proxy the VPS binds on 127.0.0.1:8080 and reverse-proxies realgo.dev into.
[[proxies]]
name = "realgo-web"
type = "tcp"
localIP = "caddy"
localPort = 80
remotePort = 8080

# Reverse SSH into the homeserver itself (not the appbox container running this
# frpc), so it stays reachable once off the home LAN. Published on the VPS at
# remotePort 2222 -- requires that port open in the VPS firewall (see frps.toml
# docker-compose.yml comment).
[[proxies]]
name = "homeserver-ssh"
type = "tcp"
localIP = "192.168.0.160"
localPort = 22
remotePort = 2222
