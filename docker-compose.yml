# Local dev stack and server deployment for the FreeBurger API.
#
# The deploy workflow on `main` runs `docker compose up -d --build` from the
# repository root, so this file is the single source of truth for both the
# local environment and the appbox server. Dev-friendly defaults are inlined;
# on the server, override secrets via environment or a root .env file.

name: freeburger

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-freeburger}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-freeburger}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job: applies all up-migrations, then exits. The api waits for it to
  # finish successfully before starting.
  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/api/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-freeburger}?sslmode=disable"
      - "up"
    restart: "no"

  seed-roadmap:
    image: python:3.12-slim
    depends_on:
      migrate:
        condition: service_completed_successfully
    working_dir: /seeds
    volumes:
      - ./services/api/seeds:/seeds:ro
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-freeburger}?sslmode=disable
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python seed_roadmap.py neetcode_150.yaml"
    restart: "no"

  seed-cards:
    image: python:3.12-slim
    depends_on:
      seed-roadmap:
        condition: service_completed_successfully
    working_dir: /seeds
    volumes:
      - ./services/api/seeds:/seeds:ro
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-freeburger}?sslmode=disable
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python seed_cards.py realgo_demo_cards.yaml"
    restart: "no"

  seed-users:
    image: python:3.12-slim
    depends_on:
      seed-roadmap:
        condition: service_completed_successfully
    working_dir: /seeds
    volumes:
      - ./services/api/seeds:/seeds:ro
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-freeburger}?sslmode=disable
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python seed_users.py"
    restart: "no"

  # Production build of the realgo Next.js landing + cabinet. Served internally
  # on :3000; Caddy fronts it and routes /api/* to the Go api instead.
  web:
    build:
      context: ./apps/web
      args:
        # Empty = relative same-origin API calls (/api/v1/...). The browser hits
        # realgo.dev and Caddy proxies /api/* to the api container, so no CORS.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    restart: unless-stopped
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    environment:
      REALGO_EXTENSION_ORIGIN: ${REALGO_EXTENSION_ORIGIN:-chrome-extension://invalidextensionidorigin}
    ports:
      - "${API_PORT:-8080}:80"
    volumes:
      # The local/home stack is reached through the VPS edge Caddy, so it must
      # listen plainly on :80 and not try to issue a public cert itself.
      - ./Caddyfile.internal:/etc/caddy/Caddyfile:ro

  # Reverse tunnel to the VPS. The home connection is CGNAT'd (no inbound public
  # IP) and the provider's DPI blocks Cloudflare, so instead of exposing anything
  # here we dial OUT to a cheap VPS running frps (see deploy/vps/). frpc registers
  # the local caddy:80 as a proxy that the VPS reaches back through this tunnel;
  # the VPS terminates TLS for realgo.dev and reverse-proxies into it. Pure
  # userspace TCP — no TUN/kernel modules (which the LXD host doesn't allow).
  frpc:
    image: snowdreamtech/frpc:0.61.1
    restart: unless-stopped
    depends_on:
      - caddy
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml:ro
    environment:
      FRP_VPS_HOST: ${FRP_VPS_HOST:?FRP_VPS_HOST must be set}
      FRP_TOKEN: ${FRP_TOKEN:?FRP_TOKEN must be set}

  api:
    build:
      context: ./services/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      CONFIG_PATH: /app/config.yaml
      ADDRESS: 0.0.0.0:8080
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-freeburger}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET must be set}
      AUTH_ACCESS_TTL: ${AUTH_ACCESS_TTL:-15m}
      AUTH_REFRESH_TTL: ${AUTH_REFRESH_TTL:-720h}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
    expose:
      - "8080"

volumes:
  pgdata:
