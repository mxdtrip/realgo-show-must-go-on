# Local dev stack and server deployment for the FreeBurger API.
#
# The deploy workflow on `main` runs `docker compose up -d --build` from the
# repository root, so this file is the single source of truth for both the
# local environment and the appbox server. Dev-friendly defaults are inlined;
# on the server, override secrets via environment or a root .env file.

name: freeburger

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-freeburger}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-freeburger}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job: applies all up-migrations, then exits. The api waits for it to
  # finish successfully before starting.
  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/api/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-freeburger}?sslmode=disable"
      - "up"
    restart: "no"

  seed-roadmap:
    image: python:3.12-slim
    depends_on:
      migrate:
        condition: service_completed_successfully
    working_dir: /seeds
    volumes:
      - ./services/api/seeds:/seeds:ro
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-freeburger}?sslmode=disable
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python seed_roadmap.py neetcode_150.yaml"
    restart: "no"

  seed-cards:
    image: python:3.12-slim
    depends_on:
      seed-roadmap:
        condition: service_completed_successfully
    working_dir: /seeds
    volumes:
      - ./services/api/seeds:/seeds:ro
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-freeburger}?sslmode=disable
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python seed_cards.py realgo_demo_cards.yaml"
    restart: "no"

  seed-users:
    image: python:3.12-slim
    depends_on:
      seed-roadmap:
        condition: service_completed_successfully
    working_dir: /seeds
    volumes:
      - ./services/api/seeds:/seeds:ro
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-freeburger}?sslmode=disable
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python seed_users.py"
    restart: "no"

  # Production build of the realgo Next.js landing + cabinet. Served internally
  # on :3000; Caddy fronts it and routes /api/* to the Go api instead.
  web:
    build:
      context: ./apps/web
      args:
        # Empty = relative same-origin API calls (/api/v1/...). The browser hits
        # realgo.dev and Caddy proxies /api/* to the api container, so no CORS.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    restart: unless-stopped
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    environment:
      REALGO_EXTENSION_ORIGIN: ${REALGO_EXTENSION_ORIGIN:-chrome-extension://invalidextensionidorigin}
    ports:
      - "${API_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  # VPN gateway. The provider applies SNI-based DPI to Cloudflare, so a plain
  # tunnel to the CF edge (port 7844) never carries data. sing-box tunnels
  # outbound TCP through a VLESS/Reality subscription (port 443, indistinguishable
  # from normal HTTPS), and an iptables transparent redirect sends cloudflared's
  # edge traffic through it. See vpngw/. Requires the subscription URL.
  vpngw:
    build:
      context: ./vpngw
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      VPN_SUB_URL: ${VPN_SUB_URL:?VPN_SUB_URL must be set}
    # Healthy only once traffic actually egresses through the VLESS tunnel: this
    # curl runs in vpngw's netns and is itself redirected through sing-box.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "8", "-o", "/dev/null", "https://www.gstatic.com/generate_204"]
      interval: 15s
      timeout: 12s
      retries: 20
      start_period: 25s

  # Cloudflare Tunnel: exposes the stack on realgo.dev without opening any inbound
  # ports. Its public hostname realgo.dev -> http://caddy:80 is set in the CF
  # dashboard; the tunnel token goes in CLOUDFLARE_TUNNEL_TOKEN. cloudflared shares
  # vpngw's network namespace so its edge traffic rides the VLESS tunnel above.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: "service:vpngw"
    depends_on:
      vpngw:
        condition: service_healthy
      caddy:
        condition: service_started
    # http2 (TCP) transport: the redirect only captures TCP, and QUIC/UDP to the
    # edge is blocked anyway.
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set}

  api:
    build:
      context: ./services/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      CONFIG_PATH: /app/config.yaml
      ADDRESS: 0.0.0.0:8080
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-freeburger}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET must be set}
      AUTH_ACCESS_TTL: ${AUTH_ACCESS_TTL:-15m}
      AUTH_REFRESH_TTL: ${AUTH_REFRESH_TTL:-720h}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
    expose:
      - "8080"

volumes:
  pgdata:
