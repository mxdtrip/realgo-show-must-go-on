name: Diag
on:
  workflow_dispatch:
  push:
    branches: [feat/web-auth-bypass]
    paths: ['.github/workflows/diag.yml']
concurrency:
  group: diag
  cancel-in-progress: true
jobs:
  diag:
    runs-on: [self-hosted, linux, appbox]
    steps:
      - name: Inspect stack
        run: |
          echo "===== containers ====="
          docker ps -a --format '{{.Names}}\t{{.Status}}'
          echo "===== cloudflared (edge) ====="
          docker logs freeburger-cloudflared-1 --tail 60 2>&1 | tail -60 || echo "(no cloudflared container)"
          echo "===== web (next start) ====="
          docker logs freeburger-web-1 --tail 25 2>&1 | tail -25 || echo "(no web container)"
          echo "===== caddy ====="
          docker logs freeburger-caddy-1 --tail 25 2>&1 | tail -25 || echo "(no caddy container)"
          echo "===== api ====="
          docker logs freeburger-api-1 --tail 20 2>&1 | tail -20 || echo "(no api container)"
      - name: Network probes
        run: |
          echo "===== cloudflared -> caddy:80 (the 502 suspect) ====="
          docker exec freeburger-cloudflared-1 sh -c 'wget -qO- -T5 -S http://caddy:80/ 2>&1 | head -20' 2>&1 || echo "(cloudflared has no wget/shell)"
          echo "===== which network is cloudflared vs caddy on ====="
          docker inspect -f '{{.Name}} nets={{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' freeburger-cloudflared-1 freeburger-caddy-1 freeburger-web-1 2>&1 || true
          echo "===== can cloudflared even resolve caddy? ====="
          docker exec freeburger-cloudflared-1 sh -c 'nslookup caddy 2>&1 || getent hosts caddy 2>&1 || echo no-resolver' 2>&1 || true
          echo "===== host -> caddy publish :8080 ====="
          curl -sS -o /dev/null -w "localhost:8080/ -> %{http_code}\n" --max-time 8 http://localhost:8080/ 2>&1 || true
          echo "===== recent cloudflared log (http2 registered?) ====="
          docker logs freeburger-cloudflared-1 --tail 25 2>&1 | tail -25 || true
