name: Diag
on:
  workflow_dispatch:
  push:
    branches: [feat/web-auth-bypass]
    paths: ['.github/workflows/diag.yml']
concurrency:
  group: diag
  cancel-in-progress: true
jobs:
  diag:
    runs-on: [self-hosted, linux, appbox]
    steps:
      - name: Verify resilience
        run: |
          echo "===== restart policies now ====="
          docker inspect -f '{{.Name}} restart={{.HostConfig.RestartPolicy.Name}}' $(docker ps -q) 2>&1 | sort
          echo "===== runner auto-start on boot? ====="
          systemctl is-enabled actions.runner.mxdtrip-freeburger.appbox.service 2>&1 | sed 's/^/runner is-enabled: /' || true
