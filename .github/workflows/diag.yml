name: Diag
on:
  workflow_dispatch:
  push:
    branches: [feat/web-auth-bypass]
    paths: ['.github/workflows/diag.yml']
concurrency:
  group: diag
  cancel-in-progress: true
jobs:
  diag:
    runs-on: [self-hosted, linux, appbox]
    steps:
      - name: iptables NAT capability (transparent proxy path, no TUN)
        run: |
          echo "===== can a NET_ADMIN container use iptables -t nat REDIRECT? ====="
          docker run --rm --cap-add=NET_ADMIN alpine sh -c '
            apk add --no-cache iptables >/dev/null 2>&1
            iptables -t nat -N REDSOCKS 2>&1 && echo "NAT chain create OK" || echo "NAT chain create FAILED"
            iptables -t nat -A REDSOCKS -p tcp -j REDIRECT --to-ports 12345 2>&1 && echo "NAT REDIRECT rule OK" || echo "NAT REDIRECT rule FAILED"
            iptables -t nat -A OUTPUT -p tcp -j REDSOCKS 2>&1 && echo "NAT OUTPUT hook OK" || echo "NAT OUTPUT hook FAILED"
            iptables -t nat -L -n 2>&1 | head -5
          ' 2>&1 || echo "(container failed)"
          echo "===== nf_conntrack / nat modules loaded on host? ====="
          lsmod 2>/dev/null | grep -E "nf_nat|nf_conntrack|iptable_nat" | head -5 || echo "(cannot read lsmod)"
