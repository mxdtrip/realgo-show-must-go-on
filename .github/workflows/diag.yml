name: Diag
on:
  workflow_dispatch:
  push:
    branches: [feat/web-auth-bypass]
    paths: ['.github/workflows/diag.yml']
concurrency:
  group: diag
  cancel-in-progress: true
jobs:
  diag:
    runs-on: [self-hosted, linux, appbox]
    steps:
      - name: Inspect stack
        run: |
          echo "===== containers ====="
          docker ps -a --format '{{.Names}}\t{{.Status}}'
          echo "===== cloudflared (edge) ====="
          docker logs freeburger-cloudflared-1 --tail 60 2>&1 | tail -60 || echo "(no cloudflared container)"
          echo "===== web (next start) ====="
          docker logs freeburger-web-1 --tail 25 2>&1 | tail -25 || echo "(no web container)"
          echo "===== caddy ====="
          docker logs freeburger-caddy-1 --tail 25 2>&1 | tail -25 || echo "(no caddy container)"
          echo "===== api ====="
          docker logs freeburger-api-1 --tail 20 2>&1 | tail -20 || echo "(no api container)"
      - name: Network probes
        run: |
          echo "===== outbound 7844 to CF edge (from a docker container on appbox) ====="
          docker run --rm alpine sh -c 'apk add --no-cache netcat-openbsd >/dev/null 2>&1; for ip in 198.41.192.227 198.41.200.113; do nc -vz -w5 $ip 7844 && echo "  OK $ip:7844" || echo "  FAIL $ip:7844"; done' 2>&1 || true
          echo "===== caddy -> web:3000 reachable? ====="
          docker exec freeburger-caddy-1 sh -c 'wget -qO- -T5 http://web:3000/ >/dev/null 2>&1 && echo "caddy CAN reach web:3000" || echo "caddy CANNOT reach web:3000"' 2>&1 || true
          echo "===== web direct 200? (host -> web via caddy publish :8080) ====="
          curl -sS -o /dev/null -w "localhost:8080/ -> %{http_code}\n" --max-time 8 http://localhost:8080/ 2>&1 || true
