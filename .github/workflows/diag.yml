name: Diag
on:
  workflow_dispatch:
  push:
    branches: [feat/web-auth-bypass]
    paths: ['.github/workflows/diag.yml']
concurrency:
  group: diag
  cancel-in-progress: true
jobs:
  diag:
    runs-on: [self-hosted, linux, appbox]
    steps:
      - name: Inspect stack
        run: |
          echo "===== containers ====="
          docker ps -a --format '{{.Names}}\t{{.Status}}'
          echo "===== cloudflared (edge) ====="
          docker logs freeburger-cloudflared-1 --tail 60 2>&1 | tail -60 || echo "(no cloudflared container)"
          echo "===== web (next start) ====="
          docker logs freeburger-web-1 --tail 25 2>&1 | tail -25 || echo "(no web container)"
          echo "===== caddy ====="
          docker logs freeburger-caddy-1 --tail 25 2>&1 | tail -25 || echo "(no caddy container)"
          echo "===== api ====="
          docker logs freeburger-api-1 --tail 20 2>&1 | tail -20 || echo "(no api container)"
      - name: Network probes
        run: |
          echo "===== FRESH cloudflared log (last 50, look for terminated/lost) ====="
          docker logs freeburger-cloudflared-1 --since 3m 2>&1 | tail -50 || true
          echo "===== count registered vs terminated in full log ====="
          echo "Registered: $(docker logs freeburger-cloudflared-1 2>&1 | grep -c 'Registered tunnel connection')"
          echo "Terminated: $(docker logs freeburger-cloudflared-1 2>&1 | grep -c 'Connection terminated')"
          echo "LostEdge:   $(docker logs freeburger-cloudflared-1 2>&1 | grep -c 'Lost connection with edge')"
          echo "===== add a diag container with curl, hit the tunnel path locally ====="
          docker run --rm --network freeburger_default curlimages/curl:latest -sS -o /dev/null -w "curl caddy:80/ -> %{http_code}\n" --max-time 8 http://caddy:80/ 2>&1 || true
          docker run --rm --network freeburger_default curlimages/curl:latest -sS -o /dev/null -w "curl caddy:80/api/v1/health -> %{http_code}\n" --max-time 8 http://caddy:80/api/v1/health 2>&1 || true
