name: Diag
on:
  workflow_dispatch:
  push:
    branches: [feat/web-auth-bypass]
    paths: ['.github/workflows/diag.yml']
concurrency:
  group: diag
  cancel-in-progress: true
jobs:
  diag:
    runs-on: [self-hosted, linux, appbox]
    steps:
      - name: TUN + NET_ADMIN availability (for VPN wrap)
        run: |
          echo "===== /dev/net/tun present on the appbox host? ====="
          ls -l /dev/net/tun 2>&1 || echo "NO /dev/net/tun on host"
          echo "===== can a docker container get a TUN device? ====="
          docker run --rm --cap-add=NET_ADMIN --device /dev/net/tun:/dev/net/tun alpine sh -c '
            ls -l /dev/net/tun 2>&1 || echo "no /dev/net/tun in container";
            ip tuntap add mode tun dev tuntest 2>&1 && echo "TUN CREATE OK" && ip link del tuntest || echo "TUN CREATE FAILED"
          ' 2>&1 || echo "(container could not start with NET_ADMIN/tun)"
          echo "===== does the LXD container allow tun char device at all? ====="
          cat /proc/sys/net/ipv4/ip_forward 2>&1 | sed 's/^/ip_forward=/'
          echo "===== outbound TCP 443 to a VLESS endpoint host (maxonelove.com) works? ====="
          docker run --rm alpine sh -c 'apk add --no-cache netcat-openbsd bind-tools >/dev/null 2>&1; ip=$(nslookup afawc124.maxonelove.com 2>/dev/null | awk "/^Address: /{print \$2; exit}"); echo "resolved=$ip"; nc -vz -w6 afawc124.maxonelove.com 443 && echo VLESS443 OK || echo VLESS443 FAIL' 2>&1 || true
