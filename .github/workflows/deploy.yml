name: Deploy
on:
  push:
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      mode:
        description: "'deploy' (default) rebuilds and restarts; 'logs' only tails the running api container, no rebuild"
        required: false
        default: "deploy"
      grep:
        description: "logs mode only: case-insensitive pattern to filter for (empty = full tail)"
        required: false
        default: "ai:"
      since:
        description: "logs mode only: how far back to look (docker --since duration, e.g. 10m, 1h)"
        required: false
        default: "15m"
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: [self-hosted, linux, appbox]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Build & start
        if: github.event_name != 'workflow_dispatch' || inputs.mode != 'logs'
        env:
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          FRP_VPS_HOST: ${{ secrets.FRP_VPS_HOST }}
          FRP_TOKEN: ${{ secrets.FRP_TOKEN }}
          # Password for the re-seeded demo accounts. Optional: when the secret
          # is unset the seed falls back to its local default (see DEMO.md).
          SEED_USERS_PASSWORD: ${{ secrets.SEED_USERS_PASSWORD }}
          # Gemini key for AI card generation. Optional: when unset the api
          # boots normally with generation disabled.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          docker compose pull --ignore-buildable || true
          docker compose --profile prod-demo up -d --build --remove-orphans
      - name: Verify AI wiring
        if: github.event_name != 'workflow_dispatch' || inputs.mode != 'logs'
        run: |
          sleep 3
          # Plain `docker logs` by container name — NOT `docker compose logs`,
          # which re-parses the whole compose file (and would fail here the
          # same way `docker compose ps`/`logs` do in any step that lacks the
          # secrets env block from "Build & start": every docker-compose.yml
          # variable, not just the ones this step cares about, must resolve).
          container=$(docker ps --filter "name=freeburger-api-1" --format "{{.Names}}" | head -n1)
          if [ -z "$container" ]; then
            echo "api container not found by name filter"
          else
            docker logs "$container" --since 60s 2>&1 | grep -i "ai features" || echo "no 'ai features' log line found — api may still be starting"
          fi
      - name: Tail logs on demand
        # Lets a stuck/failed request be inspected without rebuilding — a
        # rebuild recreates the api container and its log buffer, which would
        # destroy the very evidence we're trying to look at.
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'logs'
        run: |
          container=$(docker ps --filter "name=freeburger-api-1" --format "{{.Names}}" | head -n1)
          if [ -z "$container" ]; then
            echo "api container not found by name filter"
            exit 0
          fi
          pattern='${{ inputs.grep }}'
          since='${{ inputs.since }}'
          if [ -z "$pattern" ]; then
            docker logs "$container" --since "$since" 2>&1 | tail -n 200
          else
            docker logs "$container" --since "$since" 2>&1 | grep -i -- "$pattern" | tail -n 200 || echo "no lines matched '$pattern' in the last $since"
          fi
      - name: Prune old images
        if: github.event_name != 'workflow_dispatch' || inputs.mode != 'logs'
        run: docker image prune -f
