name: Deploy
on:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: [self-hosted, linux, appbox]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (auto-skips until compose exists)
        run: |
          if ls docker-compose.yml compose.yaml compose.yml docker-compose.yaml >/dev/null 2>&1; then
            echo "Compose file found — deploying."
            docker compose pull --ignore-buildable || true
            docker compose up -d --build --remove-orphans
            docker image prune -f
          else
            echo "Compose-файла пока нет — деплой пропущен, конвейер OK."
          fi
