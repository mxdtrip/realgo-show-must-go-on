name: Deploy prod
# Prod auto-deploy for the realgo-show-must-go-on fork: every push to main
# rebuilds the shared "freeburger" compose project on appbox — the same
# project name/containers realgo.dev has always been served from, now built
# from this repo instead. mxdtrip/freeburger stays untouched; its own
# deploy runner is stopped (see project notes).
#
# Separate file from deploy.yml on purpose: that one already owns push:[dev]
# for the staging stack (docker-compose.staging.yml) and is working — this
# file only touches main, so it can't collide with or break it.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "'deploy' (default) rebuilds and restarts; 'logs' tails the running api container; 'curl' probes Groq connectivity from the same docker network"
        required: false
        default: "deploy"
      grep:
        description: "logs mode only: case-insensitive pattern to filter for (empty = full tail)"
        required: false
        default: "ai:"
      since:
        description: "logs mode only: how far back to look (docker --since duration, e.g. 10m, 1h)"
        required: false
        default: "15m"
concurrency:
  group: deploy-prod
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: [self-hosted, linux, appbox]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Build & start
        if: github.event_name != 'workflow_dispatch' || (inputs.mode != 'logs' && inputs.mode != 'curl')
        env:
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          FRP_VPS_HOST: ${{ secrets.FRP_VPS_HOST }}
          FRP_TOKEN: ${{ secrets.FRP_TOKEN }}
          # Password for the re-seeded demo accounts. Optional: when the secret
          # is unset the seed falls back to its local default (see DEMO.md).
          SEED_USERS_PASSWORD: ${{ secrets.SEED_USERS_PASSWORD }}
          # Gemini key for AI card generation. Optional: when unset the api
          # boots normally with generation disabled.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # VLESS subscription for the vpngw gateway (api shares its netns so
          # Groq calls ride this tunnel instead of the ISP's flagged egress).
          VPN_SUB_URL: ${{ secrets.VPN_SUB_URL }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull --ignore-buildable || true
          docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod-demo up -d --build --remove-orphans
      - name: Verify AI wiring
        if: github.event_name != 'workflow_dispatch' || (inputs.mode != 'logs' && inputs.mode != 'curl')
        run: |
          sleep 3
          # Plain `docker logs` by container name — NOT `docker compose logs`,
          # which re-parses the whole compose file (and would fail here the
          # same way `docker compose ps`/`logs` do in any step that lacks the
          # secrets env block from "Build & start": every docker-compose.yml
          # variable, not just the ones this step cares about, must resolve).
          container=$(docker ps --filter "name=freeburger-api-1" --format "{{.Names}}" | head -n1)
          if [ -z "$container" ]; then
            echo "api container not found by name filter"
          else
            docker logs "$container" --since 60s 2>&1 | grep -i "ai features" || echo "no 'ai features' log line found — api may still be starting"
          fi
      - name: Tail logs on demand
        # Lets a stuck/failed request be inspected without rebuilding — a
        # rebuild recreates the api container and its log buffer, which would
        # destroy the very evidence we're trying to look at.
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'logs'
        run: |
          container=$(docker ps --filter "name=freeburger-api-1" --format "{{.Names}}" | head -n1)
          if [ -z "$container" ]; then
            echo "api container not found by name filter"
            exit 0
          fi
          pattern='${{ inputs.grep }}'
          since='${{ inputs.since }}'
          if [ -z "$pattern" ]; then
            docker logs "$container" --since "$since" 2>&1 | tail -n 200
          else
            docker logs "$container" --since "$since" 2>&1 | grep -i -- "$pattern" | tail -n 200 || echo "no lines matched '$pattern' in the last $since"
          fi
      - name: Probe Groq connectivity
        # Repeated 403 Forbidden from Groq across two different keys and two
        # different models, from both this network and the RuVDS VPS, pointed
        # to Cloudflare bot-managing this IP/ASN space rather than anything
        # wrong in the request — hence vpngw's VLESS tunnel. This probe joins
        # vpngw's netns directly so it's subject to the same iptables egress
        # redirect api's traffic is, confirming the tunnel actually routes
        # around the block (expect 200 here, not 403).
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'curl'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # api has no network attachment of its own (network_mode: service:vpngw),
          # so join vpngw's netns directly — that's the only way this probe is
          # actually subject to the same iptables tunnel redirect api's traffic is.
          container=$(docker ps --filter "name=freeburger-vpngw-1" --format "{{.Names}}" | head -n1)
          if [ -z "$container" ]; then
            echo "vpngw container not found by name filter"
            exit 0
          fi
          echo "Joining netns of: $container"
          docker run --rm --network "container:$container" -e GEMINI_API_KEY curlimages/curl:8.11.0 sh -c '
            curl -sS -D - -o /tmp/body \
              -X POST https://api.groq.com/openai/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "User-Agent: realgo-assistant/1.0 (+https://realgo.dev)" \
              -H "Authorization: Bearer $GEMINI_API_KEY" \
              -d "{\"model\":\"llama-3.3-70b-versatile\",\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}]}"
            echo "--- body ---"
            cat /tmp/body
          ' 2>&1 || true
      - name: Prune old images
        if: github.event_name != 'workflow_dispatch' || (inputs.mode != 'logs' && inputs.mode != 'curl')
        run: docker image prune -f
