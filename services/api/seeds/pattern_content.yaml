code: realgo_pattern_content
title: realgo Pattern Content
patterns:
  # Reference patterns — full methodology (description, techniques,
  # recognition symptoms, checklist). Written first so the team can review
  # tone and depth before the rest are drafted.
  - code: two_pointers
    description: >-
      Два индекса двигаются по одной структуре навстречу друг другу или
      в одном направлении, вместо перебора всех пар элементов явно.
      Экономит проход: там, где напрашивается O(n²), обычно получается O(n).
    techniques:
      - "Opposite pointers"
      - "Same-direction pointers"
      - "Fast / slow pointers"
      - "Partitioning"
    recognition_symptoms:
      - "Массив или строка отсортированы (или их легко отсортировать), и нужна пара/тройка с заданной суммой, разностью или условием сравнения."
      - "Формулировка похожа на «удалить дубликаты на месте», «развернуть», «сжать массив без лишней памяти»."
      - "Нужно сравнить элементы с обоих концов структуры — палиндром, «контейнер с водой»."
      - "Есть связный список и вопрос про середину, цикл или N-й элемент с конца — это fast/slow вариант."
    checklist:
      - "Явно проговори условие движения каждого указателя: что происходит при встрече left и right, и почему двигаем именно этот, а не тот."
      - "Проверь, отсортированы ли данные — opposite pointers почти всегда требуют сортировки или монотонности."
      - "Для fast/slow отдельно продумай, что означает встреча указателей: найден цикл или найдена середина."

  - code: sliding_window
    description: >-
      Окно [left, right] скользит по массиву или строке, расширяясь и
      сужаясь по условию, вместо пересчёта суммы или множества с нуля на
      каждом шаге. Даёт O(n) там, где наивный перебор всех подотрезков — O(n²).
    techniques:
      - "Fixed window"
      - "Dynamic window"
      - "At most K"
      - "Exactly K через atMost"
      - "Min window"
    recognition_symptoms:
      - "В задаче явно или неявно есть «подмассив/подстрока длины k» или «максимальный/минимальный подотрезок, удовлетворяющий условию»."
      - "Условие окна монотонно: как только оно перестаёт выполняться, дальнейшее расширение только ухудшает ситуацию — можно сужать, не пересматривая всё заново."
      - "В тексте задачи мелькают «at most», «exactly», «contains all», «longest/shortest substring/subarray»."
    checklist:
      - "Сформулируй инвариант окна словами до кода: что именно должно быть true для [left, right] всё время."
      - "Реши заранее, что сдвигает right (обычно всегда), а что запускает сдвиг left — это и есть момент shrink."
      - "Задачи на «exactly K» почти всегда чище решаются как atMost(K) − atMost(K-1), а не отдельной логикой."

  - code: binary_search
    description: >-
      Пространство ответов сокращается вдвое на каждом шаге за счёт
      монотонного предиката: если условие ложно в точке x, оно остаётся
      ложным (или истинным) по одну сторону от x на всём диапазоне.
    techniques:
      - "Classic search"
      - "Lower / upper bound"
      - "Binary search on answer"
      - "Rotated array"
    recognition_symptoms:
      - "Данные отсортированы, либо ответ на вопрос «подходит ли x?» монотонен (да…да…нет…нет), даже если сам массив не отсортирован."
      - "В условии просят минимальное/максимальное значение, удовлетворяющее ограничению — сигнал «binary search on answer», а не перебор."
      - "Массив отсортирован, но повёрнут (rotated) — обычный поиск сломается на границе поворота."
    checklist:
      - "Прежде чем писать цикл, сформулируй predicate can(x) и убедись, что он монотонен на всём диапазоне."
      - "Реши заранее, что возвращаешь при lo == hi — в этом разница между lower_bound и upper_bound."
      - "Для rotated array сначала определи, какая половина точно отсортирована, и только потом сравнивай target с её границами."

  # Остальные паттерны — краткое описание и техники уже заполнены (взято из
  # рабочей таблицы), symptoms/checklist пока пустые до ревью референсных.
  - code: arrays_hashing
    description: >-
      Hash map используется, чтобы за O(1) проверять принадлежность,
      считать частоты или искать дополняющее значение, вместо повторного
      перебора массива.
    techniques:
      - "Hash map lookup"
      - "Frequency map"
      - "Prefix sum"
      - "Difference array"
      - "Counting"
      - "Bucketization"
    recognition_symptoms: []
    checklist:
      - "Прежде чем писать код, ответь: что я кеширую в hash map и что здесь является ключом?"

  - code: stack
    description: >-
      Стек накапливает ещё не обработанные до конца элементы (незакрытые
      скобки, ещё не найденный «следующий больший») и разбирает их в
      порядке LIFO, когда приходит элемент, который их «завершает».
    techniques:
      - "Monotonic stack"
      - "Parentheses"
      - "Expression eval"
      - "Next greater/smaller"
    recognition_symptoms: []
    checklist:
      - "Прежде чем начать, определи, что именно хранит стек — индексы, значения или состояния: это меняет всю логику."

  - code: linked_list
    description: >-
      Задачи на связный список решаются перестановкой указателей next
      (реверс, слияние, обнаружение цикла), где главная сложность — не
      потерять ссылку на остаток списка в момент переключения.
    techniques:
      - "Reverse"
      - "Merge"
      - "Cycle"
      - "Dummy node"
      - "Two pointers"
    recognition_symptoms: []
    checklist:
      - "Перед изменением ссылок отметь, где заводишь dummy-узел — большинство багов здесь из-за потерянного prev/next в момент переключения."

  - code: trees
    description: >-
      Большинство задач на деревья — это обход (DFS в одном из трёх
      порядков или BFS по уровням) с накоплением результата либо на пути
      вниз, либо в значении, возвращаемом из рекурсии наверх.
    techniques:
      - "DFS preorder/inorder/postorder"
      - "BFS levels"
      - "LCA"
      - "Tree DP"
      - "BST invariants"
    recognition_symptoms: []
    checklist:
      - "Перед тем как писать рекурсию, ответь: что именно она возвращает наверх — значение, факт (bool) или структуру с несколькими полями?"

  - code: heap
    description: >-
      Куча поддерживает быстрый доступ к минимуму/максимуму при
      поступающих по одному элементах — решает top-K, потоковую медиану и
      слияние K отсортированных списков без полной пересортировки.
    techniques:
      - "Top K"
      - "Streaming median"
      - "K-way merge"
      - "Scheduling"
    recognition_symptoms: []
    checklist:
      - "Спроси себя, почему здесь heap лучше, чем просто отсортировать всё сразу — обычно дело в потоковых данных или в том, что нужен только top-K."

  - code: backtracking
    description: >-
      Перебор всех вариантов через рекурсию с явным «выбрал → рекурсия →
      отменил выбор», где pruning — единственное, что отличает решение за
      разумное время от полного перебора.
    techniques:
      - "Subsets"
      - "Permutations"
      - "Combinations"
      - "Word search"
      - "Pruning"
    recognition_symptoms: []
    checklist:
      - "Перед кодом распиши: что такое state, какие choice доступны на каждом шаге, какие constraints их отсекают, и как выглядит undo после вызова."

  - code: graphs
    description: >-
      Обход графа (DFS или BFS) по рёбрам между вершинами — для поиска
      связных компонент, кратчайшего пути без весов или циклов; выбор
      между DFS и BFS определяется тем, что именно нужно найти.
    techniques:
      - "DFS/BFS"
      - "Connected components"
      - "Shortest path unweighted"
      - "Cycle detection"
    recognition_symptoms: []
    checklist:
      - "Явно выдели три состояния вершины — не посещена / в процессе обхода / полностью обработана: путаница между ними — источник почти всех багов с циклами."

  - code: advanced_graphs
    description: >-
      Задачи со взвешенными или структурно сложными графами, где простого
      DFS/BFS недостаточно — нужен алгоритм под конкретное свойство:
      кратчайший путь с весами, минимальное остовное дерево, порядок с
      учётом зависимостей.
    techniques:
      - "Dijkstra"
      - "Bellman-Ford"
      - "Union-Find"
      - "MST"
      - "Topological sort"
    recognition_symptoms: []
    checklist:
      - "Определи тип графа (взвешенный? отрицательные веса? направленный?) и что именно оптимизируется — это и выбирает алгоритм."

  - code: dynamic_programming_1d
    description: >-
      Ответ для позиции i выражается через ответы для меньших индексов
      (i-1, i-2, …) — одномерный массив состояний, заполняемый один раз
      слева направо.
    techniques:
      - "Fibonacci style"
      - "House robber"
      - "LIS"
      - "Decode ways"
      - "State machine"
    recognition_symptoms: []
    checklist:
      - "Сформулируй dp[i] словами одной фразой ДО того, как писать переход — если не получается, значит состояние выбрано неверно."

  - code: dynamic_programming_2d
    description: >-
      Состояние описывается двумя измерениями (позиции в двух строках или
      диапазон [i,j]) — типично для сравнения последовательностей (LCS,
      edit distance) и интервальных задач.
    techniques:
      - "Grid DP"
      - "LCS"
      - "Edit distance"
      - "Interval DP"
      - "Knapsack"
    recognition_symptoms: []
    checklist:
      - "Определи не только dp[i][j], но и порядок заполнения таблицы — от него зависит, какие переходы уже посчитаны."

  - code: greedy
    description: >-
      На каждом шаге делается локально самый выгодный выбор без
      пересмотра предыдущих решений — работает только там, где можно
      доказать, что локальная оптимальность ведёт к глобальной.
    techniques:
      - "Sorting + local choice"
      - "Interval scheduling"
      - "Jump game"
      - "Heap-greedy"
    recognition_symptoms: []
    checklist:
      - "Не пиши код, пока не сможешь объяснить словами, почему локально лучший выбор не может ухудшить глобальный результат."

  - code: intervals
    description: >-
      Интервалы сортируются по началу или концу, после чего задача
      решается одним проходом с отслеживанием пересечений или
      объединением соседних интервалов.
    techniques:
      - "Merge"
      - "Insert"
      - "Sweep line"
      - "Meeting rooms"
    recognition_symptoms: []
    checklist:
      - "Сначала отсортируй интервалы по началу (или концу — по задаче), затем веди «активное множество» и обновляй его по мере прохода."

  - code: math_geometry
    description: >-
      Задача сводится к математической формуле или геометрическому
      свойству — сложность обычно не в алгоритме, а в правильном выводе
      формулы и граничных случаях.
    techniques:
      - "GCD"
      - "Modulo"
      - "Combinatorics"
      - "Line sweep"
      - "Coordinates"
    recognition_symptoms: []
    checklist:
      - "Прежде чем кодить, выпиши формулу на бумаге и отдельно проговори edge cases (деление на 0, пустой вход, переполнение)."

  - code: bit_manipulation
    description: >-
      Число рассматривается как набор битов, и операции (XOR, маски,
      сдвиги) заменяют более громоздкие структуры данных.
    techniques:
      - "XOR"
      - "Masks"
      - "Subsets"
      - "Bit DP"
    recognition_symptoms: []
    checklist:
      - "Проговори явно, что кодирует каждый бит битовой маски — без этого легко перепутать индекс бита с самим значением."

  - code: tries
    description: >-
      Дерево, где путь от корня — это последовательность символов, а не
      значений в узлах, что позволяет быстро искать по префиксу и делить
      работу между словами с общим началом.
    techniques:
      - "Prefix tree insert/search"
      - "Prefix counting"
      - "Word search II pruning"
    recognition_symptoms: []
    checklist:
      - "Реши, что именно нужно на конце слова — просто флаг «это слово» или ещё и счётчик/индекс: путаница здесь — частый источник багов."
