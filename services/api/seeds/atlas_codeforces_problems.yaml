# title+rating matches, 0 fabricated tags (see project notes).
# Unlike atlas_gfg_problems.yaml / atlas_corpus_problems.yaml, tier here is set
# explicitly (not NULL) — the source data already tiers each problem by rating
# band (foundational 800-1200 / core 1300-1700 / advanced 1800+), so these rows
# are curated from the start and protected from being overwritten the same way
# atlas_problem_links.yaml entries are (see seed_codeforces_corpus.py).
