# Realgo Taxonomy: методический материал субпаттернов.
# Канон v1 = realgo_72_subpatterns_full_methodology.md; 44 записи v2
# (потомки расформированных лейблов + gap-fill) = раздел 10 файла
# realgo_taxonomy_v2_22x111_gap_audit.md. Структура: что это -> как
# распознать -> ключевая механика -> инвариант -> canonical skeleton ->
# мини-пример. Extra-секции (anti_cues/common_mistakes/dont_confuse_with)
# добавляются руками и переживают перегенерацию.
code: realgo_atlas_content
title: Realgo Atlas Learning Materials
materials:
- code: frequency_map_counting
  what_it_is: |-
    Используется, когда важно знать, сколько раз встречается каждый элемент. Мы строим отображение value → count и затем принимаем решения на основе частот: сравниваем две строки, ищем наиболее частые элементы, проверяем анаграммы или контролируем состав текущего состояния.

    Ключевая особенность — нас интересует не просто факт наличия элемента, а его количество. Если достаточно ответа «есть / нет», чаще подходит Set и подпаттерн Membership & Deduplication.
  mental_model: |-
    Проходим данные и обновляем count[x]. Затем используем частоты напрямую либо сравниваем две карты. Если алфавит мал и фиксирован, массив счётчиков обычно проще Hash Map.
  recognition_cues:
  - нужно считать появления элементов
  - сравниваются частоты двух наборов/строк
  - ответ зависит от most/least frequent или точного количества
  core_invariant: |-
    После обработки первых i элементов count[x] равен точному числу появлений x в этом префиксе.
  canonical_skeleton: |-
    count = {}
    for x in data:
        count[x] = count.get(x, 0) + 1

    use(count)
  mini_example: |-
    В Valid Anagram считаем символы первой строки и уменьшаем счётчики по второй; все итоговые значения должны стать нулём.
- code: membership_deduplication
  what_it_is: |-
    Подходит для задач, где нужно быстро проверять, встречался ли элемент раньше, существует ли он в наборе или какие значения повторяются. Обычно используется Set, который хранит только факт присутствия без дополнительной информации о количестве.

    Типичные сценарии: поиск дубликатов, проверка уникальности, пересечение наборов, longest consecutive sequence. Главная мысль — заменить повторный линейный поиск быстрым membership-check.
  mental_model: |-
    Храним обработанные значения в seen. Перед добавлением проверяем наличие или используем множество для устранения повторов. Для задач вроде longest consecutive sequence полезно проверять соседние значения по ключу без сортировки.
  recognition_cues:
  - нужна проверка «видели ли уже x?»
  - ищутся дубликаты или уникальные значения
  - важен факт принадлежности, но не количество
  core_invariant: |-
    seen содержит ровно те значения из уже обработанной части, факт появления которых важен дальнейшему алгоритму.
  canonical_skeleton: |-
    seen = set()
    for x in data:
        if x in seen:
            handle_repeat(x)
        seen.add(x)
  mini_example: |-
    В Contains Duplicate первое значение, уже находящееся в seen, немедленно доказывает наличие дубликата.
- code: complement_lookup
  what_it_is: |-
    Используется, когда для текущего элемента можно вычислить конкретное связанное значение, необходимое для ответа. Классический пример: для числа x ищем target - x, вместо перебора всех пар.

    В Hash Map часто сохраняется не только значение, но и индекс или другая полезная информация. Подпаттерн особенно силён, когда условие пары или связи можно выразить простой формулой.
  mental_model: |-
    Для каждого x вычисляем need = f(x) и проверяем, встречался ли такой кандидат раньше. В map храним то, что потребуется для ответа: индекс, значение или лучшую метрику.
  recognition_cues:
  - для текущего x можно вычислить нужного партнёра
  - ищется пара/связь по формуле
  - вложенный перебор пар выглядит избыточным
  anti_cues:
  - Массив отсортирован и нужна пара — два указателя без памяти.
  - Нужны все пары с повторами — аккуратнее с частотами, не с множеством.
  core_invariant: |-
    Перед обработкой x map описывает только допустимых ранее обработанных кандидатов; поэтому найденный need образует корректную пару без повторного использования текущего элемента.
  canonical_skeleton: |-
    pos = {}
    for i, x in enumerate(data):
        need = target - x
        if need in pos:
            return pos[need], i
        pos[x] = i
  mini_example: |-
    В Two Sum для x = 7 при target = 10 ищем ранее увиденное 3, а не перебираем все предыдущие элементы.
  common_mistakes:
  - Вставка до проверки — элемент находит сам себя (x == target/2).
  - 'Потеря дубликатов: ключ перезаписан, а пара из двух одинаковых значений легальна.'
  - Ключ-float без нормализации.
  dont_confuse_with:
  - title: Opposite-Direction Pointers
    note: На отсортированном массиве пару ищут указатели без O(n) памяти. Hash-подход не требует сортировки, но платит памятью.
- code: opposite_direction_pointers
  what_it_is: |-
    Два указателя стартуют с противоположных концов диапазона и движутся навстречу друг другу. Подходит, когда сравнение текущей пары позволяет понять, какую сторону безопасно сдвинуть и тем самым исключить множество вариантов.

    Частые задачи: pair sum в отсортированном массиве, палиндромы, container with most water. Ключевое условие — должна существовать причина, почему движение конкретного указателя не пропустит лучший ответ.
  mental_model: |-
    Ставим left и right на края. По текущему условию двигаем только ту сторону, изменение которой может приблизить к цели или улучшить ответ. Это решение требует явного обоснования безопасного исключения вариантов.
  recognition_cues:
  - массив отсортирован или есть монотонная реакция на движение указателя
  - ищется пара с двух концов
  - сравниваются симметричные элементы
  core_invariant: |-
    После каждого сдвига все пары, использующие отброшенный край в исключённой области, доказуемо не могут дать ещё не рассмотренный подходящий/лучший ответ.
  canonical_skeleton: |-
    left, right = 0, n - 1
    while left < right:
        state = evaluate(a[left], a[right])
        if good(state): return answer
        if need_larger(state): left += 1
        else: right -= 1
  mini_example: |-
    В Two Sum II сумма мала — двигаем left, потому что при фиксированном левом элементе уменьшение right сумму не увеличит.
- code: same_direction_read_write
  what_it_is: |-
    Оба указателя движутся слева направо, но выполняют разные роли: один читает входные данные, другой показывает, куда записывать следующий подходящий элемент. Это позволяет преобразовывать массив на месте без дополнительной копии.

    Типичные задачи: remove duplicates, remove element, compact array. Подпаттерн полезен, когда нужно сохранить относительный порядок части элементов и одновременно «сжать» данные.
  mental_model: |-
    read просматривает каждый элемент, write указывает следующую позицию результата. Когда элемент принимается, записываем его в a[write] и увеличиваем write.
  recognition_cues:
  - нужно удалить/сжать элементы на месте
  - важно сохранить относительный порядок
  - есть поток «прочитать → при необходимости записать»
  core_invariant: |-
    После обработки позиции read префикс a[0:write] содержит ровно все принятые элементы обработанной части в правильном относительном порядке.
  canonical_skeleton: |-
    write = 0
    for read in range(n):
        if keep(a[read]):
            a[write] = a[read]
            write += 1
    return write
  mini_example: |-
    В Remove Duplicates from Sorted Array read сканирует массив, а write расширяет префикс уникальных значений.
- code: fast_slow_pointers
  what_it_is: |-
    Указатели движутся с разной скоростью или начинают движение в разные моменты. За счёт этого можно обнаруживать циклы, находить середину списка или определять специальные точки встречи.

    Классическая идея Floyd Cycle Detection: если цикл существует, быстрый указатель рано или поздно догонит медленный. Подпаттерн чаще всего встречается в linked list, но применим и к последовательностям переходов между состояниями.
  mental_model: |-
    Медленный указатель делает один шаг, быстрый — два. В цикле их относительная позиция меняется и они встретятся; без цикла быстрый достигнет конца. Вариация с одной/двумя скоростями также находит середину.
  recognition_cues:
  - linked list или повторяющиеся переходы next(state)
  - нужно найти цикл/середину
  - нельзя хранить все посещённые состояния
  anti_cues:
  - Есть случайный доступ по индексу — быстрее адресоваться напрямую.
  - Память не ограничена и множество посещённых проще и читабельнее.
  core_invariant: |-
    До завершения оба указателя следуют одной детерминированной цепочке переходов; если они оказываются в одном цикле, разность их позиций по модулю длины цикла неизбежно станет нулём.
  canonical_skeleton: |-
    slow = fast = head
    while fast and fast.next:
        slow = slow.next
        fast = fast.next.next
        if slow is fast:
            return True
    return False
  mini_example: |-
    В Linked List Cycle встреча slow и fast внутри цикла подтверждает, что список не заканчивается null.
  common_mistakes:
  - Проверка только fast без fast.next — NPE на чётной длине.
  - Старт fast с head.next меняет точку встречи — ломает фазу поиска входа в цикл.
  - 'Для середины: не решено заранее, какая из двух середин нужна при чётной длине.'
  dont_confuse_with:
  - title: Same-Direction Read/Write
    note: Там оба указателя идут с одной скоростью и разделяют «прочитано/записано». Здесь разность скоростей — суть приёма.
- code: fixed_size_window
  what_it_is: |-
    Используется, когда рассматриваемый непрерывный фрагмент всегда имеет известную длину k. При каждом сдвиге мы удаляем влияние элемента, который вышел слева, и добавляем новый элемент справа.

    Типичные задачи: максимальная сумма k подряд идущих элементов, среднее значение окна, поиск анаграмм фиксированной длины. Главное преимущество — каждый новый диапазон обновляется за O(1), а не пересчитывается заново.
  mental_model: |-
    Сначала накапливаем состояние окна, затем при каждом шаге добавляем новый правый элемент и удаляем левый, вышедший из диапазона. Полный пересчёт окна не нужен.
  recognition_cues:
  - непрерывный диапазон фиксированной длины k
  - нужно значение для каждого окна
  - соседние диапазоны отличаются одним ушедшим и одним новым элементом
  anti_cues:
  - Длина окна не фиксирована, а зависит от условия — это variable window.
  - Агрегат не поддерживается инкрементально (медиана — уже two heaps).
  core_invariant: |-
    В момент оценки state описывает ровно элементы текущего диапазона [left, right] длины k.
  canonical_skeleton: |-
    state = init()
    for right, x in enumerate(a):
        add(x)
        if right >= k: remove(a[right-k])
        if right >= k-1: update_answer(state)
  mini_example: |-
    В Maximum Average Subarray I поддерживаем сумму последних k элементов и обновляем её двумя операциями на сдвиг.
  common_mistakes:
  - Удаление a[i-k] вместо a[i-k] до/после добавления — сдвиг на единицу.
  - Ответ снят до того, как окно впервые заполнилось до k.
  - Пересоздание структуры окна на каждом шаге — теряется весь выигрыш.
  dont_confuse_with:
  - title: Longest Valid Variable Window
    note: Там размер окна — искомая величина. Здесь k дан, ищется агрегат.
- code: longest_valid_window
  what_it_is: |-
    Подходит для задач вида «найти самый длинный непрерывный фрагмент, удовлетворяющий ограничению». Правую границу обычно расширяют всегда, а левую двигают только тогда, когда текущее окно стало недопустимым.

    После восстановления допустимости окно снова является кандидатом на ответ. Частые ограничения: не более k различных символов, отсутствие повторов, ограниченное число замен.
  mental_model: |-
    Расширяем окно справа. Пока условие нарушено, сдвигаем left и обновляем состояние. Как только окно снова валидно, его длина — кандидат на максимум.
  recognition_cues:
  - ищется longest subarray/substring
  - условие валидности можно восстановить удалением слева
  - правую границу естественно двигать только вперёд
  anti_cues:
  - Условие не монотонно (сумма с отрицательными числами — сужение может и портить).
  - Ищется число подотрезков, а не максимум длины — там другая арифметика (at most K).
  core_invariant: |-
    После цикла сжатия текущее окно валидно; любой более левый старт, уже удалённый из-за нарушения, не может образовать валидное окно с тем же right.
  canonical_skeleton: |-
    left = 0
    for right in range(n):
        add(a[right])
        while not valid():
            remove(a[left]); left += 1
        ans = max(ans, right-left+1)
  mini_example: |-
    В Longest Substring Without Repeating Characters при повторе двигаем left, пока все символы окна снова не станут уникальными.
  common_mistakes:
  - Снятие ответа внутри while (окно ещё невалидно).
  - 'if вместо while при сужении: одного шага может не хватить.'
  - Отрицательные числа в сумме — монотонность молча сломана.
  dont_confuse_with:
  - title: Prefix Sum
    note: Prefix sum считает агрегаты произвольных отрезков без сдвига окна; sliding window требует монотонного условия, зато O(n) и O(1) память.
  - title: Shortest Valid Variable Window
    note: 'Симметричный случай: там окно сжимают, ПОКА оно валидно, и ответ снимается внутри сжатия.'
- code: shortest_valid_window
  what_it_is: |-
    Используется, когда нужен самый короткий диапазон, который уже удовлетворяет условию. Обычно правую границу расширяют до достижения валидности, после чего левую сдвигают максимально далеко, стараясь сохранить условие.

    Главное отличие от longest-window задач — после достижения валидности нас интересует агрессивное сжатие. Примеры: минимальный подмассив с достаточной суммой, минимальное покрывающее окно.
  mental_model: |-
    Расширяем right, пока окно не станет валидным. Затем внутри while valid() обновляем минимум и удаляем элементы слева, пока условие не сломается.
  recognition_cues:
  - ищется shortest/minimum contiguous range
  - валидность достигается расширением справа
  - после достижения условия хочется максимально сжать слева
  anti_cues:
  - Отрицательные элементы при условии на сумму — нужен prefix + monotonic deque.
  - Ищется максимум длины — зеркальный шаблон longest window.
  core_invariant: |-
    Каждое валидное окно перед удалением слева рассматривается как кандидат; после завершения внутреннего цикла текущее окно уже невалидно, поэтому для этого right более короткого валидного старта не пропущено.
  canonical_skeleton: |-
    left = 0
    for right in range(n):
        add(a[right])
        while valid():
            ans = min(ans, right-left+1)
            remove(a[left]); left += 1
  mini_example: |-
    В Minimum Size Subarray Sum при сумме >= target фиксируем длину и продолжаем сжимать окно слева.
  common_mistakes:
  - Ответ снимается после while, когда окно уже невалидно.
  - Возврат 0/∞ не обработан, если валидного окна нет вообще.
  - Сжатие через if — застревает на неминимальном окне.
  dont_confuse_with:
  - title: Longest Valid Variable Window
    note: 'Порядок «снять ответ / сжать» противоположный: для минимума ответ снимается во время сжатия, для максимума — после него.'
- code: frequency_coverage_window
  what_it_is: |-
    Окно хранит не только размер или сумму, а структуру состава: частоты символов, число выполненных требований, количество уникальных значений. Подходит для задач, где валидность определяется тем, какие элементы и в каком количестве находятся внутри.

    Типичный приём — иметь need, window и счётчик выполненных условий. Этот подпаттерн часто используется в minimum window substring, anagram search и задачах на покрытие.
  mental_model: |-
    Храним частоты текущего окна и отдельный компактный счётчик выполненных требований (formed, missing). При добавлении/удалении меняем его только в момент пересечения нужного порога.
  recognition_cues:
  - валидность зависит от частот нескольких элементов
  - нужно покрыть шаблон/набор требований
  - есть формулировки anagram, permutation, minimum cover
  anti_cues:
  - Важен порядок элементов, а не мультимножество — частоты не помогут.
  - Требований нет, есть только длина — хватит простого окна.
  core_invariant: |-
    window[x] точно равно частоте x в текущем окне, а агрегированный счётчик требований точно соответствует числу выполненных условий need.
  canonical_skeleton: |-
    need = counts(target)
    window = {}; formed = 0
    for right in range(n):
        add_and_update(s[right])
        while formed == required:
            update_answer()
            remove_and_update(s[left]); left += 1
  mini_example: |-
    В Minimum Window Substring окно валидно, когда для каждого требуемого символа накоплена достаточная частота.
  common_mistakes:
  - Сравнение have[c] >= need[c] вместо == при инкременте matched — двойной счёт.
  - Декремент matched после уменьшения have, а не до.
  - Сверка всего словаря на каждом шаге — O(26·n) превращается в O(n²) на юникоде.
  dont_confuse_with:
  - title: Fixed-Size Window
    note: Анаграмма — частный случай с фиксированной длиной. Общий случай (minimum window) требует переменного окна с покрытием.
- code: prefix_sum_range_query
  what_it_is: |-
    Строится массив, где prefix[i] хранит сумму или другую агрегированную информацию по первым i элементам. Тогда значение произвольного диапазона можно получить через разность двух префиксов.

    Подходит, когда нужно многократно отвечать на запросы по отрезкам или сравнивать суммы разных диапазонов. На неизменяемых данных позволяет заменить повторные O(n) вычисления на O(1) запросы после предварительной подготовки.
  mental_model: |-
    Строим prefix[0]=0, где prefix[i+1] агрегирует первые i+1 элементов. Для суммы диапазона [l,r] берём prefix[r+1]-prefix[l].
  recognition_cues:
  - много запросов суммы/агрегата на отрезке
  - подмассивы сильно перекрываются
  - данные статичны или редко меняются
  core_invariant: |-
    prefix[i] всегда равен агрегату первых i элементов; поэтому разность двух префиксов удаляет общий левый префикс и оставляет нужный диапазон.
  canonical_skeleton: |-
    prefix = [0]*(n+1)
    for i, x in enumerate(a):
        prefix[i+1] = prefix[i] + x

    def range_sum(l, r):
        return prefix[r+1] - prefix[l]
  mini_example: |-
    В Range Sum Query - Immutable каждый запрос суммы подмассива после подготовки обрабатывается за O(1).
- code: prefix_balance_hashmap
  what_it_is: |-
    Вместо обычной суммы префикс хранит состояние баланса: например, разницу количества нулей и единиц или накопленную сумму. Если одинаковое состояние встретилось в двух позициях, участок между ними имеет определённое полезное свойство.

    Hash Map обычно хранит первое появление состояния или количество его предыдущих появлений. Подпаттерн особенно полезен для поиска подмассивов с заданной суммой и сбалансированных диапазонов.
  mental_model: |-
    Ведём cumulative state p. Для текущего p ищем ранее встречавшееся состояние p-target или такое же состояние — в зависимости от задачи. Map хранит частоту либо самый ранний индекс.
  recognition_cues:
  - нужно посчитать/найти подмассив с заданной суммой или балансом
  - одинаковые накопленные состояния имеют смысл
  - Sliding Window ломается из-за отрицательных чисел
  core_invariant: |-
    Если prefix[j] - prefix[i] = target, то нужный предыдущий префикс равен prefix[j]-target; map содержит точную информацию о уже обработанных префиксах.
  canonical_skeleton: |-
    freq = {0: 1}
    p = ans = 0
    for x in a:
        p += x
        ans += freq.get(p-target, 0)
        freq[p] = freq.get(p, 0) + 1
  mini_example: |-
    В Subarray Sum Equals K каждый прошлый префикс p-k образует с текущей позицией один подходящий подмассив.
- code: difference_array
  what_it_is: |-
    Используется, когда нужно применить много изменений к целым диапазонам. Вместо обновления каждого элемента отдельно мы отмечаем начало и окончание эффекта, а затем одним префиксным проходом восстанавливаем итоговые значения.

    Например, чтобы добавить x ко всем элементам [l, r], достаточно изменить две позиции difference-array. Особенно полезно при большом количестве офлайн-обновлений диапазонов.
  mental_model: |-
    Для добавления delta на [l,r] записываем diff[l]+=delta, diff[r+1]-=delta (если индекс существует). После всех запросов один prefix-pass восстанавливает итоговый эффект.
  recognition_cues:
  - много офлайн-обновлений целых диапазонов
  - операция одинакова для всех элементов [l,r]
  - поштучное обновление слишком дорого
  core_invariant: |-
    Накопленная сумма diff в позиции i равна сумме всех диапазонных обновлений, которые активны в i.
  canonical_skeleton: |-
    diff = [0]*(n+1)
    for l, r, delta in updates:
        diff[l] += delta
        if r+1 < n: diff[r+1] -= delta
    cur = 0
    for i in range(n):
        cur += diff[i]
        a[i] += cur
  mini_example: |-
    В Corporate Flight Bookings каждая бронь отмечает начало прибавки и позицию сразу после её окончания.
- code: exact_search_monotone
  what_it_is: |-
    Классическая форма бинарного поиска: нужно найти конкретное значение в упорядоченном пространстве. После сравнения с mid можно однозначно исключить левую или правую половину.

    Под «пространством» может пониматься не только массив, но любая область с монотонным порядком. Ключевой признак — проверка mid прямо говорит, в какую сторону двигаться.
  mental_model: |-
    Сравниваем a[mid] с target. Если значение меньше, исключаем левую половину вместе с mid; если больше — правую. При равенстве ответ найден.
  recognition_cues:
  - пространство поиска отсортировано
  - ищется конкретное значение
  - сравнение с mid однозначно задаёт сторону
  anti_cues:
  - Массив не отсортирован и сортировка дороже задачи.
  - Нужны все вхождения/агрегат по диапазону — смотри prefix sums.
  core_invariant: |-
    Если target существует, он всегда остаётся внутри текущего замкнутого диапазона [lo, hi].
  canonical_skeleton: |-
    lo, hi = 0, n-1
    while lo <= hi:
        mid = lo + (hi-lo)//2
        if a[mid] == target: return mid
        if a[mid] < target: lo = mid+1
        else: hi = mid-1
    return -1
  mini_example: |-
    В Binary Search сравнение с nums[mid] исключает половину отсортированного массива.
  common_mistakes:
  - lo < hi вместо lo <= hi — теряется последний элемент.
  - mid = (lo+hi)/2 с переполнением в языках с фиксированным int.
  - Смешение конвенций [lo, hi] и [lo, hi) в одном цикле.
  dont_confuse_with:
  - title: Lower / Upper Bound
    note: Exact search останавливается на любом совпадении. Bound-варианты продолжают до первой/последней подходящей позиции.
- code: lower_upper_bound
  what_it_is: |-
    Ищется не произвольное совпадение, а граница: первая позиция >= x, первая > x, последнее допустимое значение и т. п. Даже если одинаковых элементов много, нужен строго определённый край диапазона.

    Главная идея — формулировать условие как переход от одной зоны к другой, например false false false true true. Бинарный поиск затем находит точку этого перехода.
  mental_model: |-
    Определяем монотонный predicate и ищем его границу. Для first_true при pred(mid)=true сохраняем mid как возможный ответ и продолжаем слева.
  recognition_cues:
  - нужна первая/последняя позиция, а не любое совпадение
  - есть переход false…false true…true
  - формулировки first >=, first >, last <=
  anti_cues:
  - Нужен просто факт наличия — хватит exact search или множества.
  - Предикат не монотонен вдоль массива.
  core_invariant: |-
    Искомая граница остаётся внутри [lo, hi]; всё строго левее уже доказано false, а сохранённая/правая зона содержит true по выбранной формулировке.
  canonical_skeleton: |-
    lo, hi = 0, n
    while lo < hi:
        mid = (lo+hi)//2
        if pred(mid): hi = mid
        else: lo = mid+1
    return lo
  mini_example: |-
    В Find First and Last Position of Element in Sorted Array две boundary-функции находят начало и конец блока target.
  common_mistakes:
  - Возврат lo без проверки lo == n (условие нигде не выполнено).
  - Off-by-one между «первый ≥» и «первый >».
  - Полуинтервал [lo, hi) и замкнутый [lo, hi] перепутаны в границах цикла.
  dont_confuse_with:
  - title: Binary Search on Answer
    note: Тот же каркас, но bound ищется в реальном массиве, а не в абстрактном диапазоне значений ответа.
- code: binary_search_on_answer
  what_it_is: |-
    Бинарно ищется само значение ответа: минимальная скорость, максимальная допустимая нагрузка, минимальная вместимость. Для каждого кандидата x существует функция feasible(x), проверяющая, можно ли выполнить условие.

    Критическое требование — монотонность: если некоторый x подходит, то все значения с одной стороны от него тоже должны подходить. Большая часть сложности обычно находится именно в корректной функции проверки.
  mental_model: |-
    Определяем гарантированно покрывающие ответ границы и монотонный predicate. Бинарно ищем первую допустимую или последнюю допустимую точку.
  recognition_cues:
  - нужно минимизировать/максимизировать числовой параметр
  - есть быстрая проверка feasible(x)
  - допустимость меняется монотонно по x
  anti_cues:
  - 'feasible(x) не монотонна: из выполнимости x не следует выполнимость x+1.'
  - Ищется элемент в конкретном отсортированном массиве — это обычный бинарный поиск.
  - Кандидатов мало — дешевле перебрать напрямую.
  core_invariant: |-
    Граница оптимального ответа всегда остаётся в текущем диапазоне; монотонность гарантирует, что после feasible(mid) одна половина целиком не содержит искомой границы.
  canonical_skeleton: |-
    lo, hi = min_answer, max_answer
    while lo < hi:
        mid = (lo+hi)//2
        if feasible(mid): hi = mid
        else: lo = mid+1
    return lo
  mini_example: |-
    В Koko Eating Bananas при достаточной скорости все большие скорости тоже достаточны, поэтому ищется первая feasible-скорость.
  common_mistakes:
  - 'hi = mid - 1 при поиске минимума: выкидываешь потенциальный ответ.'
  - 'Неверные начальные границы: min_answer завышен или max_answer занижен.'
  - feasible() с побочным эффектом или несимметричной логикой для mid на краях.
  - Бесконечный цикл из-за mid = (lo+hi+1)//2 против hi = mid (несогласованное округление).
  dont_confuse_with:
  - title: Exact Binary Search
    note: Обычный поиск ищет элемент в данных. Здесь данных нет — есть монотонный предикат над воображаемым диапазоном ответов.
  - title: Greedy
    note: Жадный ход строит ответ напрямую. Binary Search on Answer не строит — только проверяет кандидата целиком.
- code: rotated_peak_search
  what_it_is: |-
    Используется, когда данные не выглядят полностью отсортированными, но сохраняют частичную структуру: одна половина отсортирована, существует пик или порядок задаётся неявно. Проверка mid позволяет определить, где находится полезная область.

    Главная задача — найти сохраняющийся инвариант порядка, а не применять стандартный binary search механически. Типичные примеры: rotated sorted array и peak element.
  mental_model: |-
    На каждом mid определяем структурное свойство: какая половина отсортирована, в какую сторону идёт подъём к пику, где находится разрыв. По нему сохраняем только сторону, где кандидат ещё возможен.
  recognition_cues:
  - массив rotated/bitonic либо ищется peak
  - полного порядка нет, но одна часть упорядочена
  - локальное сравнение раскрывает полезную половину
  anti_cues:
  - Дубликаты стирают различимость половин — гарантия O(log n) пропадает.
  - Больше двух монотонных кусков.
  core_invariant: |-
    После выбора половины хотя бы один корректный кандидат (если он существует) остаётся в новом диапазоне благодаря частичной упорядоченности.
  canonical_skeleton: |-
    lo, hi = 0, n-1
    while lo < hi:
        mid = (lo+hi)//2
        if goes_right(mid): lo = mid+1
        else: hi = mid
    return lo
  mini_example: |-
    В Find Peak Element если a[mid] < a[mid+1], справа обязательно существует пик, поэтому lo = mid+1.
  common_mistakes:
  - Сравнение с a[lo] вместо a[hi] без корректировки веток.
  - Игнорирование случая «массив не повёрнут вовсе».
  - Попытка применить шаблон при наличии дубликатов без деградации к O(n).
  dont_confuse_with:
  - title: Exact Search on Monotone Space
    note: Там одна монотонная зона и сравнение с target. Здесь сперва определяется «правильная» половина по структуре массива.
- code: merge_overlapping_intervals
  what_it_is: |-
    После сортировки интервалов по началу мы поддерживаем текущий объединённый диапазон. Если следующий интервал пересекается с ним, расширяем правую границу; иначе фиксируем текущий результат и начинаем новый.

    Подпаттерн подходит, когда нужно нормализовать набор пересекающихся диапазонов. После сортировки вся задача обычно сводится к одному линейному проходу.
  mental_model: |-
    Сортируем по start. Поддерживаем последний объединённый интервал: при пересечении расширяем его конец, иначе начинаем новый блок.
  recognition_cues:
  - дан набор пересекающихся диапазонов
  - нужно объединить покрытие
  - интервалы можно отсортировать по началу
  core_invariant: |-
    result содержит непересекающиеся объединения всех полностью обработанных блоков, а current — точное объединение последней ещё открытой цепочки пересечений.
  canonical_skeleton: |-
    intervals.sort(key=start)
    res = []
    for s,e in intervals:
        if not res or s > res[-1][1]: res.append([s,e])
        else: res[-1][1] = max(res[-1][1], e)
  mini_example: |-
    В Merge Intervals [1,3] и [2,6] превращаются в [1,6], потому что второй стартует до окончания первого.
- code: interval_insertion_intersection
  what_it_is: |-
    Здесь нужно либо корректно вставить новый интервал в уже упорядоченный набор, либо найти пересечения двух списков интервалов. В обоих случаях важно сравнивать взаимное положение текущих диапазонов и двигать тот, который заканчивается раньше.

    Это более структурированный случай работы с интервалами, чем обычный merge. Часто можно обойтись без полной пересортировки, если входные данные уже отсортированы и не пересекаются внутри каждого списка.
  mental_model: |-
    Для intersection сравниваем текущую пару, записываем [max(starts), min(ends)], если она непуста, и двигаем интервал с меньшим концом. Для insertion отдельно пропускаем интервалы до, сливаем пересечения и дописываем после.
  recognition_cues:
  - есть два отсортированных списка непересекающихся интервалов
  - нужно найти их пересечения
  - или вставить один новый интервал без полной пересортировки
  core_invariant: |-
    После продвижения интервала с меньшим концом все его возможные пересечения с текущим и более ранними интервалами другого списка уже полностью рассмотрены.
  canonical_skeleton: |-
    i = j = 0
    while i < len(A) and j < len(B):
        lo = max(A[i].start, B[j].start)
        hi = min(A[i].end, B[j].end)
        if lo <= hi: emit(lo, hi)
        if A[i].end < B[j].end: i += 1
        else: j += 1
  mini_example: |-
    В Interval List Intersections после обработки пары двигаем интервал, который закончился раньше: он уже не пересечётся с будущими более поздними интервалами.
- code: sweep_line_event_counting
  what_it_is: |-
    Интервалы преобразуются в события: начало увеличивает число активных объектов, конец уменьшает. После сортировки событий мы «двигаем линию» слева направо и поддерживаем текущее состояние.

    Подходит для задач на максимальное число одновременных встреч, пересечения бронирований, количество активных процессов. Важная деталь — правильно определить порядок обработки событий с одинаковой координатой.
  mental_model: |-
    Преобразуем интервал в события (+1) на старте и (-1) на конце, сортируем их с корректным tie-break для смысла границ. Накопительный active даёт число активных объектов.
  recognition_cues:
  - нужно число одновременно активных интервалов
  - важны моменты начала/окончания
  - задача сводится к событиям на оси
  core_invariant: |-
    После обработки всех событий в текущей координате active равно числу интервалов, которые считаются активными согласно выбранной семантике открытых/закрытых концов.
  canonical_skeleton: |-
    events = []
    for s,e in intervals:
        events += [(s,+1),(e,-1)]
    events.sort(key=tie_rule)
    active = best = 0
    for x,delta in events:
        active += delta
        best = max(best, active)
  mini_example: |-
    В Meeting Rooms II максимум active равен минимальному числу комнат; при встречах [a,b) окончание в b обрабатывается до старта в b.
- code: matching_nesting_stack
  what_it_is: |-
    Stack хранит незакрытые конструкции: открывающие скобки, теги, вложенные блоки. Когда появляется закрывающий элемент, он должен соответствовать вершине стека.

    Подпаттерн основан на естественном свойстве вложенности: последняя открытая конструкция должна закрыться первой. Используется в valid parentheses, decoding и структурном парсинге.
  mental_model: |-
    Открывающие элементы кладём в stack. На закрывающем проверяем вершину: она должна быть соответствующей парой, после чего снимается.
  recognition_cues:
  - есть вложенные пары открытие/закрытие
  - последняя открытая конструкция должна закрыться первой
  - скобки, теги, вложенные блоки
  core_invariant: |-
    Stack содержит ровно ещё не закрытые открывающие элементы обработанного префикса в порядке вложенности; вершина — единственный допустимый партнёр следующего закрытия.
  canonical_skeleton: |-
    stack = []
    for ch in s:
        if is_open(ch): stack.append(ch)
        else:
            if not stack or not matches(stack[-1], ch): return False
            stack.pop()
    return not stack
  mini_example: |-
    В Valid Parentheses ] может закрыть только последнюю незакрытую [, а не любую более раннюю скобку.
- code: expression_evaluation_stack
  what_it_is: |-
    Используется для вычисления выражений и обработки операторов с приоритетами. Stack может хранить числа, операторы или промежуточные состояния до момента, когда их уже безопасно вычислить.

    Типичные задачи: Reverse Polish Notation, basic calculator, infix parsing. Главное — чётко определить, когда операция готова к выполнению и какие элементы нужно снять со стека.
  mental_model: |-
    Храним операнды и/или операторы до момента, когда операция готова к выполнению. В RPN два верхних числа снимаются при операторе; в infix-парсинге дополнительно учитывается приоритет.
  recognition_cues:
  - нужно вычислить арифметическое выражение
  - есть приоритет/скобки/постфиксная запись
  - операция ждёт появления операндов
  core_invariant: |-
    Stack после обработки префикса представляет точный результат уже завершённых подвыражений и минимально необходимое незавершённое состояние для продолжения.
  canonical_skeleton: |-
    stack = []
    for token in tokens:
        if is_number(token): stack.append(value(token))
        else:
            b = stack.pop(); a = stack.pop()
            stack.append(apply(token, a, b))
    return stack[-1]
  mini_example: |-
    В Evaluate Reverse Polish Notation токен + немедленно объединяет два последних вычисленных значения.
- code: monotonic_stack
  what_it_is: |-
    Stack поддерживается строго или нестрого возрастающим/убывающим. Когда новый элемент нарушает порядок, часть элементов удаляется, потому что для них найден ближайший более подходящий сосед.

    Применяется в next greater element, daily temperatures, largest rectangle in histogram. Каждый элемент обычно добавляется и удаляется не более одного раза, что даёт линейную сложность.
  mental_model: |-
    Храним индексы нерешённых элементов в монотонном порядке. Новый элемент выталкивает с вершины тех, для кого он стал первым подходящим соседом.
  recognition_cues:
  - нужен next/previous greater/smaller
  - для каждого элемента ищется ближайший нарушающий монотонность сосед
  - обычный двойной цикл выглядит O(n²)
  anti_cues:
  - Нужен агрегат по окну фиксированной длины — это monotonic deque.
  - Порядок не важен, важны только частоты.
  core_invariant: |-
    Индексы в stack упорядочены по позиции и их значения монотонны; каждый элемент в stack ещё не встретил подходящего ответа справа среди обработанных элементов.
  canonical_skeleton: |-
    stack = []
    for i,x in enumerate(a):
        while stack and a[stack[-1]] < x:
            j = stack.pop()
            ans[j] = i
        stack.append(i)
  mini_example: |-
    В Daily Temperatures более тёплый день i выталкивает все последние более холодные дни, для которых он является первым тёплым справа.
  common_mistakes:
  - Строгое/нестрогое сравнение перепутано — дубликаты дают неверные спаны.
  - В стеке значения вместо индексов, а нужен именно индекс/дистанция.
  - Оставшиеся в стеке элементы не обработаны после цикла.
  dont_confuse_with:
  - title: Monotonic Deque
    note: Deque дополнительно выталкивает устаревших с фронта — это нужно для скользящего окна. Стек про «ближайший», deque про «максимум окна».
- code: monotonic_deque
  what_it_is: |-
    Deque хранит только потенциально полезные кандидаты для минимума или максимума в текущем диапазоне. С конца удаляются доминируемые элементы, а с начала — элементы, вышедшие за границы окна.

    Классическое применение — sliding window maximum. В отличие от heap, deque позволяет эффективно учитывать именно порядок и устаревание элементов по индексам.
  mental_model: |-
    Deque хранит индексы в порядке позиций и монотонном порядке значений. Перед добавлением удаляем с конца доминируемых кандидатов, с начала — вышедшие из окна.
  recognition_cues:
  - нужен min/max каждого sliding window
  - элементы устаревают по индексу
  - heap возможен, но хочется линейную сложность
  core_invariant: |-
    Все индексы deque лежат в текущем окне, их значения монотонны, а front всегда является оптимальным (max/min) элементом окна.
  canonical_skeleton: |-
    dq = deque()
    for i,x in enumerate(a):
        while dq and dq[0] <= i-k: dq.popleft()
        while dq and a[dq[-1]] <= x: dq.pop()
        dq.append(i)
        if i >= k-1: ans.append(a[dq[0]])
  mini_example: |-
    В Sliding Window Maximum меньший элемент позади нового большего удаляется: он уйдёт из окна раньше и никогда не станет максимумом.
- code: top_k_bounded_heap
  what_it_is: |-
    Поддерживаем heap ограниченного размера k, чтобы хранить только наиболее важные элементы. Например, min-heap размера k позволяет постоянно помнить k наибольших значений.

    Подпаттерн особенно полезен, когда полный порядок всех n элементов не нужен. Вместо полной сортировки часто получаем сложность порядка O(n log k).
  mental_model: |-
    Поддерживаем heap размера не более k. Для top-k largest обычно это min-heap: smallest из текущей элиты находится на вершине и первым заменяется лучшим кандидатом.
  recognition_cues:
  - нужны только k лучших элементов
  - полная сортировка избыточна
  - формулировки top k / kth largest
  anti_cues:
  - k ≈ n — сортировка проще и не медленнее.
  - Нужен один k-й элемент офлайн — quickselect даёт O(n) среднее.
  - Скользящая медиана — это two heaps.
  core_invariant: |-
    После обработки любого префикса heap содержит ровно k лучших элементов этого префикса (или все элементы, если их меньше k).
  canonical_skeleton: |-
    heap = []
    for x in data:
        push(heap, x)
        if len(heap) > k:
            pop_min(heap)
    return heap
  mini_example: |-
    В Kth Largest Element in an Array вершина min-heap размера k в конце является k-м наибольшим значением.
  common_mistakes:
  - 'Max-heap для top-k наибольших: правильный вариант — min-heap размера k.'
  - push без pop — куча растёт до n, выигрыш исчезает.
  - Сравнение кортежей с несравнимым вторым полем падает в рантайме.
  dont_confuse_with:
  - title: Quickselect / Order Statistics
    note: Quickselect быстрее офлайн, но требует весь массив в памяти и мутирует его. Куча работает на потоке и держит O(k) памяти.
  - title: Two Heaps / Streaming Median
    note: Медиана требует балансировку двух куч, а не отсечение одной.
- code: two_heaps_streaming_median
  what_it_is: |-
    Данные делятся на две половины: меньшая часть хранится в max-heap, большая — в min-heap. Баланс размеров позволяет быстро находить медиану текущего набора.

    Подходит для потока данных, где элементы поступают постепенно и после каждого добавления нужен центральный элемент. Основная задача — поддерживать правильный порядок между heap и разницу размеров не более одного.
  mental_model: |-
    Max-heap low хранит меньшую половину, min-heap high — большую. После вставки переносим вершины, чтобы сохранить порядок и баланс размеров.
  recognition_cues:
  - элементы поступают потоково
  - после каждого добавления нужна медиана
  - нужно поддерживать две половины набора
  core_invariant: |-
    Каждый элемент low не больше каждого элемента high, а размеры отличаются не более чем на один; поэтому медиана находится на вершине одного/обоих heap.
  canonical_skeleton: |-
    add(x):
        push_max(low, x)
        push_min(high, pop_max(low))
        if len(high) > len(low):
            push_max(low, pop_min(high))

    median = top(low) if odd else (top(low)+top(high))/2
  mini_example: |-
    В Find Median from Data Stream после каждой вставки две вершины дают центральные элементы отсортированного потока.
- code: k_way_merge_best_first
  what_it_is: |-
    В heap одновременно хранятся лучшие текущие кандидаты из нескольких источников. После извлечения элемента в heap добавляется следующий кандидат из того же источника.

    Классический пример — слияние k отсортированных списков. Более широко это best-first стратегия: всегда продолжать с глобально лучшего доступного состояния.
  mental_model: |-
    В heap кладём первый ещё не использованный элемент каждого источника вместе с идентификатором источника. Извлекаем минимум и добавляем следующий элемент из того же источника.
  recognition_cues:
  - несколько уже отсортированных источников
  - нужно глобально извлекать следующий минимум
  - k sorted lists/arrays
  core_invariant: |-
    Heap содержит минимальный неиспользованный кандидат каждого непустого источника; следовательно, его вершина — глобально минимальный следующий элемент.
  canonical_skeleton: |-
    heap = first_item_from_each_source()
    while heap:
        value, src, pos = pop_min(heap)
        emit(value)
        if pos+1 < len(src):
            push(heap, src[pos+1])
  mini_example: |-
    В Merge k Sorted Lists после извлечения узла из списка в heap добавляется только следующий узел этого же списка.
- code: dummy_node_rewiring
  what_it_is: |-
    Перед настоящей головой списка создаётся искусственный узел dummy. Это устраняет особые случаи, когда нужно удалить, вставить или заменить первый элемент.

    Подпаттерн полезен почти во всех задачах с активной перестройкой списка. Код становится единообразнее, потому что у каждого изменяемого узла появляется предыдущий узел.
  mental_model: |-
    Создаём dummy, указывающий на исходную голову, и выполняем все изменения через обычного предшественника. В конце настоящая голова — dummy.next.
  recognition_cues:
  - изменяется голова linked list
  - много вставок/удалений перед текущим узлом
  - особые случаи head усложняют код
  core_invariant: |-
    dummy.next всегда указывает на актуальную голову частично преобразованного списка; операции около исходной головы подчиняются тем же правилам, что и в середине.
  canonical_skeleton: |-
    dummy = Node(0, head)
    prev = dummy
    while prev.next:
        if remove(prev.next):
            prev.next = prev.next.next
        else:
            prev = prev.next
    return dummy.next
  mini_example: |-
    В Remove Nth Node From End of List dummy позволяет удалить первый реальный узел без отдельной ветки.
- code: in_place_reversal
  what_it_is: |-
    Ссылки между узлами разворачиваются без создания нового списка. Обычно поддерживаются prev, curr и временно сохранённый next.

    Подпаттерн применяется как для полного reverse, так и для участка списка, групп фиксированного размера или последующей перестройки. Критически важно сохранить ссылку на необработанный остаток до изменения curr.next.
  mental_model: |-
    Храним prev, curr и заранее сохраняем next. Перенаправляем curr.next = prev, затем двигаем границу между развёрнутой и необработанной частями.
  recognition_cues:
  - нужно reverse whole list/segment/groups
  - требуется O(1) extra space
  - решение меняет next на месте
  core_invariant: |-
    prev — голова корректно развёрнутого обработанного префикса, curr — первый узел ещё не обработанного исходного суффикса; ни один узел не потерян.
  canonical_skeleton: |-
    prev = None
    curr = head
    while curr:
        nxt = curr.next
        curr.next = prev
        prev = curr
        curr = nxt
    return prev
  mini_example: |-
    В Reverse Linked List после обработки 1→2→3 состояние может быть 2→1 и необработанный 3→….
- code: merge_split_reconnect
  what_it_is: |-
    Список разделяется на части, несколько списков сливаются или сегменты соединяются в новом порядке. Часто используются slow/fast pointers для поиска точки разделения и dummy node для обратной сборки.

    Типичные задачи: merge sorted lists, reorder list, merge sort on linked list. Основная сложность — корректно сохранять границы сегментов и не создавать циклы.
  mental_model: |-
    Явно фиксируем границы частей, разрываем старые связи при необходимости и последовательно соединяем сегменты. Для sorted merge выбираем меньшую текущую голову и продвигаем только её список.
  recognition_cues:
  - нужно merge/reorder/split list
  - список собирается из сегментов
  - связи меняются, но значения копировать не нужно
  core_invariant: |-
    Уже собранный префикс результата содержит ровно обработанные узлы в требуемом порядке, а хвост результата указывает на единственную следующую позицию присоединения.
  canonical_skeleton: |-
    dummy = tail = Node()
    while a and b:
        if a.val <= b.val: tail.next, a = a, a.next
        else: tail.next, b = b, b.next
        tail = tail.next
    tail.next = a or b
    return dummy.next
  mini_example: |-
    В Merge Two Sorted Lists меньшая из двух текущих голов безопасно становится следующим узлом результата.
- code: dfs_path_subtree_aggregation
  what_it_is: |-
    DFS используется, когда ответ для узла зависит от результатов его дочерних поддеревьев или от состояния пути от корня. Рекурсивная функция обычно возвращает компактную информацию, необходимую родителю.

    Примеры: height, diameter, path sum, subtree properties. Важно определить, что возвращает вызов вверх, а что обновляется как глобальный ответ.
  mental_model: |-
    Задаём строгий контракт dfs(node): какую информацию возвращает родителю. Сначала получаем результаты детей, затем вычисляем локальный return и при необходимости обновляем глобальный ответ.
  recognition_cues:
  - ответ узла зависит от поддеревьев
  - path/subtree/height/diameter
  - естественна рекурсивная формулировка
  core_invariant: |-
    После dfs(node) возвращаемое значение точно описывает всё поддерево node согласно контракту; родителю не нужна внутренняя детализация поддерева.
  canonical_skeleton: |-
    def dfs(node):
        if not node: return base
        L = dfs(node.left)
        R = dfs(node.right)
        update_global(node, L, R)
        return summarize(node, L, R)
  mini_example: |-
    В Diameter of Binary Tree dfs возвращает высоту поддерева, а глобальный диаметр обновляется как left_height + right_height.
- code: bfs_level_order
  what_it_is: |-
    Дерево обходится по уровням с помощью queue. Все узлы текущего уровня обрабатываются вместе, после чего в очередь переходят их дети.

    Подходит для задач на уровни, минимальную глубину, правый/левый вид, zigzag traversal. Размер очереди в начале итерации часто используется для фиксации границы текущего уровня.
  mental_model: |-
    Помещаем root в queue. На каждой итерации фиксируем level_size = len(queue) и обрабатываем ровно столько узлов, добавляя их детей для следующего уровня.
  recognition_cues:
  - нужно работать по уровням
  - минимальная глубина
  - right/left side view, zigzag
  core_invariant: |-
    В начале каждой внешней итерации queue содержит ровно узлы одного текущего уровня слева направо.
  canonical_skeleton: |-
    q = deque([root])
    while q:
        level = []
        for _ in range(len(q)):
            node = q.popleft()
            level.append(node.val)
            for child in children(node): q.append(child)
        process(level)
  mini_example: |-
    В Binary Tree Level Order Traversal фиксированный len(q) не даёт детям текущего уровня смешаться с родителями.
- code: bst_ordering_bounds
  what_it_is: |-
    Используется свойство Binary Search Tree: значения в левом и правом поддеревьях ограничены относительно узла. Это позволяет искать элементы, проверять корректность дерева и эффективно отсекать ненужные ветви.

    Важно помнить, что проверка BST требует не только сравнения с непосредственным родителем, но и соблюдения ограничений всех предков. Часто рекурсия передаёт допустимый диапазон low/high.
  mental_model: |-
    Используем глобальные ограничения, наследуемые от предков, либо направляем поиск влево/вправо по сравнению с ключом. Для validation узел должен лежать внутри (low, high).
  recognition_cues:
  - дан BST
  - нужно validate/search/kth/order bounds
  - можно отсекать поддеревья по значению
  core_invariant: |-
    Каждый посещаемый узел удовлетворяет всем ограничениям предков; левое поддерево получает верхнюю границу node.val, правое — нижнюю.
  canonical_skeleton: |-
    def valid(node, low, high):
        if not node: return True
        if not (low < node.val < high): return False
        left_ok = valid(node.left, low, node.val)
        right_ok = valid(node.right, node.val, high)
        return left_ok and right_ok
  mini_example: |-
    В Validate Binary Search Tree узел в правом поддереве корня не может быть меньше корня, даже если он больше своего непосредственного родителя.
- code: connected_components_flood_fill
  what_it_is: |-
    Запускаем DFS/BFS из каждой ещё не посещённой вершины и помечаем всю достижимую область. Каждый новый запуск соответствует новой компоненте связности.

    В grid-задачах вершинами являются клетки, а рёбра задаются соседством. Типичные задачи: number of islands, provinces, regions.
  mental_model: |-
    Для каждой непосещённой вершины запускаем DFS/BFS и помечаем всё достижимое. Один запуск полностью «закрашивает» одну компоненту.
  recognition_cues:
  - нужно число islands/provinces/components
  - важна достижимость внутри группы
  - каждый объект относится к одной компоненте
  core_invariant: |-
    После завершения обхода из start посещены ровно все вершины его компоненты; ни одна вершина этой компоненты не инициирует новый компонентный обход.
  canonical_skeleton: |-
    seen = set(); count = 0
    for v in vertices:
        if v not in seen:
            count += 1
            dfs_mark(v, seen)
    return count
  mini_example: |-
    В Number of Islands каждый запуск flood fill с новой клетки земли соответствует одному острову.
- code: cycle_detection_traversal
  what_it_is: |-
    Цикл определяется через дополнительное состояние обхода. В ненаправленном графе важно отличать родительское ребро от возврата в уже посещённую вершину; в направленном — отслеживать вершины текущего recursion stack.

    Подпаттерн применим, когда нужен сам факт наличия цикла или корректность структуры зависимостей. Конкретная техника зависит от направленности графа.
  mental_model: |-
    В directed graph используем состояния 0=unseen, 1=active, 2=done: ребро в active вершину — back edge. В undirected graph при DFS игнорируем ребро к непосредственному parent.
  recognition_cues:
  - нужно определить наличие цикла
  - граф directed/undirected
  - обычного visited недостаточно для directed cycle
  core_invariant: |-
    active содержит ровно вершины текущего незавершённого DFS-пути; переход в уже active вершину замыкает направленный цикл.
  canonical_skeleton: |-
    def dfs(v):
        state[v] = 1
        for nei in g[v]:
            if state[nei] == 1: return True
            if state[nei] == 0 and dfs(nei): return True
        state[v] = 2
        return False
  mini_example: |-
    В Course Schedule возврат к вершине со state=1 означает, что цепочка prerequisites замкнулась.
- code: multi_source_bfs
  what_it_is: |-
    BFS запускается одновременно из нескольких стартовых вершин, которые помещаются в queue на нулевом уровне. Затем фронт распространяется от всех источников параллельно.

    Так удобно искать минимальное расстояние до ближайшего источника или моделировать распространение процесса: гниение апельсинов, заполнение расстояний, распространение огня.
  mental_model: |-
    Все источники помещаем в queue с дистанцией 0 до начала BFS. Затем обычный BFS расширяет единый фронт; каждая вершина впервые достигается ближайшим источником.
  recognition_cues:
  - несколько равноправных стартов
  - нужно расстояние до ближайшего источника
  - распространение процесса слоями
  anti_cues:
  - Веса рёбер различны — BFS не даст кратчайших путей, нужен Dijkstra.
  - Источник один — обычный BFS.
  core_invariant: |-
    Когда вершина впервые извлекается/посещается, её дистанция минимальна среди путей от любого источника, потому что BFS идёт по неубывающему числу шагов.
  canonical_skeleton: |-
    q = deque(sources)
    for s in sources: dist[s] = 0
    while q:
        v = q.popleft()
        for nei in neighbors(v):
            if dist[nei] == INF:
                dist[nei] = dist[v] + 1
                q.append(nei)
  mini_example: |-
    В Rotting Oranges все изначально гнилые апельсины начинают на минуте 0, поэтому время до клетки считается от ближайшего фронта гниения.
  common_mistakes:
  - Пометка visited при извлечении, а не при добавлении — клетки дублируются в очереди.
  - Запуск отдельного BFS от каждого источника — O(S·V) вместо O(V).
  - Уровневый счётчик шагов сбивается, если время считается по уровням, а не по dist.
  dont_confuse_with:
  - title: Unweighted Shortest Path BFS
    note: Тот же механизм с одним источником. Multi-source — это BFS от «виртуальной вершины», соединённой со всеми источниками.
- code: state_space_graph_search
  what_it_is: |-
    Граф не дан явно: вершина — это состояние системы, а рёбра — допустимые операции перехода. Мы сами определяем генератор соседних состояний и запускаем BFS/DFS.

    Типичные примеры: word ladder, lock combinations, puzzle states. Главная задача — выбрать компактное представление состояния и не посещать одно состояние повторно.
  mental_model: |-
    Определяем сериализуемое состояние и функцию neighbors(state), генерирующую все корректные одношаговые переходы. Затем применяем BFS для shortest moves или DFS для reachability.
  recognition_cues:
  - граф не дан списком рёбер
  - есть состояния и допустимые операции
  - нужно minimum moves/transformations
  core_invariant: |-
    Каждое состояние, добавленное в visited, представляет уже найденный лучший BFS-уровень (или полностью учтённую достижимость); повторная генерация не нужна.
  canonical_skeleton: |-
    q = deque([(start,0)])
    seen = {start}
    while q:
        state,d = q.popleft()
        if goal(state): return d
        for nxt in neighbors(state):
            if nxt not in seen:
                seen.add(nxt); q.append((nxt,d+1))
  mini_example: |-
    В Open the Lock вершина — комбинация из четырёх цифр, ребро — поворот одного колеса на ±1.
- code: kahn_in_degree_bfs
  what_it_is: |-
    Для каждой вершины считаем число входящих рёбер. Все вершины с in-degree = 0 помещаются в queue; после их удаления уменьшаем степени зависимых вершин.

    Если удалось обработать все вершины, топологический порядок существует. Если часть вершин осталась, граф содержит цикл.
  mental_model: |-
    Считаем indegree. Все нулевые вершины кладём в queue; при удалении вершины уменьшаем indegree её соседей и добавляем тех, кто стал доступен.
  recognition_cues:
  - directed prerequisites
  - нужен порядок выполнения
  - можно начинать элементы без входящих зависимостей
  core_invariant: |-
    Текущий indegree[v] равен числу входящих рёбер в v от ещё не обработанных вершин; queue содержит только вершины без оставшихся prerequisites.
  canonical_skeleton: |-
    indeg = count_indegrees(g)
    q = deque(v for v in V if indeg[v] == 0)
    order = []
    while q:
        v = q.popleft(); order.append(v)
        for nei in g[v]:
            indeg[nei] -= 1
            if indeg[nei] == 0: q.append(nei)
  mini_example: |-
    В Course Schedule II курс попадает в queue только после обработки всех его prerequisites.
- code: dfs_postorder_toposort
  what_it_is: |-
    DFS сначала полностью обрабатывает всех потомков вершины, а затем добавляет саму вершину в результат. Обратный postorder даёт топологический порядок DAG.

    Для обнаружения цикла обычно используются три состояния: не посещена, находится в текущем пути, полностью обработана. Подпаттерн естественно сочетается с рекурсивным обходом.
  mental_model: |-
    DFS полностью обрабатывает исходящие зависимости и только затем добавляет вершину в postorder. В конце список разворачивается. Для цикла используем active state.
  recognition_cues:
  - нужен topo order и удобен DFS
  - граф — DAG или нужно одновременно выявить цикл
  - зависимый элемент должен идти после всех предков
  core_invariant: |-
    Когда вершина добавляется в postorder, все вершины, достижимые по её исходящим рёбрам, уже добавлены; после reversal каждое ребро u→v идёт слева направо.
  canonical_skeleton: |-
    def dfs(v):
        state[v] = 1
        for nei in g[v]:
            if state[nei] == 1: fail_cycle()
            if state[nei] == 0: dfs(nei)
        state[v] = 2
        order.append(v)

    return order[::-1]
  mini_example: |-
    В DAG с ребром A→B DFS добавит B раньше A в postorder, а reversal восстановит A перед B.
- code: dependency_scheduling
  what_it_is: |-
    Фокус не столько на самом порядке, сколько на вопросах: можно ли выполнить все задачи, сколько параллельных этапов нужно, какие элементы доступны сейчас. Это прикладная форма topological ordering.

    Типичные сюжеты: courses, builds, jobs, prerequisites. В зависимости от требования поверх топологического порядка могут добавляться уровни, DP или priority queue.
  mental_model: |-
    Строим topological process, но поверх него считаем нужную метрику: число уровней, earliest finish, доступные задачи или DP по DAG. Часто один слой queue соответствует одному этапу.
  recognition_cues:
  - нужно не только topo order, но feasibility/semesters/stages
  - есть задачи, доступные после prerequisites
  - важны волны параллельного выполнения
  core_invariant: |-
    В каждый момент доступными считаются ровно задачи, все prerequisites которых уже обработаны; дополнительная метрика обновляется только из корректных предшественников.
  canonical_skeleton: |-
    q = all_zero_indegree()
    stages = 0
    while q:
        for _ in range(len(q)):
            v = q.popleft()
            release_dependents(v, q)
        stages += 1
    return stages if processed_all else impossible
  mini_example: |-
    В Parallel Courses один BFS-слой соответствует семестру, потому что все курсы слоя уже освободились от prerequisites.
- code: online_connectivity
  what_it_is: |-
    Рёбра добавляются постепенно, а DSU быстро объединяет компоненты и отвечает, принадлежат ли два элемента одной группе. Не требуется каждый раз заново обходить весь граф.

    Подходит для потоковых или поэтапных объединений. Дополнительно можно хранить размер компоненты, число компонентов и другие агрегаты на уровне корня.
  mental_model: |-
    Каждый компонент имеет representative/root. find сжимает пути, union объединяет корни по size/rank. Дополнительные агрегаты хранятся у корня.
  recognition_cues:
  - связи добавляются постепенно
  - часто спрашивается connected(A,B)
  - нужно число/размер компонент после объединений
  core_invariant: |-
    Для всех обработанных union-операций find(a)==find(b) тогда и только тогда, когда a и b находятся в одной поддерживаемой компоненте.
  canonical_skeleton: |-
    def find(x):
        if parent[x] != x:
            parent[x] = find(parent[x])
        return parent[x]

    def union(a,b):
        ra, rb = find(a), find(b)
        if ra == rb: return False
        attach_smaller_to_larger(ra, rb)
        return True
  mini_example: |-
    В Number of Provinces каждое соединение городов объединяет их компоненты; итоговое число корней равно числу провинций.
- code: dsu_cycle_detection
  what_it_is: |-
    Перед добавлением ребра проверяем, находятся ли его вершины уже в одной компоненте. Если да, новое ребро создаёт цикл или является избыточным.

    Это особенно удобно в ненаправленных графах. Подпаттерн позволяет обнаружить момент появления лишней связи без полного DFS после каждого добавления.
  mental_model: |-
    Перед union(u,v) сравниваем корни. Если они уже равны, между u и v существовал путь, значит новое ребро замыкает цикл.
  recognition_cues:
  - рёбра добавляются к ненаправленному графу
  - нужно найти лишнее ребро
  - граф до одного добавления был деревом/лесом
  core_invariant: |-
    До добавления текущего ребра DSU точно кодирует связность всех ранее обработанных рёбер; одинаковые корни означают существующий путь между концами.
  canonical_skeleton: |-
    for u,v in edges:
        if find(u) == find(v):
            return (u,v)
        union(u,v)
  mini_example: |-
    В Redundant Connection первое ребро, соединяющее уже связанную пару вершин, является кандидатом на удаление.
- code: kruskal_connectivity
  what_it_is: |-
    Рёбра сортируются по стоимости и рассматриваются от дешёвых к дорогим. Ребро добавляется только если соединяет две разные компоненты.

    Так строится Minimum Spanning Tree алгоритмом Kruskal. DSU здесь отвечает именно за быстрый контроль циклов и объединение компонент.
  mental_model: |-
    Сортируем рёбра по весу и добавляем ребро, только если оно соединяет разные DSU-компоненты. Останавливаемся после |V|-1 выбранных рёбер.
  recognition_cues:
  - нужно minimum spanning tree/минимально соединить все вершины
  - даны взвешенные рёбра
  - можно сортировать рёбра
  core_invariant: |-
    Выбранные рёбра всегда образуют лес; каждый принятый минимальный по порядку edge безопасно соединяет две разные текущие компоненты без цикла.
  canonical_skeleton: |-
    edges.sort(key=weight)
    cost = used = 0
    for w,u,v in edges:
        if union(u,v):
            cost += w; used += 1
            if used == n-1: break
  mini_example: |-
    В задаче на MST дешёвое ребро внутри уже связанной компоненты пропускается: оно создаёт цикл и не нужно для связности.
- code: unweighted_shortest_path_bfs
  what_it_is: |-
    Если каждый переход стоит одинаково, BFS гарантирует, что первая достигнутая дистанция до вершины минимальна. Queue обрабатывает состояния слоями по числу шагов.

    Подходит для лабиринтов, минимального количества операций и переходов в невзвешенном графе. Важно отмечать посещение при добавлении в очередь, чтобы не создавать дубликаты.
  mental_model: |-
    BFS идёт слоями расстояния. При первом обнаружении вершины записываем dist[nei]=dist[v]+1 и больше не добавляем её повторно.
  recognition_cues:
  - нужен minimum number of edges/moves
  - все переходы имеют одинаковую стоимость
  - граф или grid невзвешенный
  core_invariant: |-
    Queue обрабатывает вершины в неубывающем расстоянии от старта; поэтому первая запись дистанции вершины является кратчайшей.
  canonical_skeleton: |-
    q = deque([start]); dist = {start:0}
    while q:
        v = q.popleft()
        for nei in neighbors(v):
            if nei not in dist:
                dist[nei] = dist[v]+1
                q.append(nei)
  mini_example: |-
    В Shortest Path in Binary Matrix каждый шаг в соседнюю клетку стоит 1, поэтому первый приход в цель минимален.
- code: dijkstra_nonnegative
  what_it_is: |-
    Используется для графов с неотрицательными весами. Priority queue всегда извлекает вершину с наименьшей текущей известной дистанцией, после чего её рёбра релаксируются.

    Ключевая идея — более длинный путь к уже окончательно обработанной вершине не сможет улучшить ответ при неотрицательных весах. С отрицательными рёбрами это свойство ломается.
  mental_model: |-
    Храним tentative distances и min-heap (distance, vertex). Извлекая non-stale минимум, релаксируем исходящие рёбра: если путь через v лучше, обновляем distance и heap.
  recognition_cues:
  - нужен shortest/min cost
  - веса рёбер неотрицательны
  - обычный BFS неверен из-за разных стоимостей
  core_invariant: |-
    Когда вершина извлечена с актуальной минимальной дистанцией, эта дистанция окончательна при неотрицательных весах; никакой будущий путь через более далёкую вершину её не уменьшит.
  canonical_skeleton: |-
    dist[start] = 0
    heap = [(0,start)]
    while heap:
        d,v = pop_min(heap)
        if d != dist[v]: continue
        for nei,w in g[v]:
            nd = d+w
            if nd < dist[nei]:
                dist[nei] = nd
                push(heap,(nd,nei))
  mini_example: |-
    В Network Delay Time Dijkstra находит минимальное время сигнала до каждой вершины при неотрицательных задержках.
- code: relaxation_based_paths
  what_it_is: |-
    Подходит для специальных случаев, где обычный BFS недостаточен, а Dijkstra не всегда оптимален или применим. 0-1 BFS использует deque для рёбер веса 0/1; Bellman-Ford многократно релаксирует все рёбра и допускает отрицательные веса.

    Главное — выбирать метод по структуре весов. Эти алгоритмы не являются взаимозаменяемыми, но объединены общей идеей последовательного улучшения расстояний.
  mental_model: |-
    Для 0-1 BFS ребро веса 0 кладёт вершину в начало deque, веса 1 — в конец. Bellman-Ford повторяет релаксацию всех рёбер до V-1 раз и способен выявлять отрицательные циклы.
  recognition_cues:
  - веса только 0/1 либо возможны отрицательные рёбра
  - нужна релаксация вместо обычного greedy-finalization
  - структура весов важнее сюжета
  core_invariant: |-
    dist[v] всегда является верхней границей истинного shortest distance; релаксация только уменьшает её при найденном лучшем пути. После достаточного числа корректных релаксаций все достижимые shortest paths учтены.
  canonical_skeleton: |-
    # Bellman-Ford skeleton
    dist[s] = 0
    for _ in range(V-1):
        changed = False
        for u,v,w in edges:
            if dist[u] != INF and dist[u] + w < dist[v]:
                dist[v] = dist[u] + w
                changed = True
        if not changed: break
  mini_example: |-
    В графе с отрицательным ребром Dijkstra может финализировать вершину слишком рано, а Bellman-Ford позже улучшит её через релаксацию.
- code: subsets_combinations
  what_it_is: |-
    На каждом шаге решаем, какие элементы включить в текущий выбор. В комбинациях часто используется индекс start, чтобы не генерировать один и тот же набор в разных порядках.

    Подходит для задач «сгенерировать все подмножества», «выбрать k элементов», combination sum. Важно различать, можно ли повторно использовать элемент и имеют ли значение дубликаты.
  mental_model: |-
    Рекурсия хранит текущий path и индекс старта. После добавления элемента углубляемся, затем отменяем выбор. start не позволяет переставлять одни и те же выбранные элементы.
  recognition_cues:
  - нужно перечислить subsets/combinations
  - каждый выбор имеет ветки взять/не взять
  - порядок выбранных элементов не важен
  core_invariant: |-
    path содержит одну корректную комбинацию из уже разрешённого диапазона индексов; каждая комбинация генерируется ровно по одному возрастающему пути индексов.
  canonical_skeleton: |-
    def backtrack(start):
        emit(path.copy())
        for i in range(start, n):
            path.append(a[i])
            backtrack(i+1)
            path.pop()
  mini_example: |-
    В Subsets путь индексов 0→2 создаёт {a0,a2}, а перестановка 2→0 никогда не генерируется.
- code: permutations_used_state
  what_it_is: |-
    Строим последовательность по позициям, каждый раз выбирая один из ещё доступных элементов. Состояние used или изменение массива на месте показывает, какие элементы уже вошли в текущую перестановку.

    В отличие от combinations, порядок здесь принципиально важен. При наличии дубликатов требуется дополнительная логика, чтобы не создавать одинаковые перестановки.
  mental_model: |-
    На каждой позиции пробуем любой ещё не использованный элемент. used[i] отмечает элементы текущего path; после возврата флаг снимается.
  recognition_cues:
  - нужно все permutations/orderings
  - порядок важен
  - каждый элемент используется ограниченное число раз
  core_invariant: |-
    path содержит ровно элементы с used=true, каждый не более одного раза; каждая полная последовательность соответствует уникальной цепочке выборов.
  canonical_skeleton: |-
    def backtrack():
        if len(path) == n: emit(path.copy()); return
        for i in range(n):
            if used[i]: continue
            used[i] = True; path.append(a[i])
            backtrack()
            path.pop(); used[i] = False
  mini_example: |-
    В Permutations после выбора 2 первым следующий уровень может выбрать любой из оставшихся элементов, но не 2 повторно.
- code: constraint_placement
  what_it_is: |-
    Элементы размещаются по одному при соблюдении ограничений. Если текущий выбор нарушает правило, ветка немедленно отсекается.

    Классические задачи: N-Queens, Sudoku, раскраски. Эффективность сильно зависит от быстрой проверки ограничений и правильного порядка выбора следующей позиции.
  mental_model: |-
    Выбираем следующую переменную/позицию, перебираем допустимые значения и немедленно отсекаем нарушающие ограничения. Для скорости поддерживаем наборы занятых столбцов, диагоналей и т. п.
  recognition_cues:
  - нужно разместить элементы при жёстких ограничениях
  - ошибку можно выявить до полного решения
  - N-Queens/Sudoku/раскраска
  core_invariant: |-
    Перед каждым рекурсивным вызовом текущее частичное размещение удовлетворяет всем ограничениям; ни одна отсечённая ветка не может быть продолжена до валидного полного решения.
  canonical_skeleton: |-
    def solve(pos):
        if complete(pos): return record()
        for choice in candidates(pos):
            if not allowed(pos, choice): continue
            place(pos, choice)
            solve(next_pos(pos))
            unplace(pos, choice)
  mini_example: |-
    В N-Queens ферзь не ставится в занятый столбец или диагональ, поэтому конфликтная ветка прекращается сразу.
- code: path_construction_word_search
  what_it_is: |-
    Backtracking строит путь через последовательность состояний или соседних клеток. После возврата из рекурсии состояние посещения отменяется, потому что та же клетка может участвовать в другой ветке поиска.

    Типичные задачи: word search, paths in grid, restore IP addresses. Важна разница между глобально посещённой вершиной и вершиной, запрещённой только в текущем пути.
  mental_model: |-
    Добавляем текущий шаг в path и временно помечаем использованные ресурсы. После рекурсивного возврата отменяем метку, чтобы другие независимые ветки могли использовать их снова.
  recognition_cues:
  - нужно построить путь/строку по шагам
  - один объект нельзя повторять в текущем пути
  - grid word search, restore/construct
  core_invariant: |-
    path всегда является корректным текущим маршрутом, а path-local visited содержит ровно элементы, запрещённые для повторного использования в этой ветке.
  canonical_skeleton: |-
    def dfs(state, k):
        if goal(k): return True
        mark(state)
        for nxt in next_states(state):
            if allowed(nxt) and dfs(nxt,k+1): return True
        unmark(state)
        return False
  mini_example: |-
    В Word Search клетка запрещена повторно только внутри текущего пути слова; после backtrack она снова доступна другой стартовой ветке.
- code: sort_then_greedy
  what_it_is: |-
    Сначала данные сортируются по критерию, который делает безопасный локальный выбор очевидным. После этого решение строится одним проходом без возврата к предыдущим решениям.

    Частые примеры: intervals, assigning resources, pairing. Ключевая часть — выбрать правильный ключ сортировки; сортировка «просто по значению» часто не решает задачу.
  mental_model: |-
    Выбираем ключ сортировки, который превращает глобальную задачу в последовательность локальных решений. После сортировки каждый элемент рассматривается один раз и решение не откатывается.
  recognition_cues:
  - после сортировки появляется очевидный безопасный выбор
  - задача на пары/ресурсы/интервалы
  - порядок обработки определяет качество решения
  core_invariant: |-
    После обработки префикса построенное greedy-решение можно включить в некоторое оптимальное решение для этого префикса/всей задачи (обычно доказывается exchange argument).
  canonical_skeleton: |-
    items.sort(key=greedy_key)
    state = init()
    for item in items:
        if can_take(item, state):
            take(item, state)
    return result(state)
  mini_example: |-
    В interval scheduling сортировка по времени окончания позволяет брать самый рано заканчивающийся совместимый интервал и оставлять максимум пространства будущим.
- code: local_choice_invariant
  what_it_is: |-
    На каждом шаге выбирается локально лучший вариант, а корректность держится на сохраняемом инварианте. Такой greedy может не требовать явной сортировки, но должен иметь доказуемую причину, почему прошлый выбор не нужно пересматривать.

    Примеры: jump game, gas station, поддержание лучшей достижимой границы. Главное — уметь сформулировать, какую информацию о прошлом достаточно сохранить.
  mental_model: |-
    Поддерживаем минимальное достаточное состояние, которое доминирует все худшие варианты прошлого. На каждом шаге обновляем его локально и не возвращаемся к отброшенным решениям.
  recognition_cues:
  - можно хранить только лучший локальный агрегат
  - решение идёт одним проходом
  - есть достижимая граница/минимальный баланс/лучший кандидат
  core_invariant: |-
    Хранимое состояние после каждого префикса не хуже любого другого состояния, которое может быть полезно для будущего по выбранному критерию доминирования.
  canonical_skeleton: |-
    state = initial
    for x in data:
        state = greedy_update(state, x)
        if failure(state): return False
    return extract(state)
  mini_example: |-
    В Jump Game farthest — максимальная достижимая позиция по обработанному префиксу; позиции не дальше неё можно безопасно рассматривать.
- code: greedy_scheduling
  what_it_is: |-
    Выбираются события или интервалы так, чтобы максимизировать количество совместимых элементов или минимизировать конфликты. Часто оптимальный критерий — раннее время окончания.

    Подпаттерн встречается в activity selection и scheduling. Важно отличать его от merge intervals: здесь мы выбираем подмножество, а не объединяем диапазоны.
  mental_model: |-
    Обычно сортируем по окончанию и берём следующий интервал, чей start не раньше конца последнего выбранного. Раннее окончание оставляет наибольшую свободу будущим интервалам.
  recognition_cues:
  - нужно выбрать максимум совместимых событий
  - интервалы конфликтуют
  - важно расписание/ресурс
  core_invariant: |-
    Среди решений с тем же числом уже выбранных интервалов greedy-префикс имеет не более позднее время окончания, чем любой конкурент, поэтому не хуже для продолжения.
  canonical_skeleton: |-
    intervals.sort(key=lambda x: x.end)
    last_end = -INF
    for s,e in intervals:
        if s >= last_end:
            choose(s,e)
            last_end = e
  mini_example: |-
    В Non-overlapping Intervals эквивалентно сохранять интервалы с ранними окончаниями и удалять конфликтующие более поздние.
- code: dp_1d_linear
  what_it_is: |-
    Состояние определяется одной основной координатой, обычно позицией i. Значение dp[i] строится из нескольких предыдущих состояний.

    Типичные задачи: climbing stairs, house robber, decode ways. Часто память можно сократить до нескольких переменных, если нужны только последние состояния.
  mental_model: |-
    Определяем точный смысл dp[i], базовые случаи и переход из уже вычисленных индексов. Если нужны только последние k состояний, таблицу можно сжать.
  recognition_cues:
  - состояние задаётся одной позицией/числом
  - ответ i зависит от нескольких меньших состояний
  - climbing/rob/decode
  core_invariant: |-
    После вычисления dp[i] оно равно точному ответу для подзадачи, определённой состоянием i; все состояния, от которых зависит переход, уже корректны.
  canonical_skeleton: |-
    dp = [0]*(n+1)
    dp[0] = base0
    for i in range(1,n+1):
        dp[i] = combine(dp[i-1], dp[i-2] if i>=2 else base)
    return dp[n]
  mini_example: |-
    В House Robber dp[i] = max(dp[i-1], dp[i-2]+money[i]): либо пропускаем дом, либо берём его после совместимого префикса.
- code: dp_2d_grid
  what_it_is: |-
    Состояние задаётся двумя координатами, например dp[r][c]. Ответ для клетки зависит от соседних уже вычисленных клеток.

    Используется для counting paths, minimum path sum и grid transitions. Важно определить правильный порядок заполнения таблицы, чтобы все зависимости были готовы заранее.
  mental_model: |-
    Определяем dp[r][c] и порядок заполнения, при котором все зависимости уже готовы. Часто переход использует top/left/diagonal.
  recognition_cues:
  - grid/table state с двумя координатами
  - ответ клетки зависит от соседних состояний
  - count/min paths
  core_invariant: |-
    После обработки клетки dp[r][c] равен точному ответу для подзадачи, заканчивающейся/ограниченной этой клеткой, на основе уже корректных зависимостей.
  canonical_skeleton: |-
    for r in range(R):
        for c in range(C):
            if r==0 and c==0: continue
            dp[r][c] = combine(
                dp[r-1][c] if r else INF,
                dp[r][c-1] if c else INF)
  mini_example: |-
    В Unique Paths число путей в клетку равно сумме путей сверху и слева.
- code: dp_01_knapsack
  what_it_is: |-
    Каждый элемент можно использовать не более одного раза. Состояние обычно включает количество рассмотренных элементов и текущую сумму/ёмкость.

    Типичные задачи: subset sum, partition equal subset sum. При оптимизации до 1D массива состояния часто обновляют в обратном порядке, чтобы один элемент не использовался повторно в той же итерации.
  mental_model: |-
    Состояние хранит достижимость или лучший результат для capacity/sum. При 1D-оптимизации capacity идёт назад, чтобы текущий item не использовался повторно в этой же итерации.
  recognition_cues:
  - каждый item можно взять максимум один раз
  - subset sum/partition/capacity
  - есть выбор take vs skip
  core_invariant: |-
    После обработки первых i items dp[c] описывает точный лучший/достижимый результат с использованием каждого из этих items не более одного раза.
  canonical_skeleton: |-
    dp = [False]*(target+1)
    dp[0] = True
    for x in items:
        for s in range(target, x-1, -1):
            dp[s] = dp[s] or dp[s-x]
  mini_example: |-
    В Partition Equal Subset Sum обратный цикл по суммам не позволяет одному числу создать dp[s] и тут же использовать себя ещё раз.
- code: dp_unbounded_knapsack
  what_it_is: |-
    Каждый тип элемента можно использовать многократно. Поэтому переходы допускают повторное использование текущего элемента.

    Примеры: coin change, combinations to target. Порядок циклов влияет на смысл результата: можно считать комбинации или последовательности, и это принципиально разные задачи.
  mental_model: |-
    Переход разрешает повторное использование текущего item. В 1D DP движение capacity вперёд позволяет уже обновлённому состоянию текущей итерации участвовать снова.
  recognition_cues:
  - один тип можно использовать многократно
  - coins/cuts/repeated choices
  - unbounded capacity
  core_invariant: |-
    После обработки текущего набора типов dp[c] учитывает любое допустимое число копий этих типов; порядок циклов соответствует тому, считаем ли комбинации или последовательности.
  canonical_skeleton: |-
    dp = [INF]*(amount+1)
    dp[0] = 0
    for coin in coins:
        for s in range(coin, amount+1):
            dp[s] = min(dp[s], dp[s-coin]+1)
  mini_example: |-
    В Coin Change dp[s-coin] может уже включать тот же coin, что и позволяет использовать монету повторно.
- code: dp_sequence_lis_lcs
  what_it_is: |-
    DP описывает отношения внутри одной последовательности или между двумя последовательностями. Состояние часто отвечает на вопрос о лучшем результате на префиксе или при конкретной последней позиции.

    Классические семейства: longest increasing subsequence, longest common subsequence, edit-like задачи. Важно точно определить, что означает индекс и учитывается ли текущий элемент в состоянии.
  mental_model: |-
    Формулируем состояние по позициям. Для LCS dp[i][j] — ответ на первых i,j символах; для LIS состояние может означать лучший ответ, заканчивающийся в i, либо минимальный tail длины.
  recognition_cues:
  - longest/shortest subsequence
  - две последовательности сравниваются по префиксам
  - LIS/LCS/edit-like relation
  core_invariant: |-
    Каждое состояние полностью описывает выбранные префиксы/конечную позицию и не зависит от будущих элементов; переход рассматривает все способы использовать или пропустить текущий элемент.
  canonical_skeleton: |-
    # LCS skeleton
    for i in range(1,n+1):
        for j in range(1,m+1):
            if a[i-1] == b[j-1]: dp[i][j] = dp[i-1][j-1]+1
            else: dp[i][j] = max(dp[i-1][j], dp[i][j-1])
  mini_example: |-
    В Longest Common Subsequence при несовпадении последних символов оптимум обязан пропустить хотя бы один из них.
- code: dp_state_machine_interval
  what_it_is: |-
    State-machine DP добавляет небольшое число режимов, например «держим акцию / не держим». Interval DP строит ответ для диапазона [l, r] из меньших диапазонов.

    Это более сложные формы DP, где одной позиции недостаточно. Главный навык — выбрать минимальное состояние, которое полностью описывает всё необходимое будущее.
  mental_model: |-
    Для state-machine DP добавляем небольшой mode (holding, not_holding и т. п.). Для interval DP увеличиваем длину диапазона и объединяем меньшие интервалы. Это две формы многомерного состояния, где дополнительная координата необходима для будущих решений.
  recognition_cues:
  - одной позиции недостаточно — есть режим/фаза
  - buy/sell/hold/cooldown
  - или ответ строится по диапазонам [l,r]
  core_invariant: |-
    Состояние содержит всю и только необходимую информацию о прошлом: одинаковые состояния имеют одинаковые допустимые будущие продолжения и оптимальный остаточный ответ.
  canonical_skeleton: |-
    # state-machine
    for x in data:
        new0 = best(state0, transition_from_state1(x))
        new1 = best(state1, transition_from_state0(x))
        state0, state1 = new0, new1

    # interval DP
    for length in range(1,n+1):
        for l in range(n-length+1):
            r = l+length-1
            dp[l][r] = best_over_splits(l,r)
  mini_example: |-
    В Best Time to Buy and Sell Stock with Cooldown одинаковый день имеет разные будущие возможности в состояниях holding, sold, rest.
- code: trie_prefix_search
  what_it_is: |-
    Строки хранятся в дереве по символам, и общие префиксы используют общие узлы. Это позволяет быстро проверять наличие слова, префикса или находить кандидатов по началу строки.

    Подходит для autocomplete, dictionary search, word search with many words. Цена — дополнительная память, поэтому для малого числа запросов обычный Set может быть проще.
  mental_model: |-
    Каждый узел содержит переходы по символам. Вставка и поиск идут от root по символам; is_end отличает полное слово от простого префикса.
  recognition_cues:
  - много запросов по префиксам
  - autocomplete/dictionary
  - несколько слов разделяют начала
  core_invariant: |-
    Путь от root до любого узла однозначно кодирует префикс; все вставленные слова с этим префиксом проходят через этот узел.
  canonical_skeleton: |-
    insert(word):
        node = root
        for ch in word:
            node = node.child.setdefault(ch, Node())
        node.is_end = True

    search_prefix(p):
        follow children for each char
  mini_example: |-
    В Implement Trie app может существовать как префикс apple, даже если is_end для app ложен.
- code: rolling_hash_rabin_karp
  what_it_is: |-
    Подстрока представляется числовым хешем, который можно быстро обновлять при сдвиге окна. Это позволяет сравнивать множество подстрок без посимвольной проверки каждой из них.

    Используется для поиска шаблона, повторяющихся подстрок и binary search по длине подстроки. Нужно учитывать возможность коллизий и при необходимости применять двойное хеширование или финальную проверку.
  mental_model: |-
    Кодируем окно polynomial hash. При сдвиге удаляем вклад ушедшего символа, умножаем/сдвигаем базу и добавляем новый; либо используем prefix hashes для O(1) hash-range.
  recognition_cues:
  - много сравнений подстрок одинаковой длины
  - поиск repeated substring/pattern
  - нужно быстро сдвигать окно
  core_invariant: |-
    Поддерживаемый hash точно соответствует текущему окну по выбранной формуле modulo; равные строки имеют равные hashes, но обратное требует учёта коллизий.
  canonical_skeleton: |-
    h = hash(first_window)
    for i in range(k,n):
        h = roll(h, outgoing=s[i-k], incoming=s[i])
        if h == target_hash:
            verify_if_needed(i-k+1)
  mini_example: |-
    В Rabin–Karp совпадение hash шаблона и окна создаёт кандидата; при одиночном modulus строку при необходимости сравнивают напрямую.
- code: kmp_prefix_function
  what_it_is: |-
    Алгоритм сохраняет информацию о том, какая часть уже совпавшего префикса может быть переиспользована после несовпадения. Поэтому указатель по тексту не возвращается назад.

    Подходит для линейного поиска шаблона и задач на структуру префикс–суффикс. Центральная структура — prefix function / failure links.
  mental_model: |-
    Строим prefix function pi, где pi[i] — длина длиннейшего собственного префикса шаблона, равного суффиксу до i. На mismatch откатываем j = pi[j-1], не двигая текст назад.
  recognition_cues:
  - поиск pattern в text за линейное время
  - важны prefix=suffix отношения
  - после mismatch нельзя терять весь прогресс
  core_invariant: |-
    Перед сравнением text[i] величина j равна длине длиннейшего префикса pattern, совпадающего с суффиксом уже обработанной части текста.
  canonical_skeleton: |-
    j = 0
    for ch in text:
        while j > 0 and ch != pat[j]:
            j = pi[j-1]
        if ch == pat[j]: j += 1
        if j == len(pat): report_match()
  mini_example: |-
    Если после совпадения abab следующий символ ломает шаблон, KMP переиспользует границу ab, а не начинает сравнение с нуля.
- code: xor_cancellation
  what_it_is: |-
    Используются свойства x ^ x = 0 и x ^ 0 = x. Парные одинаковые значения взаимно уничтожаются, оставляя уникальный элемент или полезный агрегат.

    Классические задачи: single number, missing-like constructions. Подпаттерн работает только при подходящей структуре повторений; сам по себе XOR не заменяет counting.
  mental_model: |-
    Накапливаем XOR всех значений. Порядок не важен, одинаковые пары дают ноль, а 0 ^ x = x.
  recognition_cues:
  - все значения встречаются парно кроме исключения
  - важна parity повторений
  - XOR явно совместим с условием
  core_invariant: |-
    После обработки префикса accumulator равен XOR тех значений, которые встречались нечётное число раз в этом префиксе.
  canonical_skeleton: |-
    acc = 0
    for x in a:
        acc ^= x
    return acc
  mini_example: |-
