- code: sign_marking_index_encoding
  what_it_is: |-
    Сам массив используется как дополнительная память: знак или преобразованное значение кодирует факт посещения.
  mental_model: |-
    По значению вычисляем индекс и изменяем элемент там, например делаем отрицательным. Повторная отметка раскрывает дубликат.
