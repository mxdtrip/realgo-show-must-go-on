- code: low_link_bridges_articulation
  what_it_is: |-
    DFS вычисляет, может ли поддерево вернуться к более раннему предку обхода без конкретного ребра или вершины.
  mental_model: |-
    Храним время входа `tin` и минимально достижимое время `low`. По их сравнению определяем критические связи.
  recognition_cues:
  - bridge
  - critical connection
  - articulation point
  - что разрушит связность при удалении
  anti_cues:
  - Если нужна просто компонентность без анализа критических связей.
  core_invariant: |-
    `low` отвечает: насколько высоко поддерево умеет вернуться обходным путём.
  canonical_skeleton: |-
    dfs(v,parent_edge):
        tin[v]=low[v]=timer++
        for edge v->to:
            if edge==parent_edge: continue
            if visited[to]: low[v]=min(low[v],tin[to])
            else:
                dfs(to,edge)
                low[v]=min(low[v],low[to])
                if low[to]>tin[v]: bridge(v,to)
  mini_example: |-
    Если из поддерева ребёнка нельзя вернуться выше родителя, ребро к ребёнку является мостом.

