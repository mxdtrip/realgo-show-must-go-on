# Realgo Taxonomy: методический материал субпаттернов.
# Канон v2 = realgo_111_subpatterns_study_first_v3.md (все 111 узлов
# realgo-v2, редакция 3). Структура: что это -> как распознать -> ключевая
# механика -> инвариант -> мини-пример; anti_cues = "когда не подходит" +
# "не путать" склеены в один список. canonical_skeleton, common_mistakes и
# dont_confuse_with не покрыты источником v3 и перенесены как есть из
# предыдущей редакции (пережили перегенерацию).
code: realgo_atlas_content
title: Realgo Atlas Learning Materials
materials:
- code: frequency_map_counting
  what_it_is: |-
    Используется, когда важно знать, сколько раз встречается каждый элемент. Мы строим отображение value → count и затем принимаем решения на основе частот: сравниваем две строки, ищем наиболее частые элементы, проверяем анаграммы или контролируем состав текущего состояния.

    Ключевая особенность — нас интересует не просто факт наличия элемента, а его количество. Если достаточно ответа «есть / нет», чаще подходит Set и подпаттерн Membership & Deduplication.
  mental_model: Проходим данные и обновляем count[x]. Затем используем частоты напрямую либо сравниваем две карты. Если алфавит мал и фиксирован, массив счётчиков обычно проще Hash Map.
  recognition_cues:
  - нужно считать появления элементов
  - сравниваются частоты двух наборов/строк
  - ответ зависит от most/least frequent или точного количества
  core_invariant: После обработки первых i элементов count[x] равен точному числу появлений x в этом префиксе.
  canonical_skeleton: |-
    count = {}
    for x in data:
        count[x] = count.get(x, 0) + 1

    use(count)
  mini_example: В Valid Anagram считаем символы первой строки и уменьшаем счётчики по второй; все итоговые значения должны стать нулём.
- code: membership_deduplication
  what_it_is: |-
    `Set` хранит факт: **видели значение раньше или нет**.
  mental_model: |-
    Перед обработкой `x` проверяем `x in seen`, затем при необходимости добавляем `x`.
  recognition_cues:
  - дубликаты
  - уникальные элементы
  - пересечение множеств
  - вопрос «встречалось ли X?»
  anti_cues:
  - Если требуется порядок, predecessor/successor или минимум/максимум в динамическом наборе.
  - Если нужен индекс, количество, последний момент появления или связанное значение — `Set` уже недостаточен, нужна `Hash Map`.
  core_invariant: |-
    `seen` содержит ровно те значения, которые уже были обработаны и должны считаться известными.
  canonical_skeleton: |-
    seen = set()
    for x in data:
        if x in seen:
            handle_repeat(x)
        seen.add(x)
  mini_example: |-
    В `[4, 1, 7, 4]` второй `4` обнаруживается мгновенно: первый уже в `seen`.
- code: complement_lookup
  what_it_is: |-
    Для текущего элемента вычисляем, **какого партнёра не хватает до ответа**, и ищем именно его.
  mental_model: |-
    Для `x` считаем `need = target - x`. Проверяем, встречался ли `need`, затем сохраняем текущий элемент и нужную метаинформацию.
  recognition_cues:
  - пара с заданной суммой
  - для `x` можно вычислить `need`
  - двойной перебор слишком медленный
  - нужно вернуть индексы ранее встреченных значений
  anti_cues:
  - Если условие пары нельзя выразить через компактный `need`, нужен ближайший элемент в порядке или требуются все комбинации с более сложными ограничениями.
  - Sorted Two Pointers тоже ищет пару, но использует порядок массива. Complement Lookup использует прямой вычисляемый ключ.
  core_invariant: |-
    Не перебирай всех партнёров текущего элемента; вычисли единственного нужного партнёра.
  canonical_skeleton: |-
    pos = {}
    for i, x in enumerate(data):
        need = target - x
        if need in pos:
            return pos[need], i
        pos[x] = i
  mini_example: |-
    Для `target = 9`, увидев `2`, ищем `7`. Когда приходит `7`, пара готова.
- code: opposite_direction_pointers
  what_it_is: |-
    Два указателя стартуют с противоположных концов диапазона и движутся навстречу друг другу. Подходит, когда сравнение текущей пары позволяет понять, какую сторону безопасно сдвинуть и тем самым исключить множество вариантов.

    Частые задачи: pair sum в отсортированном массиве, палиндромы, container with most water. Ключевое условие — должна существовать причина, почему движение конкретного указателя не пропустит лучший ответ.
  mental_model: Ставим left и right на края. По текущему условию двигаем только ту сторону, изменение которой может приблизить к цели или улучшить ответ. Это решение требует явного обоснования безопасного исключения вариантов.
  recognition_cues:
  - массив отсортирован или есть монотонная реакция на движение указателя
  - ищется пара с двух концов
  - сравниваются симметричные элементы
  core_invariant: После каждого сдвига все пары, использующие отброшенный край в исключённой области, доказуемо не могут дать ещё не рассмотренный подходящий/лучший ответ.
  canonical_skeleton: |-
    left, right = 0, n - 1
    while left < right:
        state = evaluate(a[left], a[right])
        if good(state): return answer
        if need_larger(state): left += 1
        else: right -= 1
  mini_example: В Two Sum II сумма мала — двигаем left, потому что при фиксированном левом элементе уменьшение right сумму не увеличит.
- code: same_direction_read_write
  what_it_is: |-
    Один указатель читает все элементы, второй показывает, **куда записать следующий сохраняемый элемент**.
  mental_model: |-
    `read` проходит весь вход. Когда элемент нужно сохранить, записываем его в `a[write]` и увеличиваем `write`.
  recognition_cues:
  - изменить массив на месте
  - удалить элементы/дубликаты
  - сохранить относительный порядок оставшихся
  - вернуть новую логическую длину
  anti_cues:
  - Если итоговый порядок существенно меняется или для решения нужна глобальная перестановка.
  - 'Это не sliding window: между `read` и `write` нет обязательно «текущего окна» с локальным условием.'
  core_invariant: |-
    Префикс `[0, write)` уже содержит ровно правильный результат для обработанной части входа.
  canonical_skeleton: |-
    write = 0
    for read in range(n):
        if keep(a[read]):
            a[write] = a[read]
            write += 1
    return write
  mini_example: |-
    При удалении нулей `read` видит всё, а `write` подряд собирает ненулевой префикс.
- code: fast_slow_pointers
  what_it_is: |-
    Два указателя идут по одной цепочке переходов с разной скоростью. Подпаттерн имеет три типичных применения: **середина**, **обнаружение цикла**, **вход в цикл**.
  mental_model: |-
    **Середина:** `slow += 1`, `fast += 2`; когда `fast` закончил путь, `slow` прошёл примерно половину.

    **Цикл:** если путь входит в кольцо, быстрый указатель неизбежно догонит медленный внутри кольца.

    **Вход в цикл:** после встречи один указатель ставим в начало, затем оба двигаем по одному; их следующая встреча — вход в цикл.
  recognition_cues:
  - linked list
  - повторяющееся применение `next`
  - нельзя тратить `O(n)` памяти на visited set
  - нужно найти middle/cycle/cycle entry
  anti_cues:
  - Если из состояния есть несколько следующих состояний или нужно помнить множество ветвей.
  - Visited Set проще для произвольного графа состояний. Fast/Slow требует одной детерминированной цепочки `next`.
  core_invariant: |-
    Разность скоростей превращает скрытую периодичность в наблюдаемую встречу.
  canonical_skeleton: |-
    slow = fast = head
    while fast and fast.next:
        slow = slow.next
        fast = fast.next.next
        if slow is fast:
            return True
    return False
  mini_example: |-
    В списке `1→2→3→4→2...` быстрый указатель рано или поздно догонит медленный внутри цикла; это доказывает наличие кольца, но не сразу его начало.
- code: fixed_size_window
  what_it_is: |-
    Окно всегда содержит ровно `k` соседних элементов.
  mental_model: |-
    При сдвиге один элемент выходит слева, один входит справа. Состояние обновляется дельтой, а не пересчитывается.
  recognition_cues:
  - непрерывный участок
  - размер `k` задан заранее
  - нужно проверить все участки длины `k`
  anti_cues:
  - Если размер подходящего участка неизвестен и должен адаптироваться.
  - Variable Window меняет длину, чтобы восстановить условие. Здесь длина фиксирована.
  core_invariant: |-
    Перед оценкой ответа состояние описывает ровно последние `k` элементов.
  canonical_skeleton: |-
    state = init()
    for right, x in enumerate(a):
        add(x)
        if right >= k: remove(a[right-k])
        if right >= k-1: update_answer(state)
  mini_example: |-
    Сумма окна длины `3`: `new_sum = old_sum - left_out + right_in`.
- code: longest_valid_window
  what_it_is: |-
    Ищем самый длинный непрерывный участок, удовлетворяющий условию. Правая граница расширяет, левая чинит нарушение.
  mental_model: |-
    Добавляем `right`. Пока окно невалидно, двигаем `left` и удаляем его вклад. После восстановления обновляем максимум.
  recognition_cues:
  - '`longest` / `maximum length`'
  - условие можно обновлять при добавлении и удалении
  - если окно нарушилось, удаление слева способно вернуть валидность
  anti_cues:
  - Если валидность немонотонна относительно удаления слева.
  - Shortest Valid Window сжимается **пока условие остаётся истинным**, чтобы уменьшить ответ. Здесь сжатие обычно нужно только для восстановления валидности.
  core_invariant: |-
    После цикла сжатия текущее окно валидно; все более левые старты для этого `right` уже либо проверены, либо доказанно плохи.
  canonical_skeleton: |-
    left = 0
    for right in range(n):
        add(a[right])
        while not valid():
            remove(a[left]); left += 1
        ans = max(ans, right-left+1)
  mini_example: |-
    Longest substring without repeats: добавили дубль — двигаем `left`, пока повтор не исчезнет.
- code: shortest_valid_window
  what_it_is: |-
    Ищем самый короткий участок, который уже удовлетворяет условию.
  mental_model: |-
    Расширяем `right`, пока окно невалидно. Когда стало валидным, обновляем минимум и продолжаем сжимать слева до первого нарушения.
  recognition_cues:
  - '`minimum length` / `smallest window`'
  - как только условие достигнуто, можно выкидывать лишнее слева
  - добавление справа обычно не разрушает уже достигнутый порог
  anti_cues:
  - Если условие нельзя предсказуемо поддерживать при сжатии.
  - 'Для суммы на числах с отрицательными значениями обычный sliding window часто ломается: удаление слева не имеет монотонного эффекта.'
  core_invariant: |-
    Для каждого `right` мы пытаемся найти самый правый `left`, при котором окно ещё валидно.
  canonical_skeleton: |-
    left = 0
    for right in range(n):
        add(a[right])
        while valid():
            ans = min(ans, right-left+1)
            remove(a[left]); left += 1
  mini_example: |-
    Минимальный подмассив с суммой ≥ `S` на положительных числах: набрали порог — выкидываем слева, пока можем.
- code: frequency_coverage_window
  what_it_is: |-
    Окно валидно, когда содержит нужные элементы **в нужном количестве**.
  mental_model: |-
    Храним `need[x]` и `window[x]`. Полезно иметь:

    - `required` — сколько разных требований существует;

    - `formed` — сколько требований сейчас полностью выполнено.

    `formed` меняется только в моменты пересечения порога. Например, для `need[A]=2` переход `window[A]: 1→2` увеличивает `formed`, а `2→3` уже нет.
  recognition_cues:
  - '`minimum window substring`'
  - анаграммы в строке
  - шаблон должен быть покрыт текущим окном
  - важны локальные частоты
  anti_cues:
  - Если нужен фиксированный размер без отдельного покрытия или условие не локализуется в частотах окна.
  - Longest Valid Window может хранить частоты, но там частоты — средство проверки ограничения. Здесь сама суть задачи — покрытие набора требований.
  core_invariant: |-
    Окно покрывает шаблон тогда и только тогда, когда `formed == required`.
  canonical_skeleton: |-
    need = counts(target)
    window = {}; formed = 0
    for right in range(n):
        add_and_update(s[right])
        while formed == required:
            update_answer()
            remove_and_update(s[left]); left += 1
  mini_example: |-
    Для `AABC`: `required = 3` типа символов (`A,B,C`), но `A` считается выполненным только когда в окне минимум две `A`.
- code: prefix_sum_range_query
  what_it_is: |-
    Заранее считаем накопленные суммы, чтобы любой статический диапазон получать по двум значениям.
  mental_model: |-
    Удобная полуинтервальная форма:

    prefix[0] = 0

    prefix[i+1] = prefix[i] + a[i]

    sum(l..r) = prefix[r+1] - prefix[l]
  recognition_cues:
  - много запросов суммы на `[l,r]`
  - массив почти не меняется
  - повторный проход по каждому диапазону слишком дорог
  anti_cues:
  - 'При частых обновлениях элементов: пересчёт хвоста префиксов дорог.'
  - Prefix Balance + Hash Map ищет **неизвестные** подходящие границы по значениям префиксов. Обычный Prefix Sum отвечает на уже заданные `[l,r]`.
  core_invariant: |-
    `prefix[i]` хранит агрегат первых `i` элементов; диапазон — это большой префикс минус лишний левый.
  canonical_skeleton: |-
    prefix = [0]*(n+1)
    for i, x in enumerate(a):
        prefix[i+1] = prefix[i] + x

    def range_sum(l, r):
        return prefix[r+1] - prefix[l]
  mini_example: |-
    Для `[2,4,1,3]`: `sum(1..3) = prefix[4] - prefix[1] = 10 - 2 = 8`.
- code: prefix_balance_hashmap
  what_it_is: |-
    Преобразуем задачу о подмассиве в задачу о **двух префиксных состояниях**.
  mental_model: |-
    Если текущий префикс равен `P`, то для суммы `target` нужен прошлый префикс `P-target`.

    В зависимости от ответа карта хранит:

    - **самый ранний индекс** — для максимальной длины;

    - **число появлений префикса** — для количества подмассивов.
  recognition_cues:
  - подмассив с суммой `target`
  - равное число двух типов
  - longest/number of subarrays по условию на сумму или баланс
  - границы заранее неизвестны
  anti_cues:
  - Если состояние нельзя компактно представить накопленным значением.
  - Sliding Window на сумме обычно требует монотонности, например положительных чисел. Prefix + Map работает и с отрицательными.
  core_invariant: |-
    Подмассив между `j+1` и `i` определяется разностью двух префиксных состояний.
  canonical_skeleton: |-
    freq = {0: 1}
    p = ans = 0
    for x in a:
        p += x
        ans += freq.get(p-target, 0)
        freq[p] = freq.get(p, 0) + 1
  mini_example: |-
    Если `prefix[i]=12`, а нужен подмассив суммы `5`, ищем ранее встречавшийся префикс `7`.
- code: difference_array
  what_it_is: |-
    Много обновлений диапазонов выполняются через отметки **начала** и **конца** влияния.
  mental_model: |-
    Для инклюзивного диапазона:

    diff[l] += v

    if r + 1 < n:

        diff[r+1] -= v

    Затем prefix sum по `diff` восстанавливает итоговый массив.
  recognition_cues:
  - операции `add v to [l,r]`
  - итог нужен после всех обновлений
  - обновлять каждую позицию каждого диапазона слишком дорого
  anti_cues:
  - Если после каждого update сразу нужен query по диапазону.
  - Lazy Segment Tree нужен, когда между обновлениями есть онлайн-запросы. Difference Array обычно офлайн.
  core_invariant: |-
    `diff[i]` хранит изменение активного эффекта в точке `i`, а не само итоговое значение.
  canonical_skeleton: |-
    diff = [0]*(n+1)
    for l, r, delta in updates:
        diff[l] += delta
        if r+1 < n: diff[r+1] -= delta
    cur = 0
    for i in range(n):
        cur += diff[i]
        a[i] += cur
  mini_example: |-
    `+5` на `[2,4]`: ставим `+5` в `2`, `-5` в `5`; между ними накопленный эффект равен пяти.
- code: exact_search_monotone
  what_it_is: |-
    Ищем конкретное значение в отсортированном пространстве.
  mental_model: |-
    Сравниваем `a[mid]` с target. Одна половина после сравнения гарантированно не содержит ответ.
  recognition_cues:
  - данные отсортированы
  - сравнение с `mid` однозначно говорит, какую половину отбросить
  - нужен индекс/факт наличия
  anti_cues:
  - Если нет порядка/монотонного свойства, позволяющего безопасно отбрасывать половину.
  - Lower Bound ищет **границу**, даже если точного target нет.
  core_invariant: |-
    Если target существует, он всегда остаётся внутри текущего поискового диапазона.
  canonical_skeleton: |-
    lo, hi = 0, n-1
    while lo <= hi:
        mid = lo + (hi-lo)//2
        if a[mid] == target: return mid
        if a[mid] < target: lo = mid+1
        else: hi = mid-1
    return -1
  mini_example: |-
    `a[mid] < target` в возрастающем массиве доказывает, что весь левый префикс до `mid` бесполезен.
- code: lower_upper_bound
  what_it_is: |-
    Binary Search ищет не обязательно элемент, а **первую позицию, где меняется истинность предиката**.
  mental_model: |-
    Представляем индексы как:

    false false false true true true

                      ^

                   граница

    `lower_bound(x)` — первый индекс с `a[i] >= x`; `upper_bound(x)` — первый с `a[i] > x`.
  recognition_cues:
  - первый `>= x`
  - первый `> x`
  - последний `< x`
  - граница блока одинаковых значений
  anti_cues:
  - Если истинность предиката переключается много раз.
  - Exact Search отвечает «где x?». Bound Search отвечает «где начинается область значений, удовлетворяющих условию?»
  core_invariant: |-
    Формулируй точный булев предикат и ищи его первую истинную позицию.
  canonical_skeleton: |-
    lo, hi = 0, n
    while lo < hi:
        mid = (lo+hi)//2
        if pred(mid): hi = mid
        else: lo = mid+1
    return lo
  mini_example: |-
    В `[1,2,2,2,5]` `lower_bound(2)=1`, `upper_bound(2)=4`; число двоек равно `4-1=3`.
- code: binary_search_on_answer
  what_it_is: |-
    Ищем не элемент входа, а **минимально/максимально допустимое значение ответа**.
  mental_model: |-
    Определяем пространство ответов `[lo,hi]` и предикат. Например:

    false false false true true true

    ищем первое `true`.
  recognition_cues:
  - «минимизировать максимум»
  - «максимизировать минимум»
  - можно быстро проверить `feasible(x)`
  - при увеличении `x` выполнимость меняется монотонно
  anti_cues:
  - Если `feasible(x)` может стать true, потом false, потом снова true.
  - Greedy часто находится **внутри** `feasible`, но основной внешний механизм всё равно Binary Search on Answer.
  core_invariant: |-
    Сначала докажи монотонность `feasible(x)`, только потом запускай binary search.
  canonical_skeleton: |-
    lo, hi = min_answer, max_answer
    while lo < hi:
        mid = (lo+hi)//2
        if feasible(mid): hi = mid
        else: lo = mid+1
    return lo
  mini_example: |-
    Минимальная скорость: если скорость `v` успевает, любая большая скорость тоже успевает.
- code: rotated_peak_search
  what_it_is: |-
    Три родственника Binary Search, но с разными причинами выбора половины. Их нужно различать.
  mental_model: |-
    На каждом шаге сначала определяем **структурный факт** о `mid` — какая половина отсортирована, куда направлен склон или какая сторона виртуального пространства допустима — и только затем отбрасываем половину.
  recognition_cues:
  - вход почти отсортирован, но циклически сдвинут
  - нужен локальный peak
  - массива как такового нет, но проверка по `mid` отсекает сторону
  - обычное сравнение `a[mid]` с target недостаточно
  anti_cues:
  - При дубликатах rotated search может терять сильное различение половин и требовать специальных случаев.
  - Binary Search on Answer ищет границу выполнимости по значениям ответа. Peak Search ищет локальную структурную точку.
  core_invariant: |-
    Не используй «магический binary search»: для каждого варианта назови конкретный факт, который делает одну половину безопасно отбрасываемой.
  canonical_skeleton: |-
    lo, hi = 0, n-1
    while lo < hi:
        mid = (lo+hi)//2
        if goes_right(mid): lo = mid+1
        else: hi = mid
    return lo
  mini_example: |-
    Для peak: если `a[mid] < a[mid+1]`, справа обязательно существует вершина не ниже текущего подъёма.
- code: merge_overlapping_intervals
  what_it_is: |-
    После сортировки объединяем интервалы, которые пересекаются или соприкасаются по правилам задачи.
  mental_model: |-
    Сортируем по началу. Поддерживаем последний объединённый интервал `[L,R]`:

    - если `next.start <= R`, расширяем `R = max(R, next.end)`;

    - иначе закрываем текущий блок и начинаем новый.
  recognition_cues:
  - overlapping intervals
  - union of ranges
  - нужно получить непересекающееся покрытие
  anti_cues:
  - Если запросы динамические и интервалы постоянно добавляются/удаляются.
  - Sweep Line обычно считает активные события/перекрытия, а не строит сами объединённые интервалы.
  core_invariant: |-
    Все уже обработанные интервалы представлены минимальным непересекающимся списком, а последний блок — единственный, который ещё может слиться со следующим.
  canonical_skeleton: |-
    intervals.sort(key=start)
    res = []
    for s,e in intervals:
        if not res or s > res[-1][1]: res.append([s,e])
        else: res[-1][1] = max(res[-1][1], e)
  mini_example: |-
    `[1,4]` и `[3,6]` после сортировки сливаются в `[1,6]`.
- code: interval_insertion_intersection
  what_it_is: |-
    Работаем с уже упорядоченными интервалами: вставляем новый диапазон или пересекаем два списка.
  mental_model: |-
    **Insertion:**

    1. копируем интервалы строго слева;

    2. сливаем все пересекающиеся с новым;

    3. копируем оставшиеся справа.

    **Intersection двух списков:**

    - пересечение `[a1,a2]` и `[b1,b2]` равно `[max(a1,b1), min(a2,b2)]`, если левая граница ≤ правой;

    - двигаем указатель интервала, который заканчивается раньше.
  recognition_cues:
  - интервалы уже sorted/non-overlapping
  - вставить один новый interval
  - найти intersection двух interval lists
  anti_cues:
  - Если вход не упорядочен и содержит произвольные перекрытия — сначала нужна сортировка/merge.
  - Merge Intervals сначала решает глобальную проблему перекрытий внутри одного набора.
  core_invariant: |-
    Упорядоченность позволяет навсегда забыть интервал, чей правый конец уже раньше.
  canonical_skeleton: |-
    i = j = 0
    while i < len(A) and j < len(B):
        lo = max(A[i].start, B[j].start)
        hi = min(A[i].end, B[j].end)
        if lo <= hi: emit(lo, hi)
        if A[i].end < B[j].end: i += 1
        else: j += 1
  mini_example: |-
    `[1,5] ∩ [3,7] = [3,5]`; после этого двигаем интервал `[1,5]`, потому что он закончился раньше.
- code: sweep_line_event_counting
  what_it_is: |-
    Интервалы превращаются в события на оси: «что-то началось» и «что-то закончилось». Затем идём слева направо и поддерживаем активное состояние.
  mental_model: |-
    Создаём события `(coordinate, delta)` и сортируем. Но **порядок событий при одинаковой координате — часть модели**.

    Например, для полуинтервалов `[start,end)` встреча, закончившаяся в `10`, освобождает комнату для встречи, начинающейся в `10`: событие `end` должно учитываться до `start`.

    Для закрытых интервалов правила могут быть другими.
  recognition_cues:
  - максимум одновременных событий
  - количество активных интервалов
  - union length
  - встречи/бронирования/перекрытия
  anti_cues:
  - Если события приходят онлайн и нужна динамическая обработка без возможности полной сортировки.
  - Merge Intervals строит объединённые блоки. Sweep Line поддерживает состояние между событиями и может считать максимум, площадь, длину покрытия.
  core_invariant: |-
    После обработки всех событий в координате `x` счётчик `active` точно описывает выбранную семантику «что активно около x».
  canonical_skeleton: |-
    events = []
    for s,e in intervals:
        events += [(s,+1),(e,-1)]
    events.sort(key=tie_rule)
    active = best = 0
    for x,delta in events:
        active += delta
        best = max(best, active)
  mini_example: |-
    `(+1)` на старте встречи и `(-1)` на конце; максимум prefix sum по событиям — число одновременно занятых комнат.
- code: matching_nesting_stack
  what_it_is: |-
    Стек хранит незакрытые конструкции: скобки, теги, вложенные блоки.
  mental_model: |-
    Открывающий токен кладём в стек. На закрывающем проверяем вершину: именно она обязана быть парой.
  recognition_cues:
  - matching pairs
  - nested structure
  - ближайшее незакрытое открытие должно закрыться первым
  anti_cues:
  - Если соответствие не вложенное, а произвольное.
  - Expression Stack может хранить операторы по приоритету, а не только пары.
  core_invariant: |-
    Стек содержит незакрытые конструкции в порядке вложенности; вершина — ближайшая ожидающая закрытия.
  canonical_skeleton: |-
    stack = []
    for ch in s:
        if is_open(ch): stack.append(ch)
        else:
            if not stack or not matches(stack[-1], ch): return False
            stack.pop()
    return not stack
  mini_example: |-
    В `([{}])` каждая закрывающая скобка совпадает с вершиной стека.
- code: expression_evaluation_stack
  what_it_is: |-
    Стек помогает вычислять выражения, когда операции имеют вложенность и приоритет.
  mental_model: |-
    **Postfix/RPN:** число кладём в стек; оператор снимает нужное число аргументов, вычисляет и возвращает результат.

    2 3 + 4 *

    => (2+3)*4

    **Infix:** обычно есть стек чисел и стек операторов. Перед добавлением нового оператора выполняем операции с более высоким (или равным, для left-associative) приоритетом.

    Скобка создаёт временную границу: операции внутри должны завершиться до выхода наружу.
  recognition_cues:
  - calculator
  - postfix/RPN
  - infix expression
  - parentheses and operator precedence
  anti_cues:
  - Если грамматика сложнее простых операторов и скобок — нужен полноценный parser.
  - Finite-State Parser распознаёт токены и грамматические состояния; evaluation stack непосредственно строит/вычисляет выражение.
  core_invariant: |-
    В стеке остаётся только то, что пока нельзя безопасно вычислить из-за будущего контекста.
  canonical_skeleton: |-
    stack = []
    for token in tokens:
        if is_number(token): stack.append(value(token))
        else:
            b = stack.pop(); a = stack.pop()
            stack.append(apply(token, a, b))
    return stack[-1]
  mini_example: |-
    Для `2 + 3 * 4` нельзя сразу выполнять `2+3`; стек приоритетов заставляет сначала завершить умножение.
- code: monotonic_stack
  what_it_is: |-
    Стек хранит кандидатов в монотонном порядке, чтобы быстро найти ближайший больший/меньший элемент.
  mental_model: |-
    Например, для next greater поддерживаем убывающий стек индексов. Когда приходит `x`, он является ответом для всех меньших элементов на вершине — они удаляются.
  recognition_cues:
  - next greater/smaller
  - previous greater/smaller
  - histogram
  - для каждого элемента нужен ближайший «ломающий границу»
  anti_cues:
  - Если нужен глобальный максимум без понятия ближайшего/границы — heap или обычный scan проще.
  - Monotonic Deque дополнительно удаляет устаревшие элементы по индексу и обычно обслуживает sliding window.
  core_invariant: |-
    Элемент выбрасывается только когда найден новый элемент, который делает его бесполезным для всех будущих позиций.
  canonical_skeleton: |-
    stack = []
    for i,x in enumerate(a):
        while stack and a[stack[-1]] < x:
            j = stack.pop()
            ans[j] = i
        stack.append(i)
  mini_example: |-
    Для `[2,1,4]` приход `4` закрывает ожидание и для `1`, и для `2`.
- code: monotonic_deque
  what_it_is: |-
    Двусторонняя очередь хранит кандидатов на min/max текущего окна в монотонном порядке.
  mental_model: |-
    Для maximum:

    1. удаляем с хвоста индексы с меньшими значениями — новый элемент их доминирует;

    2. добавляем новый индекс;

    3. удаляем с головы индексы, вышедшие из окна;

    4. голова — максимум.
  recognition_cues:
  - sliding window maximum/minimum
  - фиксированное окно
  - нужно `O(n)`, а heap даёт `O(n log k)`
  anti_cues:
  - Если запросы не образуют последовательные окна или нужны произвольные удаления.
  - Monotonic Stack не обязан учитывать срок жизни по границе окна.
  core_invariant: |-
    Значения в deque монотонны, индексы возрастают, а голова всегда лучший живой кандидат.
  canonical_skeleton: |-
    dq = deque()
    for i,x in enumerate(a):
        while dq and dq[0] <= i-k: dq.popleft()
        while dq and a[dq[-1]] <= x: dq.pop()
        dq.append(i)
        if i >= k-1: ans.append(a[dq[0]])
  mini_example: |-
    При приходе `7` все меньшие элементы сзади можно удалить: пока `7` жив в окне, они никогда не станут максимумом раньше него.
- code: top_k_bounded_heap
  what_it_is: |-
    Храним только `k` лучших элементов, а не сортируем весь набор.
  mental_model: |-
    Для `k` largest держим min-heap размера не более `k`: вершина — худший среди текущих лучших. Новый элемент лучше вершины — заменяем.
  recognition_cues:
  - top k
  - kth largest/smallest
  - поток данных
  - '`k << n`'
  anti_cues:
  - Если нужен полный порядок всех элементов.
  - Quickselect хорош для одноразового kth в массиве. Bounded Heap лучше для потока или когда нужны сами top k.
  core_invariant: |-
    Heap содержит лучшие `k` элементов обработанного префикса; вершина — граница попадания в top k.
  canonical_skeleton: |-
    heap = []
    for x in data:
        push(heap, x)
        if len(heap) > k:
            pop_min(heap)
    return heap
  mini_example: |-
    Для top-3 после обработки большого потока память остаётся `O(3)`.
- code: two_heaps_streaming_median
  what_it_is: |-
    Две кучи делят числа на нижнюю и верхнюю половины.
  mental_model: |-
    - `low` — max-heap нижней половины;

    - `high` — min-heap верхней половины.

    Поддерживаем два инварианта:

    1. **порядок:** каждый элемент `low <=` каждого элемента `high`;

    2. **баланс размеров:** разница размеров не больше `1` (конкретная сторона зависит от соглашения).

    После вставки при необходимости переносим вершину одной кучи в другую.
  recognition_cues:
  - online median
  - поток вставок
  - нужен центр текущего распределения после каждого шага
  anti_cues:
  - Если нужны произвольные квантили или удаления старых элементов — потребуются дополнительные структуры/ленивое удаление.
  - Один heap умеет быстро давать только один экстремум; медиана требует знать обе стороны центра.
  core_invariant: |-
    Медиана лежит на границе двух упорядоченных половин.
  canonical_skeleton: |-
    add(x):
        push_max(low, x)
        push_min(high, pop_max(low))
        if len(high) > len(low):
            push_max(low, pop_min(high))

    median = top(low) if odd else (top(low)+top(high))/2
  mini_example: |-
    Для `[1,8,3]` после балансировки нижняя половина может быть `{1,3}`, верхняя `{8}`; медиана — вершина `low`, то есть `3`.
- code: k_way_merge_best_first
  what_it_is: |-
    Когда есть несколько источников, каждый со своим «следующим кандидатом», heap выбирает глобально лучший следующий.
  mental_model: |-
    Кладём в heap первый кандидат каждого источника. Извлекли лучший — добавили **следующий только из того источника**, откуда он пришёл.
  recognition_cues:
  - merge k sorted lists
  - kth smallest in sorted structure
  - несколько упорядоченных потоков
  - best-first expansion
  anti_cues:
  - Если внутри источников нет порядка, позволяющего представить их одним frontier-кандидатом.
  - Dijkstra тоже использует best-first heap, но его ключ — расстояние и релаксация графа. Здесь чаще сливаются уже локально упорядоченные источники.
  core_invariant: |-
    Heap содержит минимальный ещё не обработанный кандидат каждого активного источника.
  canonical_skeleton: |-
    heap = first_item_from_each_source()
    while heap:
        value, src, pos = pop_min(heap)
        emit(value)
        if pos+1 < len(src):
            push(heap, src[pos+1])
  mini_example: |-
    При merge трёх sorted lists в heap одновременно лежат максимум три головы.
- code: dummy_node_rewiring
  what_it_is: |-
    Фиктивный узел ставится перед настоящей головой, чтобы операции с первым элементом перестали быть особым случаем.
  mental_model: |-
    `dummy.next = head`. Работая через `prev.next`, можно одинаково удалять первый, средний и последний узел.
  recognition_cues:
  - удаление/вставка у head
  - построение нового списка
  - много rewiring операций
  anti_cues:
  - Если структура не страдает от граничных случаев головы.
  - Sentinel не решает саму задачу — это техника упрощения корректного rewiring.
  core_invariant: |-
    `dummy` не часть данных; он стабилизирует точку входа, чтобы настоящий head мог меняться без отдельной логики.
  canonical_skeleton: |-
    dummy = Node(0, head)
    prev = dummy
    while prev.next:
        if remove(prev.next):
            prev.next = prev.next.next
        else:
            prev = prev.next
    return dummy.next
  mini_example: |-
    Удаление первого реального узла становится обычным `prev.next = prev.next.next`, где `prev = dummy`.
- code: in_place_reversal
  what_it_is: |-
    Разворачиваем направление ссылок без дополнительного списка.
  mental_model: |-
    Перед изменением ссылки сохраняем путь вперёд:

    next = cur.next

    cur.next = prev

    prev = cur

    cur = next
  recognition_cues:
  - reverse linked list
  - reverse sublist/group
  - нужно `O(1)` extra space
  anti_cues:
  - Если нужен persistent список без мутации исходной структуры.
  - Merge/Split/Reconnect перестраивает крупные части списка, но не обязательно переворачивает каждую ссылку.
  core_invariant: |-
    `prev` — уже развёрнутый префикс, `cur` — первый ещё не обработанный узел; путь вперёд нельзя потерять.
  canonical_skeleton: |-
    prev = None
    curr = head
    while curr:
        nxt = curr.next
        curr.next = prev
        prev = curr
        curr = nxt
    return prev
  mini_example: |-
    Для `1→2→3`, прежде чем сделать `2.next=1`, нужно сохранить ссылку на `3`.
- code: merge_split_reconnect
  what_it_is: |-
    Список делится на части, части обрабатываются и затем безопасно соединяются.
  mental_model: |-
    Всегда явно определяем:

    1. где разрез;

    2. кто является head каждой части;

    3. какие хвостовые ссылки нужно обнулить/перенаправить;

    4. в каком порядке reconnect выполняется без потери узлов.
  recognition_cues:
  - reorder list
  - merge sorted lists
  - split by middle
  - rotate/splice
  anti_cues:
  - Если требуется случайный доступ к индексам — массив может быть естественнее.
  - Dummy Node — локальная техника границ; здесь основной механизм — структурная декомпозиция списка.
  core_invariant: |-
    Каждый исходный узел в любой момент либо принадлежит известной части, либо сохранён временной ссылкой; «потерянных» участков нет.
  canonical_skeleton: |-
    dummy = tail = Node()
    while a and b:
        if a.val <= b.val: tail.next, a = a, a.next
        else: tail.next, b = b, b.next
        tail = tail.next
    tail.next = a or b
    return dummy.next
  mini_example: |-
    Reorder List: найти середину, развернуть вторую половину, затем попеременно сшить две цепочки.
- code: dfs_path_subtree_aggregation
  what_it_is: |-
    DFS используется, когда ответ для узла зависит от результатов его дочерних поддеревьев или от состояния пути от корня. Рекурсивная функция обычно возвращает компактную информацию, необходимую родителю.

    Примеры: height, diameter, path sum, subtree properties. Важно определить, что возвращает вызов вверх, а что обновляется как глобальный ответ.
  mental_model: 'Задаём строгий контракт dfs(node): какую информацию возвращает родителю. Сначала получаем результаты детей, затем вычисляем локальный return и при необходимости обновляем глобальный ответ.'
  recognition_cues:
  - ответ узла зависит от поддеревьев
  - path/subtree/height/diameter
  - естественна рекурсивная формулировка
  core_invariant: После dfs(node) возвращаемое значение точно описывает всё поддерево node согласно контракту; родителю не нужна внутренняя детализация поддерева.
  canonical_skeleton: |-
    def dfs(node):
        if not node: return base
        L = dfs(node.left)
        R = dfs(node.right)
        update_global(node, L, R)
        return summarize(node, L, R)
  mini_example: В Diameter of Binary Tree dfs возвращает высоту поддерева, а глобальный диаметр обновляется как left_height + right_height.
- code: bfs_level_order
  what_it_is: |-
    Обходим дерево слоями по расстоянию от корня.
  mental_model: |-
    В начале итерации фиксируем `level_size = len(queue)`. Ровно столько узлов принадлежит текущему уровню; дети попадут уже в следующий.
  recognition_cues:
  - level order
  - average/right view per level
  - минимальная глубина
  - нужно разделение по уровням
  anti_cues:
  - Если нужен снизу-вверх summary поддерева — postorder проще.
  - DFS может помнить depth, но BFS естественно группирует одинаковые расстояния.
  core_invariant: |-
    Перед обработкой уровня очередь начинается со всех и только узлов этого уровня.
  canonical_skeleton: |-
    q = deque([root])
    while q:
        level = []
        for _ in range(len(q)):
            node = q.popleft()
            level.append(node.val)
            for child in children(node): q.append(child)
        process(level)
  mini_example: |-
    Right Side View: для каждого зафиксированного уровня сохраняем последний обработанный узел.
- code: bst_ordering_bounds
  what_it_is: |-
    Используем глобальный порядок BST, а не только сравнение узла с непосредственными детьми.
  mental_model: |-
    Для validation передаём допустимый интервал `(low,high)`:

    - левый ребёнок получает `high = node.val`;

    - правый — `low = node.val`.

    Для поиска сравнение с ключом выбирает одну ветвь.
  recognition_cues:
  - validate BST
  - search/kth
  - lower/upper constraints
  - можно отсекать поддеревья по значению
  anti_cues:
  - Если дерево не BST или содержит дубликаты с отдельной политикой, которую не учли.
  - Обычное Binary Tree не гарантирует порядок; Binary Search по индексам — другая структура.
  core_invariant: |-
    Каждый узел должен удовлетворять ограничениям **всех предков**, а не только родителя.
  canonical_skeleton: |-
    def valid(node, low, high):
        if not node: return True
        if not (low < node.val < high): return False
        left_ok = valid(node.left, low, node.val)
        right_ok = valid(node.right, node.val, high)
        return left_ok and right_ok
  mini_example: |-
    Узел `6` в правом поддереве корня `10` нарушает BST, даже если он больше своего непосредственного родителя `5`.
- code: connected_components_flood_fill
  what_it_is: |-
    Из каждой ещё не посещённой вершины запускаем DFS/BFS и помечаем всю достижимую область.
  mental_model: |-
    Внешний цикл ищет новый непосещённый старт. Один запуск обхода полностью закрашивает одну компоненту.
  recognition_cues:
  - islands/provinces/regions
  - число отдельных групп
  - клетки соединены соседством
  - нужна связность, а не расстояние
  anti_cues:
  - Если граф динамически получает рёбра и нужны онлайн-запросы связности — DSU может быть лучше.
  - Shortest Path BFS измеряет расстояния от старта. Component Traversal только выясняет принадлежность группе.
  core_invariant: |-
    После завершения обхода из `start` посещены все вершины его компоненты; ни одна из них больше не начнёт новую компоненту.
  canonical_skeleton: |-
    seen = set(); count = 0
    for v in vertices:
        if v not in seen:
            count += 1
            dfs_mark(v, seen)
    return count
  mini_example: |-
    В Number of Islands каждый новый flood fill с клетки суши увеличивает ответ на один.
- code: cycle_detection_traversal
  what_it_is: |-
    Определяем цикл по состоянию обхода. **Directed и undirected graph требуют разных критериев.**
  mental_model: |-
    Состояние посещения должно различать активный текущий путь и уже завершённую область. В directed graph это цвета `visiting/done`; в undirected graph — visited плюс исключение родительского ребра.
  recognition_cues:
  - «есть ли цикл»
  - dependency graph
  - повторное посещение вершины встречается естественно
  - важно не принять обычное обратное ребро к родителю за цикл
  anti_cues:
  - Для linked list естественнее Fast & Slow Pointers.
  - DSU Cycle Detection работает по потоку undirected edges; DFS лучше, когда нужен сам обход/путь/структура.
  core_invariant: |-
    Сначала спроси: граф направленный? Цикл — не «любая уже знакомая вершина», а нарушение конкретной структуры пути.
  canonical_skeleton: |-
    def dfs(v):
        state[v] = 1
        for nei in g[v]:
            if state[nei] == 1: return True
            if state[nei] == 0 and dfs(nei): return True
        state[v] = 2
        return False
  mini_example: |-
    В directed `A→B→C→B` ребро `C→B` попадает в `visiting`, значит цикл есть. Ребро в `done` само по себе циклом не является.
- code: multi_source_bfs
  what_it_is: |-
    BFS стартует сразу из всех источников расстояния `0`.
  mental_model: |-
    Кладём все sources в очередь до начала BFS и помечаем их расстоянием `0`. Затем обычная волна автоматически присваивает каждой вершине расстояние до ближайшего источника.
  recognition_cues:
  - расстояние до ближайшего из многих источников
  - распространение волны/гнили/огня
  - все стартовые точки равноправны
  anti_cues:
  - Если веса рёбер различаются — нужен multi-source Dijkstra или другая техника.
  - Запустить отдельный BFS из каждого источника — обычно намного дороже.
  core_invariant: |-
    Очередь моделирует одну общую волну, будто добавлен виртуальный супер-источник с нулевыми рёбрами ко всем настоящим источникам.
  canonical_skeleton: |-
    q = deque(sources)
    for s in sources: dist[s] = 0
    while q:
        v = q.popleft()
        for nei in neighbors(v):
            if dist[nei] == INF:
                dist[nei] = dist[v] + 1
                q.append(nei)
  mini_example: |-
    В 01 Matrix все нулевые клетки кладутся в очередь одновременно; единицы получают дистанцию до ближайшего нуля.
- code: state_space_graph_search
  what_it_is: |-
    Граф не дан списком рёбер. Вершина — состояние задачи, а соседей генерируют допустимые действия.
  mental_model: |-
    Определяем:

    1. каноническое представление state;

    2. `neighbors(state)`;

    3. visited по состояниям;

    4. BFS для равной стоимости шагов, Dijkstra/A* для других весов.
  recognition_cues:
  - puzzle/lock/word transformation
  - состояния огромны, но локально можно перечислить ходы
  - нужно минимум шагов или достижимость
  anti_cues:
  - Если пространство состояний слишком велико и нет эффективного pruning/эвристики.
  - Backtracking тоже исследует варианты, но не всегда хранит глобальный visited и не обязательно решает задачу кратчайшего пути.
  core_invariant: |-
    Не строй весь граф заранее: генерируй только состояния, до которых реально дошёл поиск.
  canonical_skeleton: |-
    q = deque([(start,0)])
    seen = {start}
    while q:
        state,d = q.popleft()
        if goal(state): return d
        for nxt in neighbors(state):
            if nxt not in seen:
                seen.add(nxt); q.append((nxt,d+1))
  mini_example: |-
    В Open the Lock вершина — четырёхзначная комбинация, сосед — поворот одного колеса на ±1.
- code: kahn_in_degree_bfs
  what_it_is: |-
    Строим топологический порядок, начиная с вершин без невыполненных зависимостей.
  mental_model: |-
    Считаем `indegree`. Все вершины с `0` кладём в queue. Извлекая `v`, уменьшаем indegree её соседей; новый `0` становится доступен.
  recognition_cues:
  - prerequisites
  - DAG order
  - нужно постепенно освобождать доступные задачи
  - удобен cycle check по числу обработанных вершин
  anti_cues:
  - Если нужен один из DFS-порядков или задача естественнее решается postorder.
  - BFS shortest path использует уровни расстояния; Kahn использует число оставшихся зависимостей.
  core_invariant: |-
    В очереди находятся вершины, у которых среди ещё не обработанных вершин нет входящих зависимостей.
  canonical_skeleton: |-
    indeg = count_indegrees(g)
    q = deque(v for v in V if indeg[v] == 0)
    order = []
    while q:
        v = q.popleft(); order.append(v)
        for nei in g[v]:
            indeg[nei] -= 1
            if indeg[nei] == 0: q.append(nei)
  mini_example: |-
    Курс попадает в очередь только когда indegree стал нулём, то есть все prerequisites уже сняты.
- code: dfs_postorder_toposort
  what_it_is: |-
    В DAG вершина добавляется в порядок **после** всех вершин, зависящих от её исходящих переходов; затем список разворачивается.
  mental_model: |-
    DFS использует `unvisited/visiting/done`. После завершения всех соседей добавляем `v` в `postorder`. В конце reverse.
  recognition_cues:
  - topological order
  - dependency DFS естественен
  - уже есть color-based cycle detection
  anti_cues:
  - При очень глубоком графе рекурсия может быть неудобна без iterative DFS.
  - Kahn строит порядок через indegree и очередь; DFS — через время выхода. Оба требуют DAG.
  core_invariant: |-
    Когда `v` попадает в postorder, все достижимые по её исходящим dependency-рёбрам вершины уже завершены.
  canonical_skeleton: |-
    def dfs(v):
        state[v] = 1
        for nei in g[v]:
            if state[nei] == 1: fail_cycle()
            if state[nei] == 0: dfs(nei)
        state[v] = 2
        order.append(v)

    return order[::-1]
  mini_example: |-
    Если `A→B`, DFS завершит `B` раньше `A`; после reverse `A` окажется раньше `B`.
- code: dependency_scheduling
  what_it_is: |-
    Это **постановочный паттерн**, а не третий алгоритм topological sort. Сюжет о курсах, сборке, задачах или рецептах переводится в dependency graph, после чего проверяется выполнимость/расписание через Kahn или DFS.
  mental_model: |-
    1. Чётко выбрать направление ребра, например `prerequisite → course`.

    2. Проверить, все ли сущности представлены, включая изолированные.

    3. Запустить Kahn/DFS.

    4. Для feasibility убедиться, что обработаны все вершины; иначе остался цикл зависимостей.
  recognition_cues:
  - «можно ли завершить все задачи?»
  - prerequisites
  - одна сущность блокирует другую
  - нужен допустимый порядок или доказательство невозможности
  anti_cues:
  - Если ограничения содержат веса времени/ресурсы/параллельные мощности — одной топологии может быть мало.
  - '#43 и #44 — механизмы получения topological order. #45 — навык распознать в предметном сюжете dependency DAG и сформулировать feasibility.'
  core_invariant: |-
    Сначала правильно смоделируй зависимость; топологический алгоритм не исправит перевёрнутые рёбра.
  canonical_skeleton: |-
    q = all_zero_indegree()
    stages = 0
    while q:
        for _ in range(len(q)):
            v = q.popleft()
            release_dependents(v, q)
        stages += 1
    return stages if processed_all else impossible
  mini_example: |-
    `Math → Algorithms → Interview`: направление означает «левое требуется раньше правого».
- code: online_connectivity
  what_it_is: |-
    Быстро объединяем компоненты и проверяем, принадлежат ли два элемента одной группе.
  mental_model: |-
    `find(x)` возвращает представителя компоненты; `union(a,b)` соединяет корни. Path compression и union by size/rank дают почти константное амортизированное время.
  recognition_cues:
  - edges добавляются
  - '`connected(a,b)?`'
  - merge groups
  - много union/find операций
  anti_cues:
  - DSU плохо отвечает на удаление рёбер и не хранит путь между вершинами.
  - DFS Components лучше, когда граф статичен и нужен фактический обход соседей.
  core_invariant: |-
    Два элемента связаны тогда и только тогда, когда их представители совпадают.
  canonical_skeleton: |-
    def find(x):
        if parent[x] != x:
            parent[x] = find(parent[x])
        return parent[x]

    def union(a,b):
        ra, rb = find(a), find(b)
        if ra == rb: return False
        attach_smaller_to_larger(ra, rb)
        return True
  mini_example: |-
    После `union(1,2)` и `union(2,3)` получаем `find(1)==find(3)`.
- code: dsu_cycle_detection
  what_it_is: |-
    В undirected graph обрабатываем рёбра по одному. Если концы уже в одной компоненте, новое ребро замыкает цикл.
  mental_model: |-
    Для `(u,v)`:

    - если `find(u)==find(v)`, путь между ними уже существует — ребро redundant;

    - иначе `union(u,v)`.
  recognition_cues:
  - redundant connection
  - найти первое/последнее лишнее ребро
  - рёбра приходят как поток
  anti_cues:
  - Если нужно перечислить цикл или анализировать направление рёбер.
  - Для directed cycle этот критерий напрямую неверен.
  core_invariant: |-
    DSU хранит связность, созданную только ранее принятыми рёбрами.
  canonical_skeleton: |-
    for u,v in edges:
        if find(u) == find(v):
            return (u,v)
        union(u,v)
  mini_example: |-
    После рёбер `1-2`, `2-3` ребро `1-3` соединяет уже связанную пару и создаёт цикл.
- code: kruskal_connectivity
  what_it_is: |-
    Сортируем рёбра по стоимости и добавляем самые дешёвые, если они соединяют разные компоненты.
  mental_model: |-
    Для ребра по возрастанию веса:

    - разные DSU-компоненты → берём и объединяем;

    - одна компонента → пропускаем, иначе появился бы цикл.

    Почему greedy корректен — интуиция **cut property**: для любого разреза графа самое дешёвое ребро, пересекающее этот разрез, можно безопасно включить в некоторый MST.
  recognition_cues:
  - minimum spanning tree/forest
  - соединить все точки минимальной общей стоимостью
  - weighted undirected graph
  anti_cues:
  - Для directed MST или динамических сложных ограничений нужны другие алгоритмы.
  - Dijkstra минимизирует путь от источника. MST минимизирует суммарную стоимость соединяющего дерева; кратчайшие пути в MST не обязаны быть кратчайшими в исходном графе.
  core_invariant: |-
    Выбранные рёбра образуют лес без циклов; каждое принятое ребро — самый дешёвый доступный способ соединить две текущие компоненты в порядке Kruskal.
  canonical_skeleton: |-
    edges.sort(key=weight)
    cost = used = 0
    for w,u,v in edges:
        if union(u,v):
            cost += w; used += 1
            if used == n-1: break
  mini_example: |-
    Если дешёвое ребро соединяет вершины уже внутри одной компоненты, оно не улучшает связность и лишь создаёт цикл.
- code: unweighted_shortest_path_bfs
  what_it_is: |-
    В графе, где каждый шаг стоит одинаково, BFS впервые достигает вершину по кратчайшему числу рёбер.
  mental_model: |-
    Queue обрабатывает вершины слоями расстояния `0,1,2,...`. Непосещённому соседу ставим `dist[v]+1` и сразу помечаем посещённым при постановке в очередь.
  recognition_cues:
  - minimum number of moves
  - все рёбра имеют одинаковую стоимость
  - grid shortest path без весов
  anti_cues:
  - Если стоимость рёбер различается.
  - DFS не гарантирует кратчайший путь. Dijkstra нужен при разных неотрицательных весах.
  core_invariant: |-
    В момент первого обнаружения вершины её BFS-distance уже минимален.
  canonical_skeleton: |-
    q = deque([start]); dist = {start:0}
    while q:
        v = q.popleft()
        for nei in neighbors(v):
            if nei not in dist:
                dist[nei] = dist[v]+1
                q.append(nei)
  mini_example: |-
    В лабиринте без весов первый приход к клетке происходит минимальным числом шагов.
- code: dijkstra_nonnegative
  what_it_is: |-
    Находит shortest paths от источника при неотрицательных весах.
  mental_model: |-
    Храним `dist`. Min-heap выдаёт вершину с наименьшим текущим кандидатом. Для ребра `(u,v,w)` делаем relaxation:

    if dist[u] + w < dist[v]:

        dist[v] = dist[u] + w

        push(dist[v], v)

    Если из heap пришла устаревшая пара `d != dist[v]`, пропускаем.
  recognition_cues:
  - weighted graph
  - веса `>= 0`
  - нужен минимум стоимости/времени
  anti_cues:
  - При отрицательных рёбрах базовое доказательство ломается.
  - BFS — частный случай одинаковых весов. Prim тоже использует heap, но строит MST, а не shortest path.
  core_invariant: |-
    При неотрицательных весах минимальный извлечённый актуальный distance нельзя улучшить путём через ещё более далёкую вершину.
  canonical_skeleton: |-
    dist[start] = 0
    heap = [(0,start)]
    while heap:
        d,v = pop_min(heap)
        if d != dist[v]: continue
        for nei,w in g[v]:
            nd = d+w
            if nd < dist[nei]:
                dist[nei] = nd
                push(heap,(nd,nei))
  mini_example: |-
    Путь с большим числом рёбер может быть дешевле; поэтому queue по уровням недостаточна, нужен heap по стоимости.
- code: relaxation_based_paths
  what_it_is: |-
    Под одним ID находятся **два разных алгоритма**. Общая тема — shortest paths вне обычного BFS/Dijkstra, но условия и механика различаются.
  mental_model: |-
    Сначала классифицируем веса. `0-1 BFS` поддерживает правильный порядок кандидатов deque-ом; `Bellman-Ford` многократно распространяет улучшения релаксацией всех рёбер.
  recognition_cues:
  - веса только `0/1`
  - присутствуют отрицательные рёбра
  - обычный BFS неверен из-за весов, а условия Dijkstra нарушены или избыточны
  - нужно обнаружить достижимый negative cycle
  anti_cues:
  - Для all-pairs shortest paths или специальных DAG-графов могут быть более подходящие алгоритмы.
  - 0-1 BFS — не «Bellman-Ford с deque». Bellman-Ford не использует свойство `0/1`; 0-1 BFS не решает общий случай отрицательных весов.
  core_invariant: |-
    Сначала классифицируй веса: одинаковые → BFS, `0/1` → 0-1 BFS, неотрицательные → Dijkstra, отрицательные → Bellman-Ford/спецалгоритм.
  canonical_skeleton: |-
    # Bellman-Ford skeleton
    dist[s] = 0
    for _ in range(V-1):
        changed = False
        for u,v,w in edges:
            if dist[u] != INF and dist[u] + w < dist[v]:
                dist[v] = dist[u] + w
                changed = True
        if not changed: break
  mini_example: |-
    Ребро веса `0` не должно ждать позади кандидата, который уже дороже на `1`; поэтому в 0-1 BFS оно идёт в начало deque.
- code: subsets_combinations
  what_it_is: |-
    Перебираем выбор подмножества или комбинации без учёта порядка элементов внутри выбора.
  mental_model: |-
    Типичная рекурсия хранит `start`: следующий выбор разрешён только из суффикса, поэтому одна комбинация не генерируется во всех перестановках.

    backtrack(start, path):

        emit(path)          # для subsets

        for i in start..n-1:

            choose a[i]

            backtrack(i+1, path)

            undo

    Для fixed `k` можно отсекать ветвь, если оставшихся элементов уже недостаточно.
  recognition_cues:
  - all subsets
  - choose `k` elements
  - combinations
  - порядок выбранных элементов не создаёт новый ответ
  anti_cues:
  - Если варианты огромны, а нужен только count/optimum — DP или комбинаторика могут быть лучше полного перечисления.
  - 'Permutations используют порядок: `[a,b]` и `[b,a]` — разные ответы.'
  core_invariant: |-
    `path` содержит выбранные элементы в каноническом порядке индексов; всё раньше `start` больше не рассматривается.
  canonical_skeleton: |-
    def backtrack(start):
        emit(path.copy())
        for i in range(start, n):
            path.append(a[i])
            backtrack(i+1)
            path.pop()
  mini_example: |-
    Для `{1,2,3}` комбинация `{1,3}` создаётся один раз через индексы `0→2`, а не повторяется как `{3,1}`.
- code: permutations_used_state
  what_it_is: |-
    Строим упорядоченные последовательности; один и тот же набор элементов в другом порядке считается другим ответом.
  mental_model: |-
    На каждой глубине пробуем любой ещё не использованный элемент. Храним `used[i]` или переставляем элементы in-place.

    Для дубликатов после сортировки часто действует правило: не брать `a[i]`, если `a[i]==a[i-1]` и предыдущая копия на этом уровне ещё не использована — это убирает одинаковые ветви.
  recognition_cues:
  - permutations
  - arrange/order
  - каждый элемент используется ограниченное число раз
  - позиция выбора важна
  anti_cues:
  - Если нужен только лучший порядок и есть специальная структура — greedy/DP могут избежать `n!`.
  - Combinations двигают `start` и не возвращаются к ранним индексам; permutations выбирают любой доступный элемент на каждую позицию.
  core_invariant: |-
    `path` — точный префикс будущей перестановки, а `used` совпадает с элементами, уже занявшими позиции в `path`.
  canonical_skeleton: |-
    def backtrack():
        if len(path) == n: emit(path.copy()); return
        for i in range(n):
            if used[i]: continue
            used[i] = True; path.append(a[i])
            backtrack()
            path.pop(); used[i] = False
  mini_example: |-
    Для `[1,2,3]` после префикса `[2]` доступны и `1`, и `3`; порядок выбора формирует разные перестановки.
- code: constraint_placement
  what_it_is: |-
    Размещаем объекты по позициям, соблюдая ограничения, и отсекаем ветвь сразу после нарушения.
  mental_model: |-
    Выбираем следующую переменную/позицию, перебираем допустимые значения, обновляем быстрые структуры ограничений и откатываем.

    Для N-Queens вместо проверки всей доски храним:

    - занятые столбцы;

    - диагонали `r-c`;

    - диагонали `r+c`.

    Сильный приём — **MRV**: сначала выбирать переменную с минимумом допустимых значений.
  recognition_cues:
  - N-Queens
  - Sudoku
  - coloring/placement
  - «поставить объекты так, чтобы...»
  anti_cues:
  - Если ограничения имеют перекрывающиеся подзадачи с компактным state — memoization/DP может быть эффективнее.
  - Path Construction двигается по графу/сетке, а Constraint Placement назначает значения переменным под системой ограничений.
  core_invariant: |-
    Частичное размещение всегда валидно; невалидная ветвь не углубляется ни на один лишний уровень.
  canonical_skeleton: |-
    def solve(pos):
        if complete(pos): return record()
        for choice in candidates(pos):
            if not allowed(pos, choice): continue
            place(pos, choice)
            solve(next_pos(pos))
            unplace(pos, choice)
  mini_example: |-
    В Sudoku после установки цифры сразу обновляем множества строки, столбца и блока; конфликтная цифра даже не порождает рекурсивный вызов.
- code: path_construction_word_search
  what_it_is: |-
    Строим путь шаг за шагом по графу/сетке, причём текущее решение определяет, куда можно идти дальше.
  mental_model: |-
    DFS хранит текущую позицию, прогресс по цели и visited текущего пути. После возврата visited откатывается, если вершину разрешено использовать в другой ветви.
  recognition_cues:
  - word search
  - path with no repeated cell
  - itinerary/path enumeration
  - нужно найти последовательность соседних переходов
  anti_cues:
  - Если нужен только кратчайший путь в невзвешенном графе — BFS лучше.
  - Graph BFS shortest path обычно имеет глобальный visited. В backtracking одна клетка может быть доступна в другой независимой ветви.
  core_invariant: |-
    `visited` описывает именно текущий путь, а не все вершины, когда-либо виденные во всех ветвях.
  canonical_skeleton: |-
    def dfs(state, k):
        if goal(k): return True
        mark(state)
        for nxt in next_states(state):
            if allowed(nxt) and dfs(nxt,k+1): return True
        unmark(state)
        return False
  mini_example: |-
    В Word Search клетка помечается перед углублением и снимается после возврата, чтобы другая ветвь могла её использовать.
- code: sort_then_greedy
  what_it_is: |-
    Сначала данные сортируются по критерию, который делает безопасный локальный выбор очевидным. После этого решение строится одним проходом без возврата к предыдущим решениям.

    Частые примеры: intervals, assigning resources, pairing. Ключевая часть — выбрать правильный ключ сортировки; сортировка «просто по значению» часто не решает задачу.
  mental_model: Выбираем ключ сортировки, который превращает глобальную задачу в последовательность локальных решений. После сортировки каждый элемент рассматривается один раз и решение не откатывается.
  recognition_cues:
  - после сортировки появляется очевидный безопасный выбор
  - задача на пары/ресурсы/интервалы
  - порядок обработки определяет качество решения
  core_invariant: После обработки префикса построенное greedy-решение можно включить в некоторое оптимальное решение для этого префикса/всей задачи (обычно доказывается exchange argument).
  canonical_skeleton: |-
    items.sort(key=greedy_key)
    state = init()
    for item in items:
        if can_take(item, state):
            take(item, state)
    return result(state)
  mini_example: В interval scheduling сортировка по времени окончания позволяет брать самый рано заканчивающийся совместимый интервал и оставлять максимум пространства будущим.
- code: local_choice_invariant
  what_it_is: |-
    Общий greedy-подпаттерн, когда на каждом шаге делается локальный выбор и поддерживается сильное доказуемое состояние. Это не «выбирай то, что сейчас выглядит лучше».
  mental_model: |-
    Нужно найти конкретный инвариант. Типичные формы:

    1. **Farthest reachable** — после префикса `far` максимальная достижимая позиция среди всех способов пройти этот префикс.

    2. **Remaining surplus** — текущий запас ресурса; если общий баланс достаточен, локальный reset после отрицательного префикса безопасен.

    3. **Best cost so far** — сохраняем минимальную цену/максимальную выгоду, которая доминирует прошлые кандидаты.
  recognition_cues:
  - решение строится одним проходом
  - после выбора назад не возвращаемся
  - можно сформулировать, что greedy state доминирует все альтернативные состояния того же префикса
  anti_cues:
  - Когда локально худший выбор может открыть глобально лучший путь и нет exchange/dominance доказательства.
  - Если такого доказуемого состояния нет, возможно нужен DP.
  core_invariant: |-
    Назови, что именно greedy-состояние означает после каждого префикса и почему отброшенная альтернатива уже не может стать лучше.
  canonical_skeleton: |-
    state = initial
    for x in data:
        state = greedy_update(state, x)
        if failure(state): return False
    return extract(state)
  mini_example: |-
    Jump Game: `far` — самая дальняя позиция, достижимая из обработанного префикса. Если текущий индекс `i > far`, никакой прошлый выбор уже не спасёт.
- code: greedy_scheduling
  what_it_is: |-
    Выбираем совместимые интервалы или распределяем ресурсы по времени, используя порядок концов/начал.
  mental_model: |-
    Классический activity selection: сортируем по времени окончания и всегда берём совместимый интервал с самым ранним концом. Он оставляет максимум пространства будущим интервалам.
  recognition_cues:
  - maximum number of non-overlapping intervals
  - minimum removals
  - meeting scheduling
  - выбрать максимум совместимых активностей
  anti_cues:
  - Если интервалы имеют веса/прибыли — weighted interval scheduling обычно требует DP.
  - Sweep Line считает одновременную активность; scheduling выбирает подмножество интервалов.
  core_invariant: |-
    Среди решений с тем же числом уже выбранных интервалов greedy заканчивает не позже альтернативы и поэтому не имеет меньше будущих возможностей.
  canonical_skeleton: |-
    intervals.sort(key=lambda x: x.end)
    last_end = -INF
    for s,e in intervals:
        if s >= last_end:
            choose(s,e)
            last_end = e
  mini_example: |-
    Из двух конфликтующих встреч безопасно предпочесть ту, что заканчивается раньше: она не сильнее ограничивает будущее.
- code: dp_1d_linear
  what_it_is: |-
    Состояние определяется одной основной координатой, обычно позицией i. Значение dp[i] строится из нескольких предыдущих состояний.

    Типичные задачи: climbing stairs, house robber, decode ways. Часто память можно сократить до нескольких переменных, если нужны только последние состояния.
  mental_model: Определяем точный смысл dp[i], базовые случаи и переход из уже вычисленных индексов. Если нужны только последние k состояний, таблицу можно сжать.
  recognition_cues:
  - состояние задаётся одной позицией/числом
  - ответ i зависит от нескольких меньших состояний
  - climbing/rob/decode
  core_invariant: После вычисления dp[i] оно равно точному ответу для подзадачи, определённой состоянием i; все состояния, от которых зависит переход, уже корректны.
  canonical_skeleton: |-
    dp = [0]*(n+1)
    dp[0] = base0
    for i in range(1,n+1):
        dp[i] = combine(dp[i-1], dp[i-2] if i>=2 else base)
    return dp[n]
  mini_example: 'В House Robber dp[i] = max(dp[i-1], dp[i-2]+money[i]): либо пропускаем дом, либо берём его после совместимого префикса.'
- code: dp_2d_grid
  what_it_is: |-
    State привязан к клетке, а ответ в ней строится из уже вычисленных соседних состояний.
  mental_model: |-
    Например:

    dp[r][c] = grid[r][c] + min(dp[r-1][c], dp[r][c-1])

    Порядок обхода должен гарантировать готовность зависимостей.
  recognition_cues:
  - grid paths
  - min/max cost to cell
  - движение ограничено направлениями, создающими DAG, например вправо/вниз
  anti_cues:
  - При циклических зависимостях без естественного topological order.
  - Если движение допускает циклы во все стороны, обычный grid DP может быть неверен; задача становится graph shortest path.
  core_invariant: |-
    Перед вычислением клетки все states, от которых зависит переход, уже известны.
  canonical_skeleton: |-
    for r in range(R):
        for c in range(C):
            if r==0 and c==0: continue
            dp[r][c] = combine(
                dp[r-1][c] if r else INF,
                dp[r][c-1] if c else INF)
  mini_example: |-
    При движении только вниз/вправо клетка зависит от верха и лева, поэтому row-major порядок корректен.
- code: dp_01_knapsack
  what_it_is: |-
    Каждый предмет можно использовать **не более одного раза**.
  mental_model: |-
    Для 1D DP capacity обычно идём **справа налево**:

    for item in items:

        for cap from C down to w[item]:

            dp[cap] = best(dp[cap], dp[cap-w] + value)

    Почему назад: тогда `dp[cap-w]` относится к состоянию до использования текущего предмета, и предмет не берётся повторно в том же раунде.
  recognition_cues:
  - subset sum
  - choose items within capacity
  - each item once
  - partition equal subset
  anti_cues:
  - Если количество копий предмета неограниченно или имеет отдельный лимит.
  - Unbounded Knapsack идёт capacity вперёд, разрешая повтор текущего предмета.
  core_invariant: |-
    После обработки первых `i` предметов DP использует каждый из них максимум один раз.
  canonical_skeleton: |-
    dp = [False]*(target+1)
    dp[0] = True
    for x in items:
        for s in range(target, x-1, -1):
            dp[s] = dp[s] or dp[s-x]
  mini_example: |-
    При весе `3` и capacity `6` проход слева направо мог бы обновить `dp[3]`, а затем тут же использовать его для `dp[6]`, взяв предмет дважды — это ошибка для 0/1.
- code: dp_unbounded_knapsack
  what_it_is: |-
    Каждый тип предмета можно использовать многократно.
  mental_model: |-
    Capacity обычно идёт **слева направо**:

    for coin in coins:

        for s in coin..target:

            dp[s] = combine(dp[s], dp[s-coin])

    Теперь `dp[s-coin]` уже может содержать текущую монету, что и разрешает повтор.
  recognition_cues:
  - unlimited coins
  - повторное использование номинала
  - minimum coins / number of combinations
  anti_cues:
  - Если число копий ограничено конкретным `k` — bounded knapsack требует другой обработки.
  - 0/1 Knapsack — каждый item один раз. Counting Ways дополнительно требует определить, важен ли порядок.
  core_invariant: |-
    Направление DP-цикла кодирует, можно ли повторно использовать текущий предмет в том же этапе.
  canonical_skeleton: |-
    dp = [INF]*(amount+1)
    dp[0] = 0
    for coin in coins:
        for s in range(coin, amount+1):
            dp[s] = min(dp[s], dp[s-coin]+1)
  mini_example: |-
    Монету `2` можно использовать для суммы `2`, затем это уже обновлённое состояние — для суммы `4`, затем `6`.
- code: dp_sequence_lis_lcs
  what_it_is: |-
    Под одним ID две важные, но **разные формы sequence DP**. Общая тема — сохранять порядок элементов, но states различаются.
  mental_model: |-
    Сначала определяем оси state. LIS обычно фиксирует конец подпоследовательности или лучший хвост каждой длины; LCS фиксирует пару префиксов двух последовательностей.
  recognition_cues:
  - subsequence, а не обязательно contiguous substring
  - нужно сохранить относительный порядок
  - одна последовательность и монотонность → часто LIS
  - две последовательности и общая подпоследовательность → LCS
  anti_cues:
  - Если порядок не важен — задача может быть про множества/частоты.
  - Substring требует непрерывность; subsequence разрешает пропуски, сохраняя порядок.
  core_invariant: |-
    LIS обычно фиксирует «где заканчивается подпоследовательность» или frontier хвостов; LCS фиксирует пару префиксов двух последовательностей.
  canonical_skeleton: |-
    # LCS skeleton
    for i in range(1,n+1):
        for j in range(1,m+1):
            if a[i-1] == b[j-1]: dp[i][j] = dp[i-1][j-1]+1
            else: dp[i][j] = max(dp[i-1][j], dp[i][j-1])
  mini_example: |-
    В LIS `[3,1,2]` ответ `1,2` пропускает `3`. В LCS `abc` и `ac` общая подпоследовательность `ac` тоже пропускает символ.
- code: dp_state_machine_interval
  what_it_is: |-
    Под одним ID две **принципиально разные** архитектуры DP. Их объединяет только историческая таксономия, поэтому учить нужно раздельно.
  mental_model: |-
    State-Machine переносит лучший результат между режимами на следующем шаге. Interval DP строит большие интервалы из меньших в порядке длины.
  recognition_cues:
  - конечное число режимов системы (`hold/rest/sold`, `on/off`) → State-Machine
  - ответ определяется двумя границами `[l,r]` и меньшими интервалами → Interval DP
  - простой `dp[i]` не хранит достаточно контекста
  anti_cues:
  - Если число режимов растёт вместе с полной историей и state нельзя компактно замкнуть; для Interval DP — если переходы не сводятся к меньшим интервалам или `O(n²/³)` неприемлемо.
  - Prefix DP имеет один растущий конец и фиксированное начало; Interval DP — два изменяемых конца.
  core_invariant: |-
    State-Machine DP отвечает «в каком режиме система после шага?». Interval DP отвечает «каков ответ внутри двух свободных границ `[l,r]`?» Это разные ментальные модели.
  canonical_skeleton: |-
    # state-machine
    for x in data:
        new0 = best(state0, transition_from_state1(x))
        new1 = best(state1, transition_from_state0(x))
        state0, state1 = new0, new1

    # interval DP
    for length in range(1,n+1):
        for l in range(n-length+1):
            r = l+length-1
            dp[l][r] = best_over_splits(l,r)
  mini_example: |-
    Stock DP: `holding` и `not holding` — режимы. Matrix Chain: `dp[l][r]` — стоимость умножения матриц от `l` до `r` — интервал.
- code: trie_prefix_search
  what_it_is: |-
    Trie хранит строки по символам так, что общий префикс физически разделяется между словами.
  mental_model: |-
    Каждый узел соответствует префиксу. Ребро — следующий символ. Отдельный флаг `is_end` отличает полное слово от просто существующего префикса.
  recognition_cues:
  - prefix search
  - autocomplete
  - много слов и много запросов по префиксам
  - wildcard search по символам
  anti_cues:
  - Если запросов мало или алфавит огромен и память критична; sorted array + binary search иногда проще.
  - Hash Set быстро проверяет полное слово, но не умеет естественно перечислять/проверять префиксы.
  core_invariant: |-
    Путь от корня до узла кодирует ровно один префикс; все слова под узлом имеют этот префикс.
  canonical_skeleton: |-
    insert(word):
        node = root
        for ch in word:
            node = node.child.setdefault(ch, Node())
        node.is_end = True

    search_prefix(p):
        follow children for each char
  mini_example: |-
    `car`, `card`, `care` разделяют путь `c→a→r`; ветвление начинается позже.
- code: rolling_hash_rabin_karp
  what_it_is: |-
    Подстроке сопоставляется числовой hash, который можно быстро обновлять при сдвиге окна.
  mental_model: |-
    Полиномиальный hash окна длины `m` условно:

    H = s[0]*B^(m-1) + s[1]*B^(m-2) + ... + s[m-1]

    При сдвиге:

    1. вычитаем вклад ушедшего символа;

    2. умножаем на `B`;

    3. добавляем новый символ;

    4. берём modulo.

    H' = ((H - old*B^(m-1)) * B + new) mod M
  recognition_cues:
  - много сравнений подстрок одинаковой длины
  - поиск pattern
  - longest duplicate substring с binary search
  - прямое сравнение строк слишком дорого
  anti_cues:
  - Если collision недопустим без дополнительной проверки; тогда используют double hash или точную структуру.
  - KMP даёт точный поиск одного pattern без collisions. Rolling Hash удобнее для многих substring comparisons и комбинации с binary search.
  core_invariant: |-
    Hash окна обновляется из предыдущего окна за `O(1)`, но равенство hash — только кандидат на равенство строк.
  canonical_skeleton: |-
    h = hash(first_window)
    for i in range(k,n):
        h = roll(h, outgoing=s[i-k], incoming=s[i])
        if h == target_hash:
            verify_if_needed(i-k+1)
  mini_example: |-
    Окна `abcd` и `bcde` отличаются одним ушедшим и одним пришедшим символом — весь hash не пересчитывается с нуля.
- code: kmp_prefix_function
  what_it_is: |-
    KMP ищет pattern в тексте, не возвращаясь назад по тексту после mismatch. Он переиспользует уже известное совпадение через prefix function.
  mental_model: |-
    `pi[i]` — длина самого длинного **собственного префикса** строки `s[0..i]`, который одновременно является её суффиксом.

    Для `ababaca`:

    i:   0 1 2 3 4 5 6

    s:   a b a b a c a

    pi:  0 0 1 2 3 0 1

    Почему `pi[4]=3`: строка `ababa` имеет общий prefix/suffix `aba`.

    При mismatch после `j` совпавших символов не начинаем pattern с нуля. Переходим:

    j = pi[j-1]

    То есть пробуем самый длинный уже известный border.
  recognition_cues:
  - точный поиск подстроки
  - repeated prefix/suffix structure
  - нужен `O(n+m)`
  - важно избежать повторного сравнения текста
  anti_cues:
  - Для сложных множественных patterns Aho-Corasick/Trie могут быть естественнее.
  - Rolling Hash сравнивает отпечатки окон и допускает collisions. KMP использует точную prefix-suffix структуру pattern.
  core_invariant: |-
    После mismatch сохрани максимальную часть уже совпавшей информации, которая всё ещё может быть префиксом pattern.
  canonical_skeleton: |-
    j = 0
    for ch in text:
        while j > 0 and ch != pat[j]:
            j = pi[j-1]
        if ch == pat[j]: j += 1
        if j == len(pat): report_match()
  mini_example: |-
    `pi` — не «число повторов», а длина лучшего fallback-префикса для каждого конца строки.
- code: xor_cancellation
  what_it_is: |-
    XOR обладает свойствами `x^x=0`, `x^0=x` и коммутативностью, поэтому одинаковые значения могут взаимно уничтожаться.
  mental_model: |-
    XOR всех элементов оставляет значения с нечётной кратностью согласно битовой паритетной модели.
  recognition_cues:
  - every element appears twice except one
  - parity of occurrences
  - нужно `O(1)` extra space
  anti_cues:
  - Если элементы повторяются по произвольным количествам и нужен exact count.
  - XOR не восстанавливает произвольные частоты. Для «три раза кроме одного» нужны дополнительные битовые счётчики/трюки.
  core_invariant: |-
    XOR хранит паритет каждого бита; одинаковая пара полностью отменяется.
  canonical_skeleton: |-
    acc = 0
    for x in a:
        acc ^= x
    return acc
  mini_example: |-
    `4^1^4 = (4^4)^1 = 1`.
- code: bitmask_state_enumeration
  what_it_is: |-
    Набор из `m` булевых признаков кодируем одним целым числом: бит `i` означает, выбран/активен ли объект `i`.
  mental_model: |-
    Для mask `0101₂` активны элементы `0` и `2`.

    проверить i:  mask & (1<<i)

    добавить i:   mask | (1<<i)

    удалить i:    mask & ~(1<<i)

    переключить:  mask ^ (1<<i)

    Перебор всех subsets — `0 .. (1<<m)-1`.
  recognition_cues:
  - '`n` мал, часто `<=20`'
  - subsets
  - visited set внутри DP
  - состояние — комбинация включённых объектов
  anti_cues:
  - 'Если `m` велик: `2^m` states взрываются.'
  - Bit Tricks используют арифметические свойства отдельных битов; Bitmask State — прежде всего компактное представление множества.
  core_invariant: |-
    Каждая комбинация булевых признаков имеет уникальную mask.
  canonical_skeleton: |-
    for mask in range(1<<n):
        for i in range(n):
            if not (mask & (1<<i)):
                nxt = mask | (1<<i)
                relax(mask, nxt, i)
  mini_example: |-
    `0101₂` можно читать как множество `{0,2}`.
- code: bit_tricks_submask
  what_it_is: |-
    Это набор нескольких разных низкоуровневых приёмов. Общая тема — использование двоичного представления, но каждый трюк нужно знать отдельно.
  mental_model: |-
    Каждый приём использует конкретное изменение двоичного хвоста при `x-1`, `-x` или маскировании. Выбираем формулу по требуемой операции, а не по факту «в задаче есть биты».
  recognition_cues:
  - свойства power of two/popcount
  - нужен младший установленный бит
  - перебор всех submasks одной mask
  - ограничения или state уже выражены битами
  anti_cues:
  - Если битовая кодировка не отражает естественную структуру задачи, код станет менее понятным без выгоды.
  - Bitmask Enumeration всех `2^m` masks и submask iteration одной mask — разные пространства перебора.
  core_invariant: |-
    Не запоминай «магическую формулу» без двоичного примера: каждый bit trick корректен из-за конкретного поведения переноса при `±1` и маскирования.
  canonical_skeleton: |-
    sub = mask
    while sub:
        process(sub)
        sub = (sub - 1) & mask
  mini_example: |-
    `x & (x-1)` полезно ровно потому, что вычитание единицы меняет хвост после младшей единицы предсказуемым образом.
- code: directional_traversal_simulation
  what_it_is: |-
    Двигаемся по матрице по заданным направлениям и явно контролируем координаты, границы и смену направления.
  mental_model: |-
    Храним `r,c`, индекс направления и правило следующего шага. До движения проверяем:

    - выход за границу;

    - посещённость;

    - препятствие.

    Если следующий шаг невозможен, меняем направление согласно задаче.
  recognition_cues:
  - spiral traversal
  - diagonal order
  - robot movement
  - grid walk с фиксированным правилом поворота
  anti_cues:
  - Если задача о кратчайшем пути между клетками — graph search, а не простая directional traversal.
  - Process Simulation моделирует события во времени/очередях. Здесь основной state — геометрическая позиция в grid.
  core_invariant: |-
    Текущая позиция и направление всегда описывают следующий локальный шаг; каждое изменение направления вызвано конкретным граничным условием.
  canonical_skeleton: |-
    dirs = [(0,1),(1,0),(0,-1),(-1,0)]
    r=c=d=0
    for _ in range(R*C):
        visit(r,c)
        nr,nc = r+dirs[d][0], c+dirs[d][1]
        if invalid(nr,nc): d = (d+1)%4
        r,c = r+dirs[d][0], c+dirs[d][1]
  mini_example: |-
    Spiral Matrix можно реализовать либо направлением и visited, либо четырьмя сжимающимися границами; это две реализации одной геометрической идеи обхода.
- code: in_place_transform_boundary
  what_it_is: |-
    Матрица преобразуется без полной копии, часто слой за слоем или через композицию простых операций.
  mental_model: |-
    Для поворота 90° часто используют:

    1. transpose;

    2. reverse rows.

    Для layer rotation обмениваем четыре позиции циклами, аккуратно вычисляя offsets относительно границ слоя.
  recognition_cues:
  - rotate matrix in-place
  - transpose/reflect
  - обработка внешних слоёв к центру
  - '`O(1)` extra space'
  anti_cues:
  - Если разрешена дополнительная матрица и простота важнее памяти, out-of-place решение может быть лучше.
  - Directional Traversal только читает/посещает позиции; здесь основная трудность — безопасная мутация.
  core_invariant: |-
    Перед перезаписью значения сохрани все данные текущего цикла, которые ещё понадобятся; завершённые слои больше не меняются.
  canonical_skeleton: |-
    # rotate 90° clockwise
    for r in range(n):
        for c in range(r+1,n):
            a[r][c], a[c][r] = a[c][r], a[r][c]
    for row in a:
        row.reverse()
  mini_example: |-
    Поворот 90° clockwise: transpose превращает строки в столбцы, reverse каждой строки меняет ориентацию.
- code: cyclic_sort_placement
  what_it_is: |-
    Если значения лежат в известном диапазоне и каждому значению соответствует «домашний индекс», элементы переставляются на свои места.
  mental_model: |-
    Пока `a[i]` не на своей позиции, меняем его с `a[home(a[i])]`. Один swap помещает хотя бы один элемент ближе к постоянному месту.
  recognition_cues:
  - числа `1..n` или `0..n-1`
  - missing/duplicate number
  - желательно `O(1)` extra space
  anti_cues:
  - Если значения произвольны, диапазон огромен или массив нельзя мутировать.
  - Обычная сортировка строит полный порядок. Здесь нужен не порядок вообще, а специальное соответствие `value ↔ index`.
  core_invariant: |-
    Если значение `x` присутствует и нет конфликта дубликата, его естественная позиция известна заранее.
  canonical_skeleton: |-
    i = 0
    while i < n:
        j = index_of(a[i])
        if valid(a[i]) and a[i] != a[j]:
            a[i], a[j] = a[j], a[i]
        else:
            i += 1
  mini_example: |-
    Для значений `1..n` число `3` «хочет» стоять на индексе `2`.
- code: sign_marking_index_encoding
  what_it_is: |-
    Сам массив используется как дополнительная память: знак или значение позиции кодирует факт посещения.
  mental_model: |-
    Для значения `x` используем индекс `abs(x)-1`. Отрицательный знак в `a[index]` означает «x уже встречался».

    Важно брать `abs`, потому что позиция могла быть ранее помечена.
  recognition_cues:
  - значения ограничены `1..n`
  - '`O(1)` extra space'
  - найти duplicates/missing
  - массив можно менять
  anti_cues:
  - Если вход read-only, есть нули/произвольные диапазоны без адаптации или знак несёт собственный смысл.
  - Cyclic Sort физически переставляет элементы. Sign Marking оставляет порядок и кодирует visited-флаги.
  core_invariant: |-
    Знак позиции `i` кодирует внешний факт о значении `i+1`, не уничтожая модуль исходного числа.
  canonical_skeleton: |-
    for x in a:
        j = abs(x) - 1
        if a[j] < 0:
            report_duplicate(j+1)
        else:
            a[j] = -a[j]
  mini_example: |-
    Встретили `3` — делаем `a[2]` отрицательным. Если позже `a[2]` уже отрицателен, `3` — duplicate.
- code: merge_sort_divide_conquer
  what_it_is: |-
    Делим массив пополам, рекурсивно решаем части и используем merge не только для сортировки, но и для подсчёта отношений между половинами.
  mental_model: |-
    После рекурсии обе половины отсортированы. Во время merge, если `left[i] > right[j]`, то из-за сортировки **все оставшиеся** элементы `left[i..]` тоже больше `right[j]`; можно добавить их число одним действием.
  recognition_cues:
  - inversions
  - count pairs `i<j` with relation
  - нужен `O(n log n)` вместо всех пар
  - после сортировки половин пары можно считать указателями
  anti_cues:
  - Если отношение между парами не становится монотонным после сортировки половин.
  - Обычный Merge Sort только сортирует. Здесь merge-фаза несёт дополнительную статистику.
  core_invariant: |-
    Перед merge обе половины уже решены и отсортированы; порядок превращает множество cross-pairs в пакетный подсчёт.
  canonical_skeleton: |-
    solve(l,r):
        if r-l <= 1: return 0
        m = (l+r)//2
        ans = solve(l,m) + solve(m,r)
        ans += count_cross(a[l:m], a[m:r])
        merge_sorted(a,l,m,r)
        return ans
  mini_example: |-
    Левая `[2,5,7]`, правая `[1,6]`: для `1` сразу считаем три inversion pair, потому что все `2,5,7 > 1`.
- code: quickselect_order_statistics
  what_it_is: |-
    Находим k-й элемент по порядку, не сортируя всё.
  mental_model: |-
    Partition ставит pivot в окончательную позицию `p`:

    - если `p==k` — готово;

    - если `k<p` — работаем только слева;

    - иначе только справа.

    Среднее время `O(n)`, worst-case `O(n²)` без хорошего pivot strategy; randomized pivot снижает риск систематически плохих случаев.
  recognition_cues:
  - kth smallest/largest
  - median once
  - полный sorted order не нужен
  anti_cues:
  - Если нужны многие rank queries или стабильный worst-case без сложной реализации.
  - Binary Search требует предварительной монотонной структуры. Quickselect сам переставляет элементы через partition.
  core_invariant: |-
    После partition pivot уже на своей финальной rank-позиции, поэтому одна сторона навсегда отбрасывается.
  canonical_skeleton: |-
    lo, hi = 0, n-1
    while True:
        p = partition(a, lo, hi)
        if p == k: return a[p]
        if k < p: hi = p-1
        else: lo = p+1
  mini_example: |-
    Ищем 5-й smallest; pivot оказался на rank 8 — правая часть не может содержать ответ.
- code: recursive_partition_search
  what_it_is: |-
    Находим разделитель, рекурсивно решаем независимые части и объединяем ответы по явному контракту.
  mental_model: |-
    Нужно определить:

    1. `split(problem)`;

    2. base case;

    3. что возвращает каждая подзадача;

    4. `combine(left,right)`.

    Пример Different Ways to Add Parentheses: выбираем оператор как последний верхнеуровневый split, рекурсивно получаем все значения слева/справа и комбинируем попарно.
  recognition_cues:
  - структура естественно раскалывается
  - подзадачи почти не перекрываются
  - combine двух решений проще исходной задачи
  anti_cues:
  - Если части перекрываются экспоненциально — memoization/DP лучше.
  - Binary Search выбирает одну половину благодаря монотонности. Divide & Conquer часто решает **обе** половины. DP нужен, когда одни и те же подзадачи сильно повторяются.
  core_invariant: |-
    Разделение полезно, только если контракт частей действительно уменьшает задачу и все глобальные решения покрываются выбранными split-позициями.
  canonical_skeleton: |-
    solve(problem):
        if small(problem): return direct(problem)
        parts = partition(problem)
        results = [solve(p) for p in parts]
        return combine(results)
  mini_example: |-
    В выражении `2*3-4` разделитель `*` создаёт подзадачи `2` и `3-4`; разделитель `-` — `2*3` и `4`. Перебор split покрывает разные структуры скобок.
- code: frequency_counting
  what_it_is: |-
    Считаем, **сколько раз встречается каждый элемент**. Для `[a, b, a, c, a]` получаем `a → 3`, `b → 1`, `c → 1`.
  mental_model: |-
    Проходим по данным и делаем `count[x] += 1`. После прохода карта частот становится компактной статистикой всего входа.
  recognition_cues:
  - важны повторы и их количество
  - нужно найти самый частый/редкий элемент
  - сравниваются наборы с учётом числа копий
  - встречаются слова `frequency`, `count`, `anagram`, `majority`
  anti_cues:
  - Если важен отсортированный порядок или ближайший сосед; если диапазон значений мал, массив счётчиков может быть проще и быстрее.
  - '`Set` отвечает только «есть / нет». Если нужно различать одну и пять копий, нужен счётчик.'
  core_invariant: |-
    После обработки первых `i` элементов `count[x]` точно равен числу появлений `x` в этом префиксе.
  canonical_skeleton: |-
    for x in items:
        count[x] += 1
    answer = derive(count)
  mini_example: |-
    Чтобы проверить анаграммы, сравниваем частоты букв, а не их позиции.
- code: grouping_canonical_signature
  what_it_is: |-
    Превращаем объект в **каноническую подпись**: одинаковые по смыслу объекты обязаны получать одинаковый ключ.
  mental_model: |-
    Строим `signature(x)` и добавляем объект в `groups[signature]`. Главная работа — придумать подпись без ложных совпадений.
  recognition_cues:
  - нужно сгруппировать объекты «одинаковой структуры»
  - порядок частей может быть неважен
  - разные внешние формы могут означать одну сущность
  anti_cues:
  - Если эквивалентность зависит от глобального контекста или подпись почти так же дорога, как прямое сравнение всех объектов.
  - Frequency Counting считает копии конкретного значения. Здесь сначала создаётся новое представление, которое выражает **класс эквивалентности**.
  core_invariant: |-
    Эквивалентные объекты должны иметь один ключ; неэквивалентные — не должны случайно сливаться.
  canonical_skeleton: |-
    groups = {}
    for x in items:
        key = signature(x)
        groups[key].append(x)
  mini_example: |-
    Для анаграмм подписью может быть отсортированная строка: `eat` и `tea` обе дают `aet`.
- code: frequency_of_frequency_buckets
  what_it_is: |-
    Иногда мало знать `count[x]`. Нужно ещё знать, **сколько разных элементов сейчас имеют частоту `f`**.
  mental_model: |-
    Храним два уровня:

    - `count[x]` — частота элемента;

    - `freq_count[f]` — сколько элементов имеют частоту `f`.

    При изменении `x` с частоты `2` на `3` нужно **сначала убрать старый вклад**, затем добавить новый:

    freq_count[2] -= 1

    count[x] = 3

    freq_count[3] += 1
  recognition_cues:
  - запросы «есть ли значение с частотой `f`»
  - частоты динамически меняются
  - нужен быстрый максимум/минимум по частоте
  - встречаются структуры вроде `All O(1)` или частотные корзины
  anti_cues:
  - Если частоты считаются один раз и больше не меняются — второй уровень часто избыточен.
  - 'Обычная карта частот знает `x → f`, но не отвечает за `O(1)`: «сколько элементов имеют частоту 3?»'
  core_invariant: |-
    Любое изменение частоты элемента должно синхронно обновлять статистику старой и новой частоты.
  canonical_skeleton: |-
    old = freq[x]
    remove(x, bucket[old])
    freq[x] += delta
    add(x, bucket[freq[x]])
  mini_example: |-
    Если `a` и `b` встречаются по три раза, то `freq_count[3] = 2`. Если `a` встретился ещё раз, станет `freq_count[3] = 1`, `freq_count[4] = 1`.
- code: sorted_pair_triplet_search
  what_it_is: |-
    В отсортированном массиве ставим указатели с двух сторон и по текущему результату решаем, какую сторону безопасно сдвинуть.
  mental_model: |-
    Для суммы: если `a[l] + a[r]` мало — увеличиваем `l`; если велико — уменьшаем `r`. Сортировка гарантирует, что движение действительно отбрасывает бесполезные пары.
  recognition_cues:
  - массив отсортирован или допустима сортировка
  - ищется пара/тройка
  - есть цель по сумме, разнице или близости
  - '`O(n²)` для пары слишком дорого'
  anti_cues:
  - Если порядок нельзя менять и нет другого способа использовать отсортированность.
  - Hash Complement не требует сортировки и часто лучше, когда нужны исходные индексы. Two Pointers особенно силён, когда порядок даёт монотонное решение.
  core_invariant: |-
    Каждый сдвиг должен исключать целый класс вариантов, а не просто «пробовать следующую пару».
  canonical_skeleton: |-
    sort(a)
    for i in outer_choices:
        l, r = i+1, n-1
        while l < r:
            v = expr(a[i], a[l], a[r])
            move l or r by monotone rule
  mini_example: |-
    В `[1,2,4,7]` для суммы `9`: `1+7=8`, значит всё с тем же `1` и меньшим правым элементом тоже слишком мало; двигаем левый указатель.
- code: converging_validation_palindrome
  what_it_is: |-
    Два указателя идут навстречу и проверяют согласованные пары элементов с краёв.
  mental_model: |-
    Сравниваем `left` и `right`. Если пара допустима, сужаем диапазон; если нет — либо сразу отвечаем, либо выполняем ограниченное ветвление, например «пропустить один символ».
  recognition_cues:
  - палиндром
  - зеркальная симметрия
  - внешние элементы определяют, можно ли продолжать внутрь
  anti_cues:
  - Если решение зависит от произвольных пар, а не от согласованного сужения с краёв.
  - Sorted Pair Search тоже двигает указатели навстречу, но там движение определяется величиной цели; здесь — корректностью симметричной пары.
  core_invariant: |-
    Всё за пределами `[left, right]` уже проверено и больше не требует внимания.
  canonical_skeleton: |-
    l, r = 0, n-1
    while l < r:
        if compatible(a[l],a[r]):
            l += 1; r -= 1
        else:
            handle bounded mismatch
  mini_example: |-
    `racecar`: проверяем `r/r`, `a/a`, `c/c`; после каждого совпадения внешний слой считается доказанным.
- code: root_to_leaf_path_state
  what_it_is: |-
    Во время DFS переносим состояние текущего пути от корня к потомку.
  mental_model: |-
    В вызов передаём `state` пути: сумму, максимум, список, маску. Для sibling-ветвей состояние должно быть независимым или корректно откатываться.
  recognition_cues:
  - path sum
  - последовательность root-to-leaf
  - ограничение зависит от предков текущего узла
  anti_cues:
  - Если ответ узла зависит от результатов обоих поддеревьев.
  - Postorder Aggregation получает ответы **из детей вверх**. Здесь информация течёт от предка к потомку.
  core_invariant: |-
    При входе в узел `state` описывает ровно путь от корня до текущей позиции согласно выбранному контракту.
  canonical_skeleton: |-
    dfs(node, state):
        if not node: return
        s2 = extend(state,node)
        if leaf(node): consume(s2)
        dfs(node.left,s2)
        dfs(node.right,s2)
  mini_example: |-
    Path Sum: передаём `remaining - node.val` вниз; на листе проверяем остаток.
- code: postorder_subtree_aggregation
  what_it_is: |-
    Сначала решаем детей, затем из их результатов вычисляем состояние родителя.
  mental_model: |-
    Функция возвращает компактный summary поддерева. Родитель объединяет `left_summary`, `right_summary` и своё значение. Иногда глобальный ответ обновляется отдельно.
  recognition_cues:
  - height/diameter
  - subtree sum
  - balanced tree
  - решение узла зависит от обоих детей
  anti_cues:
  - Если нужна обработка по уровням или кратчайшее число рёбер.
  - Root-to-Leaf State переносит контекст вниз; здесь результат поднимается вверх.
  core_invariant: |-
    Когда обрабатывается узел, summaries его детей уже окончательно корректны.
  canonical_skeleton: |-
    dfs(node):
        if not node: return base
        L = dfs(node.left)
        R = dfs(node.right)
        update_global(L,R,node)
        return combine(L,R,node)
  mini_example: |-
    Высота узла = `1 + max(height(left), height(right))`; диаметр через узел использует сумму двух высот.
- code: tree_construction_serialization
  what_it_is: |-
    Строим дерево из обходов/описания или кодируем дерево так, чтобы его форму можно было восстановить.
  mental_model: |-
    Для reconstruction используем свойства обходов и границы подзадач. Для serialization нужно кодировать не только значения, но и структуру.

    Пример:

        1

       /

      2

    Preorder значений `1,2` недостаточен: та же последовательность могла означать правого ребёнка. С маркерами:

    1,2,#,#,#

    форма однозначна.
  recognition_cues:
  - preorder + inorder
  - serialize/deserialize
  - reconstruct tree
  - важны `null`-позиции
  anti_cues:
  - Если дерево не является бинарным или формат имеет другие правила — контракт нужно изменить.
  - Traversal просто посещает готовое дерево; construction/serialization определяет его структуру.
  core_invariant: |-
    Формат должен содержать достаточно информации, чтобы декодер восстановил и значения, и отсутствие детей.
  canonical_skeleton: |-
    build(segment):
        if empty: return null
        root = choose_root(segment)
        root.left = build(left_segment)
        root.right = build(right_segment)
        return root
  mini_example: |-
    Preorder + inorder: первый preorder-элемент — корень; его позиция в inorder делит левое и правое поддеревья.
- code: greedy_pairing_matching
  what_it_is: |-
    Формируем пары, используя порядок, чтобы крайние элементы определяли безопасный выбор.
  mental_model: |-
    Часто рассматриваем самый сильный/тяжёлый объект. Если он может быть спарен с самым слабым — делаем это; если не может, то с более сильным тем более не сможет и идёт один.
  recognition_cues:
  - pairing people/items
  - минимизировать число пар/контейнеров/стоимость
  - после сортировки самый слабый/сильный элемент диктует решение
  anti_cues:
  - Если совместимость немонотонна после сортировки или пары имеют сложную глобальную стоимость.
  - 'Resource Assignment имеет две семантически разные стороны: demands и resources. Pairing чаще формирует пары внутри одного или симметричного набора.'
  core_invariant: |-
    Экстремальный объект должен быть обработан сейчас, а выбранный партнёр не должен тратить более ценный ресурс без необходимости.
  canonical_skeleton: |-
    sort(A); sort(B)
    i=j=0
    while i<len(A) and j<len(B):
        if feasible(A[i],B[j]): match; i+=1; j+=1
        else: advance proven-unusable side
  mini_example: |-
    Boat limit: если самый тяжёлый не помещается с самым лёгким, он не поместится ни с кем — отправляем одного.
- code: resource_assignment
  what_it_is: |-
    Есть **требования** и **ресурсы**. Каждому требованию подбираем минимально достаточный ресурс, сохраняя сильные ресурсы для будущих сложных требований.
  mental_model: |-
    Сортируем обе стороны. Для очередного demand продвигаем resource pointer до первого достаточного. Приоритет может быть обратным: иногда выгодно обслуживать самые сложные требования сначала.
  recognition_cues:
  - workers/jobs
  - cookies/children
  - rooms/requests
  - resource capacity must satisfy demand
  anti_cues:
  - Если один ресурс может дробиться, переиспользоваться или влияет на несколько требований сложным образом.
  - 'Pairing формирует пары внутри симметричной структуры. Здесь роли несимметричны: одна сторона требует, другая покрывает.'
  core_invariant: |-
    Не расходуй ресурс сильнее необходимого, если более слабый уже удовлетворяет текущий demand.
  canonical_skeleton: |-
    sort(events)
    for e in events:
        release_finished()
        add_newly_available()
        r = best_feasible_resource()
        assign(e,r)
  mini_example: |-
    Для требований `[2,4]` и ресурсов `[3,5]` требование `2` получает `3`, чтобы `5` осталось для `4`.
- code: exchange_argument_ordering
  what_it_is: |-
    Нужно выбрать порядок объектов. Greedy-порядок доказывается тем, что любую «неправильную» соседнюю пару можно поменять местами без ухудшения ответа.
  mental_model: |-
    Выводим локальное условие: когда `a` должно быть раньше `b`? Например, для largest number сравниваем конкатенации `ab` и `ba`.

    Затем exchange argument: если оптимальное решение содержит соседнюю инверсию относительно comparator, swap не ухудшает решение. Повторяя swap, получаем greedy-sorted порядок.
  recognition_cues:
  - sort by custom comparator
  - порядок влияет на сумму/строку/штраф
  - можно сравнить два соседних объекта `a,b` в обоих порядках
  anti_cues:
  - Если эффект пары зависит от дальнего контекста и соседний swap нельзя анализировать локально.
  - Обычная сортировка по ключу использует внешний порядок данных. Здесь порядок выводится из оптимизационного доказательства.
  core_invariant: |-
    Comparator должен следовать из влияния **двух порядков одной пары** на глобальную цель, а не из догадки вроде «сортируем по самому большому полю».
  canonical_skeleton: |-
    define better_before(a,b)
    sort(items, comparator=better_before)
    return evaluate(items)
  mini_example: |-
    Для строк-чисел `9` и `34`: `934 > 349`, поэтому `9` должно стоять раньше `34`.
- code: dp_take_skip
  what_it_is: |-
    Для позиции решаем: взять текущий объект или пропустить.
  mental_model: |-
    Пример House Robber:

    dp[i] = max(

        dp[i-1],          # skip i

        dp[i-2] + a[i]    # take i

    )

    State должен ясно означать, например: `dp[i]` — лучший ответ на префиксе `0..i`.
  recognition_cues:
  - нельзя брать соседние элементы
  - choose subset under local conflicts
  - решение префикса зависит от нескольких предыдущих позиций
  anti_cues:
  - Если выбор текущего элемента влияет на далёкое состояние, которое не помещается в маленький DP-state.
  - Backtracking тоже ветвится take/skip, но DP объединяет повторяющиеся подзадачи одного state.
  core_invariant: |-
    Разбей все оптимальные решения на исчерпывающие случаи «взяли текущий / не взяли текущий».
  canonical_skeleton: |-
    skip = dp[i-1]
    take = value[i] + dp[prev_compatible(i)]
    dp[i] = best(skip,take)
  mini_example: |-
    Если берём дом `i`, дом `i-1` запрещён, поэтому добавляем к `dp[i-2]`.
- code: dp_prefix_partition
  what_it_is: |-
    `dp[i]` описывает лучший/возможный ответ для первых `i` элементов, а переход перебирает последнюю часть, на которой заканчивается решение.
  mental_model: |-
    Типичная форма:

    dp[i] = best over j < i of

            combine(dp[j], cost(j..i-1))

    Главный вопрос — что означает `j`: начало последнего блока.
  recognition_cues:
  - split string/array into segments
  - word break
  - partition cost
  - последняя граница естественно делит решение
  anti_cues:
  - Если `O(n²)` перебор границ слишком дорог и нет оптимизации.
  - Interval DP хранит два свободных конца `[l,r]`; Prefix DP всегда привязан к началу `0` и растущему префиксу.
  core_invariant: |-
    Любое решение префикса имеет последнюю границу; перебор всех возможных последних границ покрывает все решения без пропусков.
  canonical_skeleton: |-
    dp[0]=base
    for i in 1..n:
        for j in candidates_before(i):
            if valid(j,i):
                dp[i] = combine(dp[i],dp[j],segment(j,i))
  mini_example: |-
    Word Break: `dp[i]=true`, если существует `j<i` с `dp[j]=true` и `s[j:i]` в словаре.
- code: dp_counting_ways
  what_it_is: |-
    DP считает число способов достичь state. Критично определить, что считается разным способом и имеет ли значение порядок.
  mental_model: |-
    `dp[state] += dp[previous_state]`. Но **порядок циклов меняет смысл**.

    Для coins `[1,2]`, sum `3`:

    **Комбинации, порядок не важен:** внешний цикл по coins.

    for coin in coins:

        for s in coin..target:

            dp[s] += dp[s-coin]

    Получаем `{1+1+1, 1+2}` — два способа.

    **Последовательности, порядок важен:** внешний цикл по sum/state.

    for s in 1..target:

        for coin in coins:

            dp[s] += dp[s-coin]

    Теперь `1+2` и `2+1` различаются.
  recognition_cues:
  - number of ways
  - count sequences/combinations
  - paths count
  - ответ часто по модулю
  anti_cues:
  - Если число способов выводится прямой формулой комбинаторики без большого state-space.
  - Feasibility DP хранит boolean; optimization DP — min/max. Здесь суммируются количества.
  core_invariant: |-
    Перед кодом сформулируй единицу подсчёта: какие два пути считаются одним способом, а какие разными.
  canonical_skeleton: |-
    dp[start]=1
    for state in order:
        for nxt in transitions(state):
            dp[nxt] += dp[state]
  mini_example: |-
    Одинаковые переходы с разным порядком циклов могут считать либо combinations, либо permutations.
- code: linear_string_scan_parsing
  what_it_is: |-
    Один проход по строке извлекает токены или вычисляет ответ, поддерживая небольшой локальный state.
  mental_model: |-
    Определяем, что означает текущая позиция и какие переменные достаточны: начало токена, знак, текущее число, previous char, длина серии.
  recognition_cues:
  - parse simple format
  - count/normalize runs
  - обработка символов слева направо
  - полноценный стек/DP не нужен
  anti_cues:
  - При вложенной структуре или сложных приоритетах.
  - Finite-State Parser нужен, когда допустимость зависит от явных режимов грамматики. Linear Scan может быть проще и не иметь отдельного автомата.
  core_invariant: |-
    После обработки префикса все завершённые токены окончательны, а state описывает только незавершённый хвост.
  canonical_skeleton: |-
    state=init
    for ch in s:
        state=step(state,ch)
        if emits(state): output(token(state))
  mini_example: |-
    При разборе `"  -123x"` пропускаем пробелы, читаем знак, затем последовательность цифр и останавливаемся на `x`.
- code: finite_state_parser
  what_it_is: |-
    Парсер представляется конечным автоматом: текущий режим определяет, какие символы допустимы и в какой режим переходить.
  mental_model: |-
    Определяем states, например для числа:

    - start;

    - sign;

    - integer digits;

    - dot;

    - fraction;

    - exponent marker;

    - exponent sign;

    - exponent digits.

    Для каждого символа выполняем transition. Если перехода нет — строка невалидна. В конце проверяем, является ли state принимающим.
  recognition_cues:
  - validate number/token
  - формат имеет несколько фаз
  - множество локальных правил становится запутанным через `if`-ы
  anti_cues:
  - Для рекурсивных грамматик вроде произвольной вложенности скобок нужен стек/parser.
  - Expression Stack нужен для вложенности/приоритета, которых конечный автомат с фиксированным числом состояний не выражает.
  core_invariant: |-
    State полностью суммирует всё прошлое, что ещё важно для допустимости будущих символов.
  canonical_skeleton: |-
    state=START
    for ch in s:
        cls=classify(ch)
        if (state,cls) not in T: reject
        state=T[state,cls]
    return state in accepting
  mini_example: |-
    После `1e` обычная цифра до экспоненты уже не завершает число: автомат ждёт optional sign или exponent digit.
- code: process_event_simulation
  what_it_is: |-
    Явно моделируем состояние системы во времени или по последовательности событий.
  mental_model: |-
    Определяем:

    1. полное состояние `state`;

    2. следующий event;

    3. функцию `apply(state,event)`;

    4. правило появления будущих событий.

    Если события имеют временные метки, priority queue может выбирать ближайшее событие; если порядок фиксирован входом, достаточно scan/queue.
  recognition_cues:
  - queue/process/server/game turns
  - правила перехода детерминированы
  - нужно воспроизвести конечное состояние
  - важен точный порядок событий
  anti_cues:
  - Если прямой процесс делает слишком много шагов и существует математический shortcut/cycle detection.
  - Sweep Line агрегирует события по координате и часто не моделирует идентичность объектов. Simulation может требовать детальный state каждого участника.
  core_invariant: |-
    После обработки первых `k` событий state должен точно совпадать с системой после этих же `k` событий по условию.
  canonical_skeleton: |-
    state=init
    for e in chronological(events):
        advance(state,e.time)
        apply(state,e)
        collect(state)
  mini_example: |-
    CPU queue: после каждого завершения задачи обновляем время, очередь доступных задач и набор будущих arrivals в строго определённом порядке.
- code: direct_construction_formatting
  what_it_is: |-
    Ответ строится прямо по правилам условия без сложного поиска оптимума.
  mental_model: |-
    Разбиваем спецификацию на независимые правила и строим результат в нужном порядке. Часто полезно сначала вычислить размеры/границы, затем заполнить output.
  recognition_cues:
  - format output
  - construct string/matrix
  - deterministic transformation
  - главная трудность — аккуратные индексы и edge cases
  anti_cues:
  - Если за «построить» скрывается поиск существования/минимума или сложные зависимости.
  - Simulation повторяет переходы системы. Direct Construction сразу вычисляет требуемое представление.
  core_invariant: |-
    Каждый уже построенный фрагмент соответствует точному правилу формата; не усложняй задачу алгоритмом, которого в ней нет.
  canonical_skeleton: |-
    ans=[]
    for unit in construction_order(input):
        ans.append(render(unit))
    return finalize(ans)
  mini_example: |-
    Zigzag Conversion можно строить, направляя каждый символ в текущую строку и меняя направление только на верхней/нижней границе.
- code: digit_arithmetic_base_conversion
  what_it_is: |-
    Работаем с цифрами числа вручную: переносы, разряды, системы счисления.
  mental_model: |-
    Обрабатываем разряды с carry:

    sum = a_digit + b_digit + carry

    out_digit = sum % base

    carry = sum // base

    Для перевода из base `b` в число: `value = value*b + digit`. Для обратного представления повторно делим на base и собираем остатки в обратном порядке.
  recognition_cues:
  - add/multiply big numbers as strings
  - base conversion
  - reverse digits
  - запрещены big integers
  anti_cues:
  - Если стандартный числовой тип безопасно покрывает диапазон и ручная обработка не нужна.
  - Modular Arithmetic намеренно сохраняет только остаток и теряет полное число; digit arithmetic строит точное представление.
  core_invariant: |-
    После обработки `k` младших разрядов output уже корректен на этих разрядах, а `carry` содержит весь перенос в ещё не обработанную часть.
  canonical_skeleton: |-
    carry=initial
    for digit from least_significant:
        x=digit+carry
        output(x%base)
        carry=x//base
  mini_example: |-
    В base 10: `8+7=15`, записываем `5`, переносим `1`.
- code: number_theory_gcd_factorization
  what_it_is: |-
    Это маленькое семейство техник, а не один алгоритм. Основные ветви нужно различать.
  mental_model: |-
    Сначала выбираем представление числа: остатки Евклида, пары делителей до `sqrt(n)`, массовую таблицу простых или вектор простых степеней. Это разные стоимости и разные states.
  recognition_cues:
  - общие делители/периоды → GCD
  - кратность двух величин → LCM
  - один большой `n` нужно разложить → factorization
  - много запросов до общего `N` → sieve/SPF
  - ответ зависит от показателей простых
  anti_cues:
  - Для очень больших целых trial division до sqrt может быть слишком медленным.
  - Modular Arithmetic работает с остатками вычислений; factorization раскрывает структуру делителей числа.
  core_invariant: |-
    Сначала выясни, нужен ли один gcd, одна факторизация или массовая предобработка до N — это разные стоимости и инструменты.
  canonical_skeleton: |-
    gcd(a,b):
        while b:
            a,b=b,a%b
        return a

    factorize(n):
        for p up to sqrt(n): consume p repeatedly
  mini_example: |-
    `gcd(48,18)`: `(48,18)→(18,12)→(12,6)→(6,0)`, ответ `6`.
- code: modular_arithmetic_fast_pow
  what_it_is: |-
    Вычисления выполняются по модулю, а большие степени — двоичным возведением.
  mental_model: |-
    Свойства:

    (a+b) mod M = ((a mod M)+(b mod M)) mod M

    (a*b) mod M = ((a mod M)*(b mod M)) mod M

    Fast power разбивает exponent по битам:

    result = 1

    base %= M

    while exp > 0:

        if exp & 1:

            result = result * base % M

        base = base * base % M

        exp >>= 1
  recognition_cues:
  - answer modulo `M`
  - огромная степень
  - циклические остатки
  - overflow при прямом вычислении
  anti_cues:
  - Если требуется точное большое число, modulo намеренно теряет информацию.
  - Деление по модулю нельзя выполнять обычным `/`. Нужен modular inverse, и он существует не всегда.
  core_invariant: |-
    На каждом шаге произведение `result * base^exp` эквивалентно исходной степени по модулю M.
  canonical_skeleton: |-
    res=1
    while e>0:
        if e&1: res=res*a%mod
        a=a*a%mod
        e>>=1
  mini_example: |-
    `a^13`: `13=8+4+1`, поэтому binary exponentiation использует квадраты `a,a²,a⁴,a⁸` вместо 12 последовательных умножений.
- code: dp_digit_positional
  what_it_is: |-
    Считаем числа в диапазоне `0..N`, строя число слева направо по цифрам и запоминая, насколько текущий префикс ограничен цифрами `N`.
  mental_model: |-
    Типичный state:

    - `pos` — какую позицию цифры выбираем;

    - `tight` — равен ли построенный префикс префиксу `N`;

    - `started` — началось ли само число, или пока идут leading zeros;

    - дополнительное состояние свойства: сумма цифр, маска использованных цифр, automaton state и т.д.

    Если `tight=true`, максимальная цифра равна `digitsN[pos]`. Выбрали меньшую — дальше `tight=false`, и последующие цифры свободны `0..9`.
  recognition_cues:
  - count numbers `<= N`
  - ограничение на цифры/число повторов/сумму цифр
  - диапазон огромен, перебор чисел невозможен
  - свойство можно обновлять по префиксу цифр
  anti_cues:
  - Если `N` мало или свойство имеет простую закрытую формулу.
  - Обычная комбинаторика по разрядам работает, если ограничения просты и не зависят от сложного префиксного состояния. Digit DP нужен, когда state повторяется между множеством префиксов.
  core_invariant: |-
    `tight` означает: «мы всё ещё точно совпадаем с префиксом N и потому ограничены следующей цифрой N».
  canonical_skeleton: |-
    dfs(pos,tight,started,extra):
        if pos==len(digits): return terminal
        limit=digits[pos] if tight else 9
        return sum(dfs(next_state) for d in 0..limit if allowed)
  mini_example: |-
    Для диапазона `[L,R]` часто считают `count(<=R) - count(<L)`.
- code: combinatorial_counting
  what_it_is: |-
    Считаем число объектов формулой, а не перебором. Inclusion–Exclusion исправляет двойной и многократный подсчёт пересекающихся множеств.
  mental_model: |-
    Для двух множеств:

    |A ∪ B| = |A| + |B| - |A ∩ B|

    Для трёх добавляются одиночные, вычитаются парные пересечения, добавляется тройное.

    В задачах делимости число `<=N`, кратных `d`, равно `floor(N/d)`. Пересечение кратных `a` и `b` считается через `lcm(a,b)`.
  recognition_cues:
  - count without enumeration
  - combinations/permutations
  - «делится хотя бы на одно из...»
  - union of overlapping properties
  anti_cues:
  - Если число свойств велико и перебор всех их подмножеств `2^m` слишком дорог.
  - Counting Ways DP нужен, когда число способов строится по состояниям и переходам; комбинаторика использует глобальную структуру и формулы.
  core_invariant: |-
    Для объекта, принадлежащего `k` выбранным свойствам, итоговый коэффициент inclusion–exclusion должен стать ровно `1`.
  canonical_skeleton: |-
    ans=0
    for mask over constraints:
        term=count_objects_satisfying(mask)
        ans += (-1)**popcount(mask) * term
  mini_example: |-
    Числа до `N`, делящиеся на 2 или 3: `N/2 + N/3 - N/6` с округлением вниз.
- code: probability_expected_value
  what_it_is: |-
    Под одним ID находятся **три разные математические модели**. Их обязательно различать до выбора формулы.
  mental_model: |-
    Сначала определяем, кто выбирает следующий переход: случайность, линейное усреднение случайной величины или рациональный противник. Затем записываем соответствующее уравнение по state.
  recognition_cues:
  - исход выбирает случайность → probability
  - спрашивают среднее число шагов/стоимость → expected value
  - соперник выбирает оптимальный ответ → game reasoning/minimax
  - state повторяется после разных историй
  anti_cues:
  - Если зависимости настолько велики, что выбранный state не является Markov-like и не суммирует нужную историю.
  - «Вероятность победы» и «оптимальная игра» — не одно и то же. Если противник выбирает худший для нас ход, это не random transition.
  core_invariant: |-
    Сначала определи, кто выбирает переход: случайность, усреднение случайной величины или оптимальный противник.
  canonical_skeleton: |-
    value[s] = sum(p(s->t)*value[t])
    # или
    win[s] = exists(t in moves(s): not win[t])
  mini_example: |-
    Кубик: expected value одного броска `Σ p*v`. Игра с камнями: позиция winning, если есть ход в losing position. Это две разные задачи, несмотря на общий математический раздел.
- code: orientation_cross_product
  what_it_is: |-
    Знак cross product для трёх точек показывает поворот: влево, вправо или коллинеарно.
  mental_model: |-
    Для `A(ax,ay)`, `B(bx,by)`, `C(cx,cy)`:

    cross(A,B,C) =

        (bx-ax)*(cy-ay) - (by-ay)*(cx-ax)

    - `>0` — один поворот (обычно counter-clockwise при стандартных осях);

    - `<0` — противоположный;

    - `=0` — collinear.

    Используйте целые типы достаточной разрядности: произведения координат могут overflow.
  recognition_cues:
  - orientation
  - convex hull
  - collinear points
  - segment intersection
  - polygon turns
  anti_cues:
  - Если нужны только расстояния/ближайшие точки без угловой структуры.
  - Slope через floating point страдает от точности и vertical lines. Cross product обычно надёжнее для ориентации.
  core_invariant: |-
    Геометрический вопрос «с какой стороны от направленной прямой лежит C?» превращается в знак одного числа.
  canonical_skeleton: |-
    cross(a,b,c)=(b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x)
    while len(hull)>=2 and bad_turn(...):
        hull.pop()
    hull.append(p)
  mini_example: |-
    `A=(0,0), B=(1,0), C=(1,1)`: cross `=1`, значит поворот от AB к AC против часовой стрелки.
- code: slope_normalization_geo_hashing
  what_it_is: |-
    Геометрическое отношение превращаем в канонический hash key. Для направления прямой не используем float slope.
  mental_model: |-
    Для пары точек:

    dy = y2-y1

    dx = x2-x1

    g = gcd(abs(dy), abs(dx))

    dy /= g

    dx /= g

    Затем нормализуем знак, например требуем `dx > 0`; если `dx < 0`, меняем оба знака.

    Специальные случаи:

    - vertical: единый ключ `(1,0)`;

    - horizontal: `(0,1)`;

    - duplicate points: считать отдельно, потому что `(0,0)` не определяет направление.
  recognition_cues:
  - max points on a line
  - одинаковое направление
  - сгруппировать пары точек по slope
  anti_cues:
  - Если нужны точные пересечения сегментов или повороты — cross product прямее.
  - Orientation Cross Product отвечает «слева/справа/на линии» для тройки точек. Slope Hashing группирует много пар по одному направлению.
  core_invariant: |-
    Все геометрически одинаковые направления обязаны иметь один и тот же целочисленный ключ.
  canonical_skeleton: |-
    dy=y2-y1; dx=x2-x1
    g=gcd(abs(dy),abs(dx))
    key=normalize_sign(dy//g,dx//g)
    count[key]+=1
  mini_example: |-
    `(dy,dx)=(2,4)` и `(1,2)` обе нормализуются к `(1,2)`.
- code: area_rectangle_overlap
  what_it_is: |-
    Площади axis-aligned фигур сводятся к пересечению диапазонов по каждой оси.
  mental_model: |-
    Для двух прямоугольников:

    overlap_w = max(0, min(r1,r2) - max(l1,l2))

    overlap_h = max(0, min(t1,t2) - max(b1,b2))

    intersection = overlap_w * overlap_h

    Union area двух фигур:

    area1 + area2 - intersection
  recognition_cues:
  - rectangle area
  - overlap/intersection
  - union of two rectangles
  - axis-aligned boxes
  anti_cues:
  - Если фигуры повернуты или имеют произвольные многоугольные границы.
  - Для union множества прямоугольников простой inclusion–exclusion уже не масштабируется; нужен sweep line/segment tree.
  core_invariant: |-
    Сначала найди общий диапазон независимо по x и y; только затем перемножай длины.
  canonical_skeleton: |-
    w=max(0,min(r1,r2)-max(l1,l2))
    h=max(0,min(t1,t2)-max(b1,b2))
    intersection=w*h
  mini_example: |-
    Если общий x-диапазон пуст, площадь пересечения ноль независимо от y.
- code: geometric_distance_optimization
  what_it_is: |-
    Сначала выбираем **метрику**, затем ищем структуру оптимума. Manhattan и Euclidean задачи ведут себя по-разному.
  mental_model: |-
    минимизировать `Σ|x_i-x|` (L1) → median

    минимизировать `Σ(x_i-x)^2` → mean

    Manhattan в 2D → координаты часто разделяются: median x и median y

    max Manhattan distance → экстремумы преобразований `±x±y`

    Euclidean nearest → квадраты расстояний, geometry structures
  recognition_cues:
  - minimize total distance
  - meeting point
  - closest/farthest under metric
  - координатная оптимизация
  anti_cues:
  - Если есть препятствия, граф дорог или допустимы только дискретные пути — геометрическая метрика может не совпадать с реальной стоимостью.
  - Среднее минимизирует squared error, но не сумму абсолютных расстояний.
  core_invariant: |-
    До оптимизации запиши точную функцию расстояния. Смена `|dx|+|dy|` на `sqrt(dx²+dy²)` меняет математику ответа.
  canonical_skeleton: |-
    baseline=total_cost(reference)
    for candidate in candidates:
        ans=min(ans, baseline+delta(candidate))
  mini_example: |-
    Для точек на линии `0,0,100` median `0` минимизирует сумму абсолютных расстояний; mean ≈ `33.3` решает другую objective.
- code: fenwick_tree_bit
  what_it_is: |-
    Компактная структура для **point update + prefix aggregate** за `O(log n)`. Чаще всего — суммы.
  mental_model: |-
    `lowbit(i) = i & -i` показывает размер блока, за который отвечает `tree[i]`.

    Например:

    i = 12 = 1100₂

    lowbit(12) = 0100₂ = 4

    Значит `tree[12]` хранит агрегат блока длины `4`, заканчивающегося в `12`: позиции `9..12` при 1-based indexing.

    **Собрать префикс:** идём к родителю `i -= lowbit(i)`.

    **Обновить точку:** идём по блокам, содержащим позицию, `i += lowbit(i)`.
  recognition_cues:
  - массив меняется
  - много prefix/range sum запросов
  - простой Prefix Sum ломается из-за обновлений
  - операция обратима для получения диапазона из двух префиксов
  anti_cues:
  - Если операция плохо сочетается с префиксным разложением или нужны сложные диапазонные обновления.
  - 'Segment Tree гибче: min/max, сложные агрегаты, range updates. Fenwick проще и компактнее для префиксных задач.'
  core_invariant: |-
    Каждая ячейка хранит агрегат своего `lowbit`-блока; префикс раскладывается на непересекающиеся такие блоки.
  canonical_skeleton: |-
    add(i,delta):
        while i<=n:
            bit[i]+=delta
            i+=i&-i

    sum(i):
        s=0
        while i>0:
            s+=bit[i]
            i-=i&-i
        return s
  mini_example: |-
    Чтобы собрать prefix до `13`, можно взять блоки, соответствующие переходам `13 → 12 → 8 → 0`.
- code: segment_tree_lazy
  what_it_is: |-
    Дерево разбивает массив на интервалы. Каждый узел хранит агрегат своего отрезка: сумму, минимум, максимум и т.п.
  mental_model: |-
    Узел `[l,r]` делится на детей. Запрос:

    1. не пересекается — игнорируем;

    2. полностью покрыт — берём готовый агрегат;

    3. частично покрыт — идём в детей и объединяем ответы.

    **Lazy propagation** нужен для массовых обновлений. Если запрос `+5` полностью покрывает узел `[l,r]`, мы:

    - обновляем агрегат узла сразу;

    - сохраняем `lazy += 5` как обещание потомкам;

    - не спускаемся вниз, пока потомки реально не понадобятся.

    Перед чтением/частичным изменением детей выполняем `push`: переносим отложенное действие детям и очищаем тег родителя.
  recognition_cues:
  - много range queries
  - данные меняются
  - нужен `range update + range query`
  - агрегат двух соседних частей можно объединить функцией `merge`
  anti_cues:
  - Для статической суммы Prefix Sum проще; для point update + prefix sum Fenwick обычно легче.
  - Difference Array откладывает **все** ответы до финального прохода. Lazy Tree поддерживает корректные онлайн-запросы между обновлениями.
  core_invariant: |-
    Значение узла всегда корректно для его диапазона; `lazy` означает «агрегат уже учёл действие, дети ещё могут не учитывать».
  canonical_skeleton: |-
    query(node,L,R,qL,qR)
    update(node,L,R,uL,uR,delta):
        if fully_covered: apply_lazy(node)
        else: push(node); recurse; pull(node)
  mini_example: |-
    Обновили `+3` весь сегмент `[0,7]`: корневой агрегат меняется сразу, а восемь листьев не трогаются до необходимости.
- code: ordered_set_sorted_map
  what_it_is: |-
    Динамическая структура сохраняет элементы **в порядке**, поддерживая вставки, удаления и поиск соседей.
  mental_model: |-
    Операции обычно `O(log n)`: insert, erase, lower_bound, upper_bound.

    Различие важно:

    - `Set` — одна копия ключа;

    - `Multiset` — сохраняет multiplicity, например три одинаковые `5`;

    - `Sorted Map` — ключи упорядочены и связаны со значениями.
  recognition_cues:
  - predecessor/successor
  - ближайший меньший/больший
  - динамический минимум/максимум
  - нужно быстро искать позицию относительно значения
  anti_cues:
  - Если порядок не нужен — hashing обычно проще и быстрее по константам.
  - Hash Map быстро ищет точное значение, но не умеет «первый ключ ≥ x».
  core_invariant: |-
    Структура всегда отражает текущий набор в сортированном порядке, включая нужное число копий.
  canonical_skeleton: |-
    S=ordered_multiset()
    for op in ops:
        if add: S.insert(x)
        if remove: S.erase_one(x)
        if query: use lower_bound/predecessor/min/max
  mini_example: |-
    В multiset `[2,5,5,9]` удаление одной `5` должно оставить `[2,5,9]`, а не стереть значение полностью.
- code: coordinate_compression_offline
  what_it_is: |-
    Эта карточка объединяет две близкие по применению, но **разные** техники. Их нельзя считать одним механизмом.
  mental_model: |-
    Compression меняет **представление координат**, сохраняя порядок. Offline processing меняет **порядок обработки запросов**, сохраняя их исходные ID. Эти преобразования независимы.
  recognition_cues:
  - значения огромны/разрежены, но важен их порядок → compression
  - все запросы известны заранее и ответы можно вернуть позже → offline
  - Fenwick/Segment Tree нужен по координатам до `10^9`
  - запросы удобно сортировать по порогу/границе
  anti_cues:
  - Online API требует ответ до появления будущих запросов; тогда перестановка невозможна.
  - Compression не делает задачу offline. Offline processing не требует compression. Они часто встречаются вместе, но логически независимы.
  core_invariant: |-
    Compression обязана сохранять нужные отношения порядка; offline-обработка обязана вернуть ответы к исходным ID запросов. Ни одна техника не подразумевает другую.
  canonical_skeleton: |-
    xs=sorted(unique(values))
    rank(x)=lower_bound(xs,x)

    sort(items); sort(queries)
    activate items monotonically while answering
  mini_example: |-
    Координаты `10^9` можно сжать до рангов. А 100 000 запросов с разными порогами можно отсортировать по порогу — это уже отдельная offline-идея.
- code: eulerian_path_circuit
  what_it_is: |-
    Нужно пройти **каждое ребро ровно один раз**. Это принципиально отличается от Hamiltonian задач, где каждый раз посещают вершины.
  mental_model: |-
    Алгоритм Hierholzer:

    1. идём по ещё не использованным рёбрам;

    2. когда из вершины больше нельзя продолжать, добавляем её в ответ;

    3. ответ получается в обратном порядке выхода.

    Для directed graph условия существования пути:

    - circuit: `in(v)=out(v)` для всех вершин;

    - open path: один start с `out=in+1`, один end с `in=out+1`, остальные равны;

    - плюс нужная связность по рёбрам.

    Для undirected circuit степени всех непустых вершин чётные; для open path нечётных ровно две.
  recognition_cues:
  - itinerary из всех билетов
  - use every edge exactly once
  - reconstruct trail
  - de Bruijn-like traversal
  anti_cues:
  - Если требуется посетить каждую вершину один раз — это другая, обычно намного более сложная задача.
  - 'Обычный DFS visited-by-vertex неверен: в Eulerian path одну вершину можно посещать много раз через разные рёбра.'
  core_invariant: |-
    Вершина попадает в финальный маршрут только когда все доступные из неё неиспользованные рёбра уже исчерпаны.
  canonical_skeleton: |-
    dfs(v):
        while outgoing_edge_exists(v):
            e=take_one_edge(v)
            dfs(to(e))
        route.append(v)
    return reversed(route)
  mini_example: |-
    Билеты — directed edges. Маршрут обязан использовать каждый билет один раз, поэтому visited должен относиться к рёбрам, не аэропортам.
- code: low_link_bridges_articulation
  what_it_is: |-
    DFS вычисляет, может ли поддерево вернуться к более раннему предку **обходным путём**, не используя родительское ребро. Из этого находятся bridges и articulation points.
  mental_model: |-
    Для каждой вершины:

    - `tin[v]` — время первого входа DFS;

    - `low[v]` — минимальный `tin`, достижимый из поддерева `v`, используя tree edges вниз и не более одного back edge вверх.

    При возврате из ребёнка `to`:

    low[v] = min(low[v], low[to])

    Для back edge `v→u` к уже посещённому предку:

    low[v] = min(low[v], tin[u])

    **Bridge:**

    low[to] > tin[v]

    Значит поддерево `to` не умеет обойти ребро `(v,to)` и вернуться к `v` или выше.

    **Articulation point:** для не-корня, если существует ребёнок `to` с

    low[to] >= tin[v]

    то поддерево ребёнка не умеет уйти выше `v`; удаление `v` отделяет его.

    **Особый корень DFS:** root является articulation point только если у него минимум два независимых DFS-ребёнка.
  recognition_cues:
  - critical connections
  - удаление ребра разрывает граф
  - удаление вершины увеличивает число компонент
  - undirected graph
  anti_cues:
  - Для динамических удалений/добавлений рёбер нужны более сложные структуры.
  - SCC — directed graph и взаимная достижимость. Low-Link для bridges/articulation здесь рассматривает undirected graph.
  core_invariant: |-
    `tin` говорит «когда вошли», `low` — «насколько высоко поддерево умеет вернуться в обход родительского ребра».
  canonical_skeleton: |-
    dfs(v,parent_edge):
        tin[v]=low[v]=timer++
        for edge v->to:
            if edge==parent_edge: continue
            if visited[to]: low[v]=min(low[v],tin[to])
            else:
                dfs(to,edge)
                low[v]=min(low[v],low[to])
                if low[to]>tin[v]: bridge(v,to)
  mini_example: |-
    Если ребёнок `c` имеет `low[c] = 8`, а родитель `v` вошёл в момент `tin[v]=5`, то `low[c] > tin[v]`: поддерево `c` не вернулось к `v` или выше, ребро `(v,c)` — мост.
- code: bipartite_coloring
  what_it_is: |-
    Проверяем, можно ли покрасить вершины в два цвета так, чтобы каждое ребро соединяло разные цвета.
  mental_model: |-
    DFS/BFS назначает соседу цвет `1-color[v]`. Если уже окрашенный сосед имеет тот же цвет, получено противоречие.

    Для несвязного графа запуск нужен из каждой неокрашенной компоненты.
  recognition_cues:
  - разделить на две несовместимые группы
  - enemies/opposite teams
  - bipartite
  - odd cycle
  anti_cues:
  - Если ограничений больше двух типов или отношения не сводятся к «должны отличаться».
  - Обычный cycle detection отвечает только «есть цикл». Чётный цикл допустим в bipartite graph; нечётный — нет.
  core_invariant: |-
    Каждое уже проверенное ребро соединяет разные цвета.
  canonical_skeleton: |-
    for each uncolored start:
        color[start]=0
        BFS:
            for v in adj[u]:
                if uncolored: color[v]=1-color[u]
                elif color[v]==color[u]: reject
  mini_example: |-
    Треугольник требует цветов `0-1-0`, но последнее ребро соединяет два `0`; значит граф не двудольный.
- code: strongly_connected_components
  what_it_is: |-
    В directed graph SCC — максимальная группа вершин, где **каждая достижима из каждой**.
  mental_model: |-
    Нужно найти максимальные блоки взаимной достижимости и затем мысленно сжать каждый блок в одну вершину. Kosaraju делает это двумя проходами и transpose-графом; Tarjan — одним DFS через discovery/low-link и стек активных кандидатов.
  recognition_cues:
  - mutual reachability
  - compress directed cycles/groups
  - condensation DAG
  - зависимости с взаимными переходами
  anti_cues:
  - Если граф undirected и нужны обычные компоненты — простой DFS/BFS легче.
  - Tarjan SCC и Low-Link Bridges используют похожее слово `low`, но смысл и правила обновления различаются, особенно из-за directed graph и `onStack`.
  core_invariant: |-
    SCC — не просто «вершины на цикле», а максимальный блок взаимной достижимости; выбранный алгоритм должен доказуемо отделять такие блоки.
  canonical_skeleton: |-
    TarjanDFS(v):
        disc[v]=low[v]=time++
        push v; onstack[v]=true
        for to in adj[v]: update low
        if low[v]==disc[v]: pop one SCC
  mini_example: |-
    `A→B→C→A` образуют одну SCC. Если `C→D`, но пути `D→A` нет, `D` уже не входит в эту SCC.
- code: binary_lifting_jump_pointers
  what_it_is: |-
    Предвычисляем прыжки длиной `1,2,4,8,...`, чтобы быстро подниматься по дереву/цепочке и отвечать на ancestor/LCA-запросы.
  mental_model: |-
    up[v][0] = родитель на 1 шаг

    up[v][1] = предок на 2 шага

    up[v][2] = предок на 4 шага

    up[v][3] = предок на 8 шагов

    Переход:

    up[v][j] = up[ up[v][j-1] ][j-1]

    Запрос на `k` шагов раскладываем по битам. Например:

    13 = 8 + 4 + 1

    значит делаем три готовых прыжка.

    Для LCA сначала выравниваем глубины, затем одновременно поднимаем вершины максимальными степенями двойки, где их предки ещё различны.
  recognition_cues:
  - много запросов k-th ancestor
  - LCA
  - статическое дерево
  - линейный подъём по родителям слишком дорог
  anti_cues:
  - Если дерево часто меняет родительские связи — таблицу трудно поддерживать.
  - Binary Search использует половины поискового пространства; Binary Lifting использует двоичное разложение **длины пути**.
  core_invariant: |-
    `up[v][j]` всегда означает ровно `2^j` родительских переходов, если такой предок существует.
  canonical_skeleton: |-
    build:
        up[v][0]=parent[v]
        for j>0: up[v][j]=up[up[v][j-1]][j-1]

    jump(v,k):
        for set bit j in k: v=up[v][j]
  mini_example: |-
    Подъём на 13 уровней: прыжок `8`, затем `4`, затем `1`, вместо 13 последовательных шагов.
- code: cache_eviction_design
  what_it_is: |-
    Кэш сочетает быстрый поиск по ключу с политикой удаления. **LRU и LFU — разные механики**, их нужно учить отдельно.
  mental_model: |-
    Разделяем две обязанности: Hash Map находит элемент, а отдельная структура порядка/частот делает жертву eviction доступной без линейного поиска.
  recognition_cues:
  - design cache with capacity
  - '`get/put` должны быть `O(1)`'
  - eviction по давности → LRU
  - eviction по частоте с tie-break → LFU
  anti_cues:
  - Если capacity мала и сложность не важна, простая реализация может быть разумнее.
  - LRU измеряет давность, LFU — частоту. «Недавно использовали один раз» и «часто использовали давно» ранжируются по-разному.
  core_invariant: |-
    Политика eviction должна быть представлена структурой напрямую; нельзя каждый раз линейно искать «худший» ключ.
  canonical_skeleton: |-
    get(key):
        node=index.get(key)
        if node: promote(node)
    put(key,val):
        update_or_insert_and_promote()
        if size>cap: remove(victim) from both structures
  mini_example: |-
    LRU capacity 2: после `put(A), put(B), get(A), put(C)` удаляется `B`, потому что `A` освежился.
- code: composite_o1_structures
  what_it_is: |-
    Собираем несколько структур так, чтобы каждая компенсировала слабость другой и API выполнялся за ожидаемое `O(1)`.
  mental_model: |-
    Сначала выписываем операции и «узкие места». Пример `RandomizedSet`:

    - массив даёт random access;

    - map хранит `value → index`;

    - удаление: меняем удаляемый элемент с последним, обновляем его индекс, делаем pop.
  recognition_cues:
  - '`insert/delete/getRandom O(1)`'
  - min stack
  - queue via stacks
  - нужна комбинация свойств, которой нет у одной стандартной структуры
  anti_cues:
  - Если требование `O(1)` не нужно и простая структура существенно понятнее.
  - Cache Design дополнительно реализует eviction policy. Composite O(1) шире и не обязательно содержит кэш.
  core_invariant: |-
    Все внутренние представления одной сущности должны обновляться атомарно и оставаться согласованными.
  canonical_skeleton: |-
    mutate(x):
        update primary storage
        update index map
        update auxiliary aggregate
        assert consistency
  mini_example: |-
    Удалить середину массива за `O(1)` можно только если порядок не важен: swap-with-last + pop.
- code: iterator_stream_snapshot
  what_it_is: |-
    Под одним ID находятся три состояния API. Они родственны тем, что объект **помнит состояние между вызовами**, но механика различается.
  mental_model: |-
    Определяем, что должно пережить границу вызова: cursor, непрочитанный buffer или version history. Храним именно это минимальное продолжение состояния.
  recognition_cues:
  - повторные вызовы `next()/hasNext()`
  - read API должен продолжать с прошлого места
  - требуется чтение старой версии/snapshot
  - локальные переменные одного вызова недостаточны
  anti_cues:
  - Если каждый вызов независим и состояние не должно переживать границу API.
  - 'Snapshot — не iterator: там важна история версий, а не следующий элемент.'
  core_invariant: |-
    Между вызовами хранится минимальное состояние, достаточное, чтобы продолжить ровно с логической точки остановки или восстановить нужную версию.
  canonical_skeleton: |-
    class X:
        state=...
        next_or_op(input):
            consume only necessary new data
            update persistent state
            return answer
  mini_example: |-
    `read(3)` может внутренне получить 4 символа; четвёртый обязан остаться в буфере для следующего вызова.
- code: randomized_sampling_reservoir
  what_it_is: |-
    Под одним ID несколько способов получить требуемое распределение. Их нельзя смешивать без доказательства вероятностей.
  mental_model: |-
    Сначала формулируем целевую вероятность каждого исхода. Затем выбираем механизм: prefix weights, reservoir replacement или rejection равновероятного хвоста.
  recognition_cues:
  - выбрать случайный элемент равномерно/по весам
  - поток неизвестной длины и ограниченная память
  - доступный random primitive имеет неудобный диапазон
  - modulo создаёт bias
  anti_cues:
  - Если требуется криптографическая случайность — стандартный PRNG задачи может быть недостаточен.
  - Reservoir решает проблему памяти/неизвестной длины; rejection исправляет неудобное пространство случайных исходов; weighted sampling задаёт неравные вероятности.
  core_invariant: |-
    Случайный алгоритм считается корректным только после доказательства итогового распределения.
  canonical_skeleton: |-
    reservoir=first
    for i,x in enumerate(stream,start=1):
        with probability 1/i:
            reservoir=x
  mini_example: |-
    `Rand10` из `Rand7`: нельзя просто брать остаток от 10, если размеры пространств не кратны; появляется bias, который rejection устраняет.
- code: interactive_query_strategy
  what_it_is: |-
    Алгоритм узнаёт скрытый объект через ограниченный oracle/API и **адаптирует следующий запрос к предыдущим ответам**.
  mental_model: |-
    Храним множество кандидатов, согласованных со всей историей. На каждом шаге:

    1. выбираем query;

    2. получаем response;

    3. фильтруем несовместимые candidates;

    4. выбираем следующий query так, чтобы хорошо разделить оставшиеся варианты.

    Это **не всегда binary search**. Binary search оптимален только если ответы создают монотонную границу/упорядоченное деление.

    В `Guess the Word` хороший guess может минимизировать размер худшей группы кандидатов по возможному числу совпадений.
  recognition_cues:
  - hidden object
  - '`guess`, `query`, `oracle`'
  - query budget
  - ответ даёт частичную информацию
  anti_cues:
  - Если query дорогой, шумный или ответы вероятностны — может потребоваться статистическая стратегия.
  - Backtracking исследует известное пространство вариантов. Interactive strategy сначала добывает информацию о скрытом мире.
  core_invariant: |-
    После каждого ответа `candidates` содержит все и только объекты, совместимые со всей query history.
  canonical_skeleton: |-
    candidates=initial
    while not solved and budget_left:
        q=choose_query(candidates)
        r=oracle(q)
        candidates=filter_consistent(candidates,q,r)
  mini_example: |-
    Если oracle сообщает «слишком мало / слишком много», возникает упорядоченная граница и binary search. Если сообщает число совпадающих позиций слова, деление кандидатов совсем другое.
- code: palindrome_expansion_manacher
  what_it_is: |-
    Палиндром определяется центром и радиусом. Есть две техники: простое расширение центров `O(n²)` и Manacher `O(n)`.
  mental_model: |-
    Обе техники хранят радиус вокруг центра. Center Expansion проверяет его с нуля; Manacher переиспользует гарантированную зеркальную часть внутри самой правой известной палиндромной границы.
  recognition_cues:
  - longest/count palindromic substrings
  - симметрия вокруг центра
  - '`O(n²)` допустимо → expansion'
  - строгий `O(n)` и все радиусы → Manacher
  anti_cues:
  - Если нужен один простой longest palindrome при умеренном `n`, center expansion часто намного проще и достаточно быстро.
  - Palindrome DP хранит ответы для интервалов и обычно `O(n²)` памяти/времени. Manacher специально оптимизирует радиусы всех центров.
  core_invariant: |-
    Manacher не «угадывает» радиус из зеркала: он переиспользует только гарантированную часть внутри текущей right boundary, а всё за границей проверяет явно.
  canonical_skeleton: |-
    for center in centers:
        radius=initial_from_mirror(center)
        while characters_match(center,radius): radius+=1
        update_rightmost(center,radius)
  mini_example: |-
    Manacher полезен при строгом `O(n)`, но для учебного первого решения `abba` проще понять через even center между двумя `b`.
- code: suffix_structures
  what_it_is: |-
    Все подстроки строки связаны с её суффиксами: **любая подстрока является префиксом некоторого суффикса**. На этой идее строятся разные структуры. Их нельзя считать одной реализацией.
  mental_model: |-
    Организуем множество суффиксов/подстрок так, чтобы общие префиксы и продолжения переиспользовались. Конкретное представление принципиально различается: sorted suffixes, compressed suffix trie или automaton states.
  recognition_cues:
  - много substring comparisons
  - longest repeated/common substring
  - число различных подстрок
  - нужна точная богатая структура без hash collisions
  - один простой pattern search уже не покрывает запросы
  anti_cues:
  - Для одного простого pattern search KMP обычно проще; для умеренных ограничений rolling hash может быть практичнее.
  - Rolling Hash проще, но вероятностен и не даёт всю структурную информацию suffix structures. Trie обычных слов не равен trie всех suffixes.
  core_invariant: |-
    Любая выбранная suffix structure должна объяснять, какую общую информацию между суффиксами/подстроками она хранит и какие запросы этим ускоряет.
  canonical_skeleton: |-
    build_suffix_array(s)
    build_lcp(s,sa)
    answer=derive_from_adjacent_suffixes(sa,lcp)
  mini_example: |-
    В `banana` суффиксы `anana` и `ana` стоят рядом; их LCP равен `3` (`ana`), что сразу показывает повторяющуюся подстроку.
