- code: cache_eviction_design
  what_it_is: |-
    Хранилище ограничено, поэтому при переполнении нужно быстро решить, какой элемент удалить: например, самый давно не использованный или самый редко используемый.
  mental_model: |-
    Одна структура быстро находит запись по ключу, другая поддерживает порядок или приоритет удаления.
  recognition_cues:
  - LRU/LFU cache
  - операции `get` и `put`
  - ограниченная ёмкость
  - нужна политика вытеснения
  anti_cues:
  - Если память не ограничена или удаление можно искать линейно без нарушения требований.
  core_invariant: |-
    Кэш — это не только хранение, но и правило, кого выгнать следующим.
  canonical_skeleton: |-
    get(key):
        node=index.get(key)
        if node: promote(node)
    put(key,val):
        update_or_insert_and_promote()
        if size>cap: remove(victim) from both structures
  mini_example: |-
