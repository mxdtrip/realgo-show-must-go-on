- code: cyclic_sort_placement
  what_it_is: |-
    Если значения должны лежать в известном диапазоне, каждое значение отправляем на его «правильный» индекс.
  mental_model: |-
    Пока `a[i]` не на своём месте, меняем его с элементом на целевом индексе.
  recognition_cues:
  - числа `1..n` или `0..n-1`
  - missing/duplicate
  - разрешено менять массив
  - значение естественно соответствует позиции
  anti_cues:
  - Если значения произвольные, диапазон огромен или массив нельзя менять.
  core_invariant: |-
    Если значение знает свой индекс, поставь его туда напрямую.
  canonical_skeleton: |-
    i = 0
    while i < n:
        j = index_of(a[i])
        if valid(a[i]) and a[i] != a[j]:
            a[i], a[j] = a[j], a[i]
        else:
            i += 1
  mini_example: |-
    Число `3` в диапазоне `1..n` должно оказаться на индексе `2`.

