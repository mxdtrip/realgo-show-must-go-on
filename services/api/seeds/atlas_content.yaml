- code: bitmask_state_enumeration
  what_it_is: |-
    Каждый бит кодирует наличие элемента или бинарного признака. Одно число может представлять подмножество, набор использованных объектов или компактное состояние DP.

    Подходит при небольшом количестве элементов, обычно когда 2^n ещё допустимо. Часто используется в subset enumeration, travelling-state DP и задачах на совместимость признаков.
  mental_model: |-
    Бит i кодирует наличие/состояние объекта i. Проверяем mask & (1<<i), добавляем через OR, удаляем через AND NOT; перебираем masks или transitions между ними.
  recognition_cues:
  - n мало и можно рассматривать 2^n состояний
  - подмножество/набор флагов нужно хранить компактно
  - DP over subsets
  core_invariant: |-
    В каждый момент каждый бит имеет однозначно определённый смысл; mask полностью и без неоднозначности кодирует логическое состояние множества признаков.
  canonical_skeleton: |-
    for mask in range(1<<n):
        for i in range(n):
            if not (mask & (1<<i)):
                nxt = mask | (1<<i)
                relax(mask, nxt, i)
  mini_example: |-
    В travelling-subset DP mask показывает уже посещённые вершины, поэтому одинаковый набор не нужно хранить как отдельный Set.
- code: bit_tricks_submask
  what_it_is: |-
    Используются специальные двоичные операции: удалить младший установленный бит, проверить степень двойки, перебрать все подмаски маски. Эти приёмы позволяют существенно ускорить узкие классы задач.

    Подпаттерн более технический и обычно появляется при явных ограничениях на bits/masks. Важно предпочитать понятные операции и не усложнять решение без необходимости.
  mental_model: |-
    Используем алгебраические свойства двоичного представления. Например, x & (x-1) удаляет младший установленный бит, а (sub-1)&mask переходит к следующей подмаске.
  recognition_cues:
  - задача прямо использует bits/masks
  - нужен перебор submasks
  - важны lowbit/popcount/power-of-two tricks
  core_invariant: |-
    Каждая операция имеет точный битовый смысл; при submask-loop текущий sub всегда подмножество mask и каждая ненулевая подмаска посещается ровно один раз.
  canonical_skeleton: |-
    sub = mask
    while sub:
        process(sub)
        sub = (sub - 1) & mask
  mini_example: |-
    Для mask = 10110₂ формула никогда не включит бит, отсутствующий в исходной маске, но переберёт все её ненулевые подмаски.
- code: directional_traversal_simulation
  what_it_is: |-
    Движение по матрице описывается набором направлений и правилами смены курса. Мы явно моделируем координаты, границы и состояние посещения.

    Примеры: spiral matrix, robot simulation, diagonal traversal. Главная сложность — аккуратно обрабатывать выход за границы и момент смены направления.
  mental_model: |-
    Храним (r,c,dir) и массив направлений. Перед шагом проверяем следующую клетку; если она недопустима, меняем направление по правилу и пробуем снова.
  recognition_cues:
  - spiral/diagonal/robot movement
  - порядок обхода задаётся направлениями
  - нужна симуляция координат
  core_invariant: |-
    Текущее состояние точно соответствует позиции и направлению симуляции; уже обработанные клетки/границы не будут повторно приняты, если задача требует однократного посещения.
  canonical_skeleton: |-
    dirs = [(0,1),(1,0),(0,-1),(-1,0)]
    r=c=d=0
    for _ in range(R*C):
        visit(r,c)
        nr,nc = r+dirs[d][0], c+dirs[d][1]
        if invalid(nr,nc): d = (d+1)%4
        r,c = r+dirs[d][0], c+dirs[d][1]
  mini_example: |-
    В Spiral Matrix направление меняется только при границе уже не обработанного прямоугольника/посещённой клетке.
- code: in_place_transform_boundary
  what_it_is: |-
    Матрица преобразуется без дополнительной копии или обрабатывается по концентрическим слоям. Используются симметрия, обмены элементов и отношения между координатами.

    Классические задачи: rotate image, transpose, reverse rows, layer-by-layer operations. Важно точно определить, какие позиции образуют один цикл перестановки.
  mental_model: |-
    Находим координатное преобразование и выполняем циклы обменов либо композицию простых операций. Для 90° clockwise rotation квадратной матрицы: transpose, затем reverse каждой строки.
  recognition_cues:
  - rotate/transpose matrix in place
  - нельзя выделять вторую матрицу
  - есть симметрия или обработка слоёв
  core_invariant: |-
    После завершения обработанного набора симметричных позиций их значения находятся ровно в целевых координатах и больше не затрагиваются последующими обменами.
  canonical_skeleton: |-
    # rotate 90° clockwise
    for r in range(n):
        for c in range(r+1,n):
            a[r][c], a[c][r] = a[c][r], a[r][c]
    for row in a:
        row.reverse()
  mini_example: |-
    В Rotate Image transpose переводит (r,c) в (c,r), а reverse row завершает отображение (r,c)→(c,n-1-r).
- code: cyclic_sort_placement
  what_it_is: |-
    Если значения принадлежат диапазону вроде 1..n, каждое значение имеет «естественный» индекс. Мы переставляем элементы, пока каждый возможный элемент не окажется на своей позиции.

    После этого пропуски и дубликаты обнаруживаются простым проходом. Подпаттерн особенно полезен при требовании O(1) дополнительной памяти.
  mental_model: |-
    Для позиции i вычисляем «дом» текущего значения. Пока значение валидно и не находится дома, меняем его местами с элементом целевой позиции; дубликаты требуют проверки, чтобы не зациклиться.
  recognition_cues:
  - значения лежат в 1..n или 0..n-1
  - missing/duplicate
  - разрешено менять массив и нужна O(1) память
  core_invariant: |-
    Если значение v уже стоит на своей позиции index(v), последующие корректные перестановки не обязаны его вытеснять; после завершения все размещаемые уникальные значения находятся дома.
  canonical_skeleton: |-
    i = 0
    while i < n:
        j = index_of(a[i])
        if valid(a[i]) and a[i] != a[j]:
            a[i], a[j] = a[j], a[i]
        else:
            i += 1
  mini_example: |-
    В Find All Numbers Disappeared in an Array после размещения число v ожидается на позиции v-1; несовпадения показывают пропуски.
- code: sign_marking_index_encoding
  what_it_is: |-
    Сам массив используется как таблица посещения. Значение определяет индекс, а знак или другое изменение элемента по этому индексу кодирует факт появления.

    Подходит для задач на missing/duplicate values в ограниченном диапазоне. Требует возможности изменять входной массив и осторожности с повторными посещениями.
  mental_model: |-
    Для значения v вычисляем индекс j=v-offset и меняем знак a[j] на отрицательный. Повторное попадание в уже отрицательную позицию означает повтор значения.
  recognition_cues:
  - значения адресуют индексы 1..n
  - нужно отметить seen без extra space
  - массив можно временно менять
  core_invariant: |-
    После обработки префикса a[j] < 0 тогда и только тогда, когда соответствующее значение j+offset уже встречалось (при условии исходно положительного диапазона).
  canonical_skeleton: |-
    for x in a:
        j = abs(x) - 1
        if a[j] < 0:
            report_duplicate(j+1)
        else:
            a[j] = -a[j]
  mini_example: |-
    В Find All Duplicates in an Array второй приход значения 4 видит, что позиция 3 уже отрицательна.
- code: merge_sort_divide_conquer
  what_it_is: |-
    Массив делится пополам, обе части решаются рекурсивно, а затем результаты объединяются. На этапе merge можно не только сортировать, но и считать отношения между элементами разных половин.

    Типичные задачи: count inversions, reverse pairs, range counting. Сила подпаттерна — информация о двух уже упорядоченных половинах.
  mental_model: |-
    Рекурсивно решаем левую и правую половины. На merge-step используем их отсортированность для подсчёта cross-отношений и затем сливаем.
  recognition_cues:
  - задача считает отношения между левой и правой половиной
  - inversions/reverse pairs
  - после сортировки половин cross-count становится линейным
  core_invariant: |-
    Перед merge обе половины уже корректно решены и отсортированы; merge учитывает каждую пару, пересекающую границу половин, ровно один раз.
  canonical_skeleton: |-
    solve(l,r):
        if r-l <= 1: return 0
        m = (l+r)//2
        ans = solve(l,m) + solve(m,r)
        ans += count_cross(a[l:m], a[m:r])
        merge_sorted(a,l,m,r)
        return ans
  mini_example: |-
    При подсчёте inversions, если left[i] > right[j], то из-за сортировки все оставшиеся элементы left[i:] также образуют inversion с right[j].
- code: quickselect_order_statistics
  what_it_is: |-
    После partition относительно pivot становится известно окончательное положение pivot в отсортированном порядке. Затем рекурсия или цикл продолжается только в той части, где находится нужный ранг.

    Используется для kth smallest/largest без полной сортировки. В среднем работает за O(n), но качество pivot влияет на худший случай.
  mental_model: |-
    Partition ставит pivot на окончательный rank: слева элементы меньше/не больше, справа больше/не меньше по выбранной схеме. Сравниваем rank с k и продолжаем только в одной части.
  recognition_cues:
  - нужен kth smallest/largest
  - полная сортировка не требуется
  - partition around pivot естественен
  core_invariant: |-
    После partition pivot находится на своём окончательном месте относительно текущего диапазона; искомый rank, если не равен pivot, целиком остаётся в выбранной стороне.
  canonical_skeleton: |-
    lo, hi = 0, n-1
    while True:
        p = partition(a, lo, hi)
        if p == k: return a[p]
        if k < p: hi = p-1
        else: lo = p+1
  mini_example: |-
    В Kth Largest Element in an Array после partition не нужно сортировать сторону, которая не содержит целевой rank.
- code: recursive_partition_search
  what_it_is: |-
    Пространство задачи рекурсивно разбивается на независимые или почти независимые части, и исследуются только необходимые сегменты. Это общий подпаттерн для задач, где само разбиение существенно сокращает работу.

    В отличие от DP, результаты частей обычно не переиспользуются многократно. В отличие от binary search, разбиение не обязано быть связано с монотонной границей и может порождать несколько рекурсивных ветвей.
  mental_model: |-
    Определяем base case, правило partition и combine. В отличие от DP, одинаковые состояния не должны массово повторяться; в отличие от binary search, может рекурсивно обрабатываться несколько частей.
  recognition_cues:
  - задача естественно делится на меньшие поддиапазоны
  - подзадачи в основном независимы
  - результаты объединяются ограниченной процедурой
  core_invariant: |-
    Каждый рекурсивный вызов отвечает строго за свой подинтервал/подпространство; совокупность дочерних подзадач и combine полностью покрывает родительскую задачу без пропущенных случаев.
  canonical_skeleton: |-
    solve(problem):
        if small(problem): return direct(problem)
        parts = partition(problem)
        results = [solve(p) for p in parts]
        return combine(results)
  mini_example: |-
    В Maximum Subarray divide-and-conquer вариант сравнивает лучший ответ слева, справа и лучший подмассив, пересекающий середину.
- code: frequency_counting
  what_it_is: |-
    Храним число появлений каждого ключа и строим решение из этих счётчиков. Это базовый механизм для multiset-сравнения, подсчёта пар и frequency-based aggregation.
  mental_model: |-
    За один проход обновляем `count[x]`; затем вычисляем ответ либо поддерживаем его online.
