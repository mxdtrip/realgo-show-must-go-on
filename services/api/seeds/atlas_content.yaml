- code: trie_prefix_search
  what_it_is: |-
    Строки хранятся в дереве по символам, а общие префиксы используют общие узлы.
  mental_model: |-
    Идём по символам слова от корня trie. Каждый переход соответствует следующей букве.
  recognition_cues:
  - много слов и prefix queries
  - autocomplete
  - dictionary search
  - поиск слов по началу
  anti_cues:
  - Если запросов мало, обычный `Set` или сортировка могут быть проще и дешевле по памяти.
  core_invariant: |-
    Общий префикс хранится один раз для всех слов, которые его разделяют.
  canonical_skeleton: |-
    insert(word):
        node = root
        for ch in word:
            node = node.child.setdefault(ch, Node())
        node.is_end = True

    search_prefix(p):
        follow children for each char
  mini_example: |-
    `car` и `cat` делят путь `c → a`, а затем расходятся на `r` и `t`.

