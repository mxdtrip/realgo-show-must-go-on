- code: kmp_prefix_function
  what_it_is: |-
    После несовпадения не начинаем поиск шаблона с нуля, а переиспользуем уже известное совпадение префикса и суффикса.
  mental_model: |-
    Prefix function хранит длину лучшего собственного префикса, совпадающего с суффиксом. При mismatch прыгаем к более короткому известному совпадению.
  recognition_cues:
  - линейный поиск шаблона
  - prefix equals suffix
  - повторяющаяся структура строки
  anti_cues:
  - Если нужен поиск множества слов — trie или более специализированный алгоритм может быть ближе.
  core_invariant: |-
    Не выбрасывай уже совпавшую информацию после ошибки.
  canonical_skeleton: |-
    j = 0
    for ch in text:
        while j > 0 and ch != pat[j]:
            j = pi[j-1]
        if ch == pat[j]: j += 1
        if j == len(pat): report_match()
  mini_example: |-
    После частичного совпадения `"abab"` KMP знает, что суффикс `"ab"` уже может стать новым началом.

