- code: quickselect_order_statistics
  what_it_is: |-
    Ищем k-й элемент по порядку, не сортируя весь массив.
  mental_model: |-
    Partition ставит pivot на окончательную позицию. Затем продолжаем только в той части, где лежит `k`.
  recognition_cues:
  - k-th smallest/largest
  - нужен один order statistic
  - полная сортировка избыточна
  anti_cues:
  - Если нужны многие значения в отсортированном порядке или гарантированный worst-case критичен без специального pivot.
  core_invariant: |-
    После partition одна сторона больше не нужна.
  canonical_skeleton: |-
    lo, hi = 0, n-1
    while True:
        p = partition(a, lo, hi)
        if p == k: return a[p]
        if k < p: hi = p-1
        else: lo = p+1
  mini_example: |-
    Если pivot оказался на позиции `10`, а нужен индекс `3`, ищем только слева.

    ---
- code: recursive_partition_search
  what_it_is: |-
    Разбиваем задачу на независимые части по естественной границе и рекурсивно решаем каждую.
  mental_model: |-
    Находим разделитель, строим меньшие задачи и объединяем их ответы по чёткому контракту.
  recognition_cues:
  - структура распадается на подзадачи
  - рекурсивное разбиение
  - части можно решать независимо
  - потом нужен простой merge результатов
  anti_cues:
  - Если подзадачи сильно перекрываются — DP обычно лучше.
  core_invariant: |-
    Разделение полезно только тогда, когда части действительно становятся проще и почти независимы.
  canonical_skeleton: |-
    solve(problem):
        if small(problem): return direct(problem)
        parts = partition(problem)
        results = [solve(p) for p in parts]
        return combine(results)
  mini_example: |-
    Выражение можно разделить по оператору, рекурсивно вычислить варианты слева и справа и затем объединить результаты.

