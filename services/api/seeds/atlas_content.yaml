    DP сохраняет ответы повторяющихся подзадач. Главный навык — точно определить, что означает состояние и из каких меньших состояний оно строится.
- code: dp_1d_linear
  what_it_is: |-
    Состояние определяется одной основной координатой, обычно позицией i. Значение dp[i] строится из нескольких предыдущих состояний.

    Типичные задачи: climbing stairs, house robber, decode ways. Часто память можно сократить до нескольких переменных, если нужны только последние состояния.
  mental_model: |-
    Определяем точный смысл dp[i], базовые случаи и переход из уже вычисленных индексов. Если нужны только последние k состояний, таблицу можно сжать.
  recognition_cues:
  - состояние задаётся одной позицией/числом
  - ответ i зависит от нескольких меньших состояний
  - climbing/rob/decode
  core_invariant: |-
    После вычисления dp[i] оно равно точному ответу для подзадачи, определённой состоянием i; все состояния, от которых зависит переход, уже корректны.
  canonical_skeleton: |-
    dp = [0]*(n+1)
    dp[0] = base0
    for i in range(1,n+1):
        dp[i] = combine(dp[i-1], dp[i-2] if i>=2 else base)
    return dp[n]
  mini_example: |-
    В House Robber dp[i] = max(dp[i-1], dp[i-2]+money[i]): либо пропускаем дом, либо берём его после совместимого префикса.
- code: dp_2d_grid
  what_it_is: |-
    Состояние привязано к клетке таблицы и строится из уже обработанных соседей.
  mental_model: |-
    `dp[r][c]` собирает лучший ответ из допустимых предыдущих клеток, например сверху и слева.
  recognition_cues:
  - grid/matrix
  - пути из угла в угол
  - minimum path cost
  - движения ограничены направлениями
  anti_cues:
  - Если движения образуют циклы или веса требуют shortest-path алгоритма.
  core_invariant: |-
    Для каждой клетки спроси: из каких уже решённых клеток можно прийти сюда?
  canonical_skeleton: |-
    for r in range(R):
        for c in range(C):
            if r==0 and c==0: continue
            dp[r][c] = combine(
                dp[r-1][c] if r else INF,
                dp[r][c-1] if c else INF)
  mini_example: |-
    Число путей в клетку равно сумме путей сверху и слева.

