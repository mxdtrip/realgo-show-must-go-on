- code: xor_cancellation
  what_it_is: |-
    Одинаковые значения взаимно уничтожаются благодаря `x ^ x = 0`, а `x ^ 0 = x`.
  mental_model: |-
    XOR всех элементов оставляет только непарный вклад.
  recognition_cues:
  - все элементы парные, кроме одного
  - missing/single number
  - структура повторений точно подходит XOR
  anti_cues:
  - Если частоты произвольны или нужно знать количество повторов.
  core_invariant: |-
    Одинаковая пара исчезает под XOR.
  canonical_skeleton: |-
    acc = 0
    for x in a:
        acc ^= x
    return acc
  mini_example: |-
    `4 ^ 1 ^ 4 = 1`.

