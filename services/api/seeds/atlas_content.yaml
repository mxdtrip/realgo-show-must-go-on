    ## Редакционный принцип Realgo

    Карточка должна помогать пользователю ответить на четыре вопроса:

    1. Что здесь происходит?
    2. По каким словам и ограничениям это узнать?
    3. Что именно хранится или двигается в решении?
    4. С каким похожим паттерном это легко перепутать?

    Если после карточки пользователь помнит только термин, но не может узнать механизм в новой задаче, карточка не выполнила свою работу.
- code: frequency_counting
  what_it_is: |-
    Считаем, сколько раз встречается каждый элемент. Например, для `[a, b, a, c, a]` получим `a → 3`, `b → 1`, `c → 1`.
  mental_model: |-
    Проходим по данным и увеличиваем `count[x]`. После прохода счётчики становятся готовой статистикой для ответа.
  recognition_cues:
  - важно количество повторений
  - нужно найти самый частый или редкий элемент
  - сравниваются наборы с учётом количества копий
  anti_cues:
  - Если важно только «есть элемент или нет», обычно достаточно `Set`.
  - Если значения лежат в маленьком диапазоне, массив счётчиков может быть проще.
  core_invariant: |-
    `count[x]` — сколько раз встретился `x`.
  canonical_skeleton: |-
    for x in items:
        count[x] += 1
    answer = derive(count)
  mini_example: |-
    В двух строках порядок букв разный. Чтобы проверить анаграмму, сравниваем количество каждой буквы.

    ---
- code: grouping_canonical_signature
  what_it_is: |-
    Превращаем каждый объект в стандартную подпись, по которой одинаковые по смыслу объекты попадают в одну группу.
  mental_model: |-
    Для каждого объекта строим `signature(x)` и кладём его в `map[signature]`. Одинаковая подпись означает одну группу.
  recognition_cues:
  - нужно сгруппировать «одинаковые по структуре» объекты
  - порядок частей может быть неважен
  - можно придумать единое представление группы
  anti_cues:
  - Если равенство нельзя надёжно описать компактной подписью или сравнение зависит от контекста между объектами.
  core_invariant: |-
    Сначала придумай, как одинаковые объекты выглядят одинаково.
  canonical_skeleton: |-
    groups = {}
    for x in items:
        key = signature(x)
        groups[key].append(x)
  mini_example: |-
    Для анаграмм подписью может быть отсортированная строка: `"eat"` и `"tea"` обе дают `"aet"`.

    ---
- code: frequency_of_frequency_buckets
  what_it_is: |-
    Иногда мало знать частоту каждого элемента. Нужно ещё знать, сколько элементов имеют частоту 1, 2, 3 и так далее.
  mental_model: |-
    Храним два уровня: `count[x]` и статистику по самим частотам, например `freq_count[f]`.
  recognition_cues:
  - запросы вида «есть ли элемент с частотой `f`»
  - частоты постоянно меняются
  - нужно быстро находить максимум или минимум по частоте
  anti_cues:
  - Если частоты вычисляются один раз и потом не меняются — обычного `count` часто достаточно.
  core_invariant: |-
    Считаем не только элементы, но и их счётчики.
  canonical_skeleton: |-
    old = freq[x]
    remove(x, bucket[old])
    freq[x] += delta
    add(x, bucket[freq[x]])
  mini_example: |-
    Если два числа встречаются по 3 раза, то `freq_count[3] = 2`.

    ---
- code: sorted_pair_triplet_search
  what_it_is: |-
    В отсортированном массиве ставим указатели с двух сторон и двигаем их по значению текущей суммы.
  mental_model: |-
    Если сумма слишком мала — двигаем левый указатель вправо. Если слишком велика — правый влево.
  recognition_cues:
  - массив отсортирован или его можно отсортировать
  - ищется пара или тройка
  - 'есть цель: сумма, разница, условие на комбинацию'
  anti_cues:
  - Если порядок элементов нельзя менять или условие не становится монотонным после сортировки.
  core_invariant: |-
    Сортировка говорит, в какую сторону двигаться.
  canonical_skeleton: |-
    sort(a)
    for i in outer_choices:
        l, r = i+1, n-1
        while l < r:
            v = expr(a[i], a[l], a[r])
            move l or r by monotone rule
  mini_example: |-
    В `[1, 2, 4, 7]` для суммы `9` начинаем с `1 + 7 = 8`, значит увеличиваем левое число.

    ---
- code: converging_validation_palindrome
  what_it_is: |-
    Два указателя идут навстречу друг другу и проверяют пары элементов с краёв.
  mental_model: |-
    Сравниваем `left` и `right`. Если всё хорошо, двигаем оба к центру; при нарушении принимаем решение сразу.
  recognition_cues:
  - проверка палиндрома
  - симметрия
  - сравнение внешних элементов с постепенным сужением диапазона
  anti_cues:
  - Если ответ зависит от всех комбинаций пар, а не только от согласованных движений с двух концов.
  core_invariant: |-
    Проверяй края и сужай задачу к центру.
  canonical_skeleton: |-
    l, r = 0, n-1
    while l < r:
        if compatible(a[l],a[r]):
            l += 1; r -= 1
        else:
            handle bounded mismatch
  mini_example: |-
    Для `"racecar"` сравниваем `r/r`, затем `a/a`, затем `c/c`.

    ---
- code: root_to_leaf_path_state
  what_it_is: |-
    Во время DFS несём состояние текущего пути от корня к узлу: сумму, строку, максимум, набор или другое значение.
  mental_model: |-
    При входе в узел обновляем состояние пути, передаём его детям, а при backtracking откатываем изменяемые структуры.
  recognition_cues:
  - путь от корня
  - root-to-leaf
  - ответ зависит от предков текущего узла
  - нужно собрать путь
  anti_cues:
  - Если ответ узла зависит прежде всего от результатов детей — это postorder aggregation.
  core_invariant: |-
    Состояние описывает текущий путь, а не всё поддерево.
  canonical_skeleton: |-
    dfs(node, state):
        if not node: return
        s2 = extend(state,node)
        if leaf(node): consume(s2)
        dfs(node.left,s2)
        dfs(node.right,s2)
  mini_example: |-
    Для суммы пути передаём детям `current_sum + node.val`.

    ---
- code: postorder_subtree_aggregation
  what_it_is: |-
    Сначала решаем задачи для детей, затем из их результатов вычисляем ответ для родителя.
  mental_model: |-
    `dfs(node)` имеет точный контракт: возвращает краткую сводку поддерева. После вызовов детей объединяем их результаты.
  recognition_cues:
  - height, diameter, balance
  - свойства поддерева
  - родителю нужны результаты левого и правого ребёнка
  anti_cues:
  - Если главное состояние приходит от предков сверху вниз.
  core_invariant: |-
    Сначала узнай ответы детей, потом отвечай за родителя.
  canonical_skeleton: |-
    dfs(node):
        if not node: return base
        L = dfs(node.left)
        R = dfs(node.right)
        update_global(L,R,node)
        return combine(L,R,node)
  mini_example: |-
    Высота узла равна `1 + max(height(left), height(right))`.

    ---
- code: tree_construction_serialization
  what_it_is: |-
    Строим дерево из последовательностей или превращаем дерево в формат, который можно потом восстановить.
  mental_model: |-
    Используем порядок обхода и границы поддеревьев. При сериализации сохраняем достаточно информации, чтобы структура не потерялась.
  recognition_cues:
  - preorder/inorder/postorder
  - serialize/deserialize
  - восстановить дерево
  - кодировать структуру и пустые места
  anti_cues:
  - Если требуется только вычислить свойство готового дерева.
  core_invariant: |-
    Значений узлов мало: нужно сохранить ещё и форму дерева.
  canonical_skeleton: |-
    build(segment):
        if empty: return null
        root = choose_root(segment)
        root.left = build(left_segment)
        root.right = build(right_segment)
        return root
  mini_example: |-
    В preorder-сериализации маркер `#` для пустого ребёнка позволяет однозначно восстановить форму.

    ---
- code: greedy_pairing_matching
  what_it_is: |-
    Сортируем объекты и жадно составляем пары так, чтобы каждый выбор оставлял хорошие возможности для остальных.
  mental_model: |-
    Выбираем пару по правилу, которое не ухудшает будущее: например, самого слабого соединяем с минимально достаточным сильным.
  recognition_cues:
  - нужно разбить элементы на пары
  - есть «слабые» и «сильные», маленькие и большие
  - после сортировки крайние элементы естественно сопоставляются
  anti_cues:
  - Если локальная пара влияет на далёкие решения сложным образом и простой обмен соседних решений не работает.
  core_invariant: |-
    Не трать сильный ресурс там, где справится более слабый.
  canonical_skeleton: |-
    sort(A); sort(B)
    i=j=0
    while i<len(A) and j<len(B):
        if feasible(A[i],B[j]): match; i+=1; j+=1
        else: advance proven-unusable side
  mini_example: |-
    Для лодок ограниченной вместимости самого тяжёлого человека пытаемся посадить с самым лёгким.

    ---
- code: resource_assignment
  what_it_is: |-
    Есть запросы и ресурсы. Нужно распределить ресурсы так, чтобы удовлетворить максимум запросов или минимизировать потери.
  mental_model: |-
    Обычно сортируем обе стороны и выдаём каждому запросу самый дешёвый ресурс, который уже подходит.
  recognition_cues:
  - workers/jobs
  - cookies/children
  - rooms/tasks
  - каждый ресурс можно использовать ограниченно
  anti_cues:
  - Если назначение имеет сложную матрицу стоимостей — может понадобиться matching или DP.
  core_invariant: |-
    Подходящий минимальный ресурс сохраняет более мощные ресурсы на будущее.
  canonical_skeleton: |-
    sort(events)
    for e in events:
        release_finished()
        add_newly_available()
        r = best_feasible_resource()
        assign(e,r)
  mini_example: |-
    Ребёнку с аппетитом `3` выгоднее дать минимальное печенье размера хотя бы `3`.

    ---
- code: exchange_argument_ordering
  what_it_is: |-
    Нужно выбрать порядок объектов. Жадное правило доказывается мыслью: если две соседние вещи стоят «неправильно», их можно поменять местами и не ухудшить ответ.
  mental_model: |-
    Выводим правило сравнения пары элементов и сортируем по нему. Корректность проверяем через безопасный обмен соседней пары.
  recognition_cues:
  - нужно отсортировать задачи в особом порядке
  - цель зависит от последовательности
  - кажется, что существует локальное правило сравнения двух объектов
  anti_cues:
  - Если предпочтение между `A` и `B` зависит от остальных элементов.
  core_invariant: |-
    Найди, какой из двух объектов должен идти первым, и распространи это правило на весь порядок.
  canonical_skeleton: |-
    define better_before(a,b)
    sort(items, comparator=better_before)
    return evaluate(items)
  mini_example: |-
    Для некоторых задач выгодный порядок определяется сравнением результата `AB` против `BA`.

    ---
- code: dp_take_skip
  what_it_is: |-
    Для каждого элемента решаем: взять его или пропустить, учитывая ограничения на соседние или уже выбранные элементы.
  mental_model: |-
    Сравниваем два варианта: `skip = dp[i-1]` и `take = value[i] + совместимое прошлое`.
  recognition_cues:
  - choose or skip
  - нельзя брать соседние элементы
  - максимальная сумма выбранных объектов
  - состояние зависит от нескольких предыдущих позиций
  anti_cues:
  - Если выбор элемента влияет на большое сложное множество будущих состояний.
  core_invariant: |-
    В каждой позиции сравни «не брать» и «взять плюс лучший совместимый прошлый ответ».
  canonical_skeleton: |-
    skip = dp[i-1]
    take = value[i] + dp[prev_compatible(i)]
    dp[i] = best(skip,take)
  mini_example: |-
    Для дома `i` выбираем максимум между пропуском и его ценностью плюс ответом до `i-2`.

    ---
- code: dp_prefix_partition
  what_it_is: |-
    `dp[i]` описывает лучший ответ для первых `i` элементов. Последний кусок префикса выбирается как одна из возможных частей разбиения.
  mental_model: |-
    Для каждого конца `i` перебираем возможную границу `j` последней части и объединяем `dp[j]` со стоимостью сегмента `j..i`.
  recognition_cues:
  - разбить строку или массив на части
  - ответ для префикса
  - последняя группа может начинаться в разных местах
  anti_cues:
  - Если разбиения не перекрываются по подзадачам или есть более сильная монотонная структура.
  core_invariant: |-
    Зафиксируй последнюю часть — всё до неё уже является меньшей DP-задачей.
  canonical_skeleton: |-
    dp[0]=base
    for i in 1..n:
        for j in candidates_before(i):
            if valid(j,i):
                dp[i] = combine(dp[i],dp[j],segment(j,i))
  mini_example: |-
    В Word Break для позиции `i` проверяем, существует ли `j`, где префикс уже разбиваем, а `s[j:i]` — слово.

    ---
- code: dp_counting_ways
  what_it_is: |-
    DP считает не лучший результат, а сколько способов добраться до состояния.
  mental_model: |-
    Каждое состояние получает сумму количества способов из всех допустимых предыдущих состояний.
  recognition_cues:
  - number of ways
  - count combinations/sequences
  - много путей приходят в одно состояние
  anti_cues:
  - Если способы не перекрываются или нужен только факт существования.
  core_invariant: |-
    Количество способов попасть сюда = сумма способов прийти из всех разрешённых предыдущих мест.
  canonical_skeleton: |-
    dp[start]=1
