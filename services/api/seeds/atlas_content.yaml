- code: low_link_bridges_articulation
  what_it_is: |-
    DFS вычисляет earliest reachable discovery time из subtree без parent edge; это выявляет bridges и articulation points.
  mental_model: |-
    Храним `tin[v]` и `low[v]`; после child DFS, если `low[to] > tin[v]`, edge — bridge.
  recognition_cues:
  - critical connections/vertices
  - удаление edge меняет connectivity
  - обычный visited DFS недостаточен
  core_invariant: |-
    `low[v]` — минимальный discovery time, достижимый из subtree(v) tree-edges и back-edge переходом.
  canonical_skeleton: |-
    dfs(v,parent_edge):
        tin[v]=low[v]=timer++
        for edge v->to:
            if edge==parent_edge: continue
            if visited[to]: low[v]=min(low[v],tin[to])
            else:
                dfs(to,edge)
                low[v]=min(low[v],low[to])
                if low[to]>tin[v]: bridge(v,to)
  mini_example: |-
    Critical Connections in a Network — каноническая bridge-задача.
