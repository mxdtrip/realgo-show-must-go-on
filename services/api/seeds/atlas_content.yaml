- code: binary_lifting_jump_pointers
  what_it_is: |-
    Заранее сохраняем для каждого узла предков на расстоянии `1, 2, 4, 8...`, чтобы делать большие прыжки.
  mental_model: |-
    `up[v][j]` хранит предка вершины `v` на `2^j` шагов выше. Число `k` раскладываем по битам.
  recognition_cues:
  - много запросов k-th ancestor
  - LCA
  - переходы вверх по дереву
  - повторные прыжки по `parent`
  anti_cues:
  - Если запрос один и обычный подъём по родителям достаточно дешёв.
  core_invariant: |-
    Подготовь прыжки степенями двойки и собирай любой длинный путь из них.
  canonical_skeleton: |-
    build:
        up[v][0]=parent[v]
        for j>0: up[v][j]=up[up[v][j-1]][j-1]

    jump(v,k):
        for set bit j in k: v=up[v][j]
  mini_example: |-
