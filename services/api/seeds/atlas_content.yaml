- code: bipartite_coloring
  what_it_is: |-
    Пытаемся раскрасить вершины в два цвета так, чтобы каждое ребро соединяло разные цвета.
  mental_model: |-
    При BFS/DFS сосед получает противоположный цвет. Если сосед уже окрашен так же, условие невозможно.
  recognition_cues:
  - разделить на две несовместимые группы
  - enemies/opposite teams
  - проверить bipartite graph
  anti_cues:
  - Если ограничений больше двух типов или отношения не выражаются простым «разные группы».
  core_invariant: |-
    Каждое ребро требует противоположных цветов на концах.
  canonical_skeleton: |-
    for each uncolored start:
        color[start]=0
        BFS:
            for v in adj[u]:
                if uncolored: color[v]=1-color[u]
                elif color[v]==color[u]: reject
