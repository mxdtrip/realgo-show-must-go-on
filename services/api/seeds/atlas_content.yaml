- code: dp_state_machine_interval
  what_it_is: |-
    Состояние имеет дополнительные режимы либо описывает целый диапазон `[l, r]`.
  mental_model: |-
    В state-machine DP храним небольшой набор режимов. В interval DP увеличиваем длину диапазона и строим большие интервалы из меньших.
  recognition_cues:
  - holding/not holding
  - несколько фаз процесса
  - ответ на подотрезке
  - разрез диапазона на меньшие диапазоны
  anti_cues:
  - Если одной позиции и простого предыдущего состояния достаточно.
  core_invariant: |-
    Добавляй в состояние только ту информацию, без которой будущее невозможно решить.
  canonical_skeleton: |-
    # state-machine
    for x in data:
        new0 = best(state0, transition_from_state1(x))
        new1 = best(state1, transition_from_state0(x))
        state0, state1 = new0, new1

    # interval DP
    for length in range(1,n+1):
        for l in range(n-length+1):
            r = l+length-1
            dp[l][r] = best_over_splits(l,r)
  mini_example: |-
    В stock DP состояние различает «держим акцию» и «не держим акцию».

