- code: online_connectivity
  what_it_is: |-
    Связи добавляются постепенно, а нам нужно быстро объединять группы и проверять принадлежность одной компоненте.
  mental_model: |-
    `find(x)` возвращает представителя компоненты, `union(a,b)` объединяет два представителя. Path compression и union by size ускоряют работу.
