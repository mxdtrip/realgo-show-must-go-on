- code: dp_sequence_lis_lcs
  what_it_is: |-
    DP описывает отношения внутри последовательности или между двумя последовательностями.
  mental_model: |-
    Определяем, что означает индекс: лучший ответ, заканчивающийся здесь, или ответ для пары префиксов `i, j`.
  recognition_cues:
  - longest increasing subsequence
  - longest common subsequence
  - сравнение двух строк
  - состояние зависит от предыдущих позиций
  anti_cues:
  - Если нужен непрерывный участок — sliding window или substring DP может быть ближе.
  core_invariant: |-
    Сначала словами сформулируй состояние; иначе переходы будут случайными.
  canonical_skeleton: |-
    # LCS skeleton
    for i in range(1,n+1):
        for j in range(1,m+1):
            if a[i-1] == b[j-1]: dp[i][j] = dp[i-1][j-1]+1
            else: dp[i][j] = max(dp[i-1][j], dp[i][j-1])
  mini_example: |-
    В LCS при равных символах добавляем `1` к ответу для двух предыдущих префиксов.

