- code: merge_sort_divide_conquer
  what_it_is: |-
    Делим массив пополам, решаем обе части и во время слияния считаем или восстанавливаем глобальную информацию.
  mental_model: |-
    Рекурсивно решаем половины. На merge-step используем их отсортированность, чтобы считать межчастные пары быстрее квадратичного перебора.
  recognition_cues:
  - count inversions
  - пары между левой и правой половиной
  - сортировка помогает считать отношения элементов
  anti_cues:
  - Если задача не получает пользы от отсортированности частей.
  core_invariant: |-
    Внутренние ответы решают половины, а merge считает отношения между половинами.
  canonical_skeleton: |-
    solve(l,r):
        if r-l <= 1: return 0
        m = (l+r)//2
        ans = solve(l,m) + solve(m,r)
        ans += count_cross(a[l:m], a[m:r])
        merge_sorted(a,l,m,r)
        return ans
  mini_example: |-
    При подсчёте инверсий один меньший элемент справа может сразу образовать инверсии с несколькими оставшимися элементами слева.

