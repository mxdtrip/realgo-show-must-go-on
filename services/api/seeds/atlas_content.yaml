- code: bit_tricks_submask
  what_it_is: |-
    Используем специальные свойства битов: выделение младшего бита, подсчёт единиц, перебор подмасок и компактные переходы.
  mental_model: |-
    Применяем тождества вроде `x & -x`, `x & (x-1)` или цикл `sub = (sub-1) & mask`.
  recognition_cues:
  - powers of two
  - submasks
  - lowbit
  - нужно ускорить работу с битовыми состояниями
  anti_cues:
  - Если обычная арифметика или структура данных яснее и требования не требуют битовой оптимизации.
  core_invariant: |-
    Битовый трюк полезен только когда понимаешь, какое свойство двоичной записи он использует.
  canonical_skeleton: |-
    sub = mask
    while sub:
        process(sub)
        sub = (sub - 1) & mask
  mini_example: |-
    `x & (x-1)` удаляет младший установленный бит числа.

