- code: dp_01_knapsack
  what_it_is: |-
    Каждый предмет можно взять максимум один раз. Нужно набрать сумму, вместимость или лучший результат.
  mental_model: |-
    Для каждого предмета обновляем состояния вместимости. В 1D-оптимизации идём по capacity назад, чтобы не использовать предмет повторно.
  recognition_cues:
  - subset sum
  - capacity
  - каждый объект используется 0 или 1 раз
  - выбрать подмножество
  anti_cues:
  - Если предмет можно брать сколько угодно — это unbounded knapsack.
  core_invariant: |-
    Обратный проход по вместимости защищает предмет от повторного использования.
  canonical_skeleton: |-
    dp = [False]*(target+1)
    dp[0] = True
    for x in items:
        for s in range(target, x-1, -1):
            dp[s] = dp[s] or dp[s-x]
  mini_example: |-
    После обработки веса `3` состояние суммы `6` не должно использовать тот же предмет дважды.

