- code: greedy_scheduling
  what_it_is: |-
    Выбираем интервалы или события так, чтобы разместить максимум совместимых объектов либо минимизировать конфликты.
  mental_model: |-
    Классическое правило — выбирать событие с самым ранним окончанием, потому что оно оставляет максимум пространства будущим.
  recognition_cues:
  - meetings/jobs/events
  - интервалы конкурируют за время
  - нужно максимум непересекающихся задач
  anti_cues:
  - Если интервалы имеют разные прибыли и цель — максимальная прибыль, часто нужен DP.
  core_invariant: |-
    Освободи ресурс как можно раньше, если цель — вместить больше будущих событий.
  canonical_skeleton: |-
    intervals.sort(key=lambda x: x.end)
    last_end = -INF
    for s,e in intervals:
        if s >= last_end:
            choose(s,e)
            last_end = e
  mini_example: |-
    Из двух встреч, начинающихся сейчас, раннее окончание обычно оставляет больше вариантов дальше.

