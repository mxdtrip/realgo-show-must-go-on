- code: directional_traversal_simulation
  what_it_is: |-
    Двигаемся по матрице по правилам направлений: вправо, вниз, по диагонали, по спирали или с поворотами.
  mental_model: |-
    Храним текущую позицию и направление. При выходе за границу или конфликте меняем направление по правилу.
  recognition_cues:
  - matrix traversal
  - spiral
  - directions
  - движение зависит от границ или препятствий
  anti_cues:
  - Если задача про достижимость области — graph traversal/flood fill обычно естественнее.
  core_invariant: |-
    Явно храни координату и направление; не прячь движение в хаотичных условиях.
  canonical_skeleton: |-
    dirs = [(0,1),(1,0),(0,-1),(-1,0)]
    r=c=d=0
    for _ in range(R*C):
        visit(r,c)
        nr,nc = r+dirs[d][0], c+dirs[d][1]
        if invalid(nr,nc): d = (d+1)%4
        r,c = r+dirs[d][0], c+dirs[d][1]
  mini_example: |-
    В спирали идём вправо до границы, затем вниз, влево и вверх.

