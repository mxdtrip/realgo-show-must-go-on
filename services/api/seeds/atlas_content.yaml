  canonical_skeleton: |-
    def find(x):
        if parent[x] != x:
            parent[x] = find(parent[x])
        return parent[x]

    def union(a,b):
        ra, rb = find(a), find(b)
        if ra == rb: return False
        attach_smaller_to_larger(ra, rb)
        return True
  mini_example: |-
