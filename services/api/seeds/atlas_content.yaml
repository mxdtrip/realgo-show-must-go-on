- code: strongly_connected_components
  what_it_is: |-
    Разбиваем directed graph на группы, внутри которых из любой вершины можно добраться до любой другой.
  mental_model: |-
    Используем алгоритм вроде Kosaraju или Tarjan: порядок завершения или low-link помогает выделить максимальные взаимно достижимые группы.
  recognition_cues:
  - directed graph
  - взаимная достижимость
  - нужно сжать циклические группы
  - SCC
  anti_cues:
  - Для undirected graph обычных connected components достаточно.
  core_invariant: |-
    В SCC все вершины умеют добраться друг до друга в обоих направлениях.
  canonical_skeleton: |-
    TarjanDFS(v):
        disc[v]=low[v]=time++
        push v; onstack[v]=true
        for to in adj[v]: update low
        if low[v]==disc[v]: pop one SCC
  mini_example: |-
