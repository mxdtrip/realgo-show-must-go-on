- code: in_place_transform_boundary
  what_it_is: |-
    Матрица изменяется прямо на месте, часто слоями от внешней границы к центру.
  mental_model: |-
    Группируем позиции, которые переходят друг в друга, и выполняем циклическую замену с временной переменной.
  recognition_cues:
  - rotate matrix
  - transform in-place
  - rings/layers
  - запрещена вторая матрица
  anti_cues:
  - Если дополнительная матрица разрешена и делает решение значительно проще.
  core_invariant: |-
    Перед перезаписью сохрани значение, которое ещё понадобится.
  canonical_skeleton: |-
    # rotate 90° clockwise
    for r in range(n):
        for c in range(r+1,n):
            a[r][c], a[c][r] = a[c][r], a[r][c]
    for row in a:
        row.reverse()
  mini_example: |-
    При повороте 90° четыре угловых элемента слоя циклически меняются местами.

