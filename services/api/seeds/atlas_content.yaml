# Realgo Taxonomy: методический материал субпаттернов.
# Канон v1 = realgo_72_subpatterns_full_methodology.md; 44 записи v2
# (потомки расформированных лейблов + gap-fill) = раздел 10 файла
# realgo_taxonomy_v2_22x111_gap_audit.md. Структура: что это -> как
# распознать -> ключевая механика -> инвариант -> canonical skeleton ->
# мини-пример. Extra-секции (anti_cues/common_mistakes/dont_confuse_with)
# добавляются руками и переживают перегенерацию.
code: realgo_atlas_content
title: Realgo Atlas Learning Materials
materials:
- code: frequency_map_counting
  what_it_is: |-
    Используется, когда важно знать, сколько раз встречается каждый элемент. Мы строим отображение value → count и затем принимаем решения на основе частот: сравниваем две строки, ищем наиболее частые элементы, проверяем анаграммы или контролируем состав текущего состояния.

    Ключевая особенность — нас интересует не просто факт наличия элемента, а его количество. Если достаточно ответа «есть / нет», чаще подходит Set и подпаттерн Membership & Deduplication.
  mental_model: |-
    Проходим данные и обновляем count[x]. Затем используем частоты напрямую либо сравниваем две карты. Если алфавит мал и фиксирован, массив счётчиков обычно проще Hash Map.
  recognition_cues:
  - нужно считать появления элементов
  - сравниваются частоты двух наборов/строк
  - ответ зависит от most/least frequent или точного количества
  core_invariant: |-
    После обработки первых i элементов count[x] равен точному числу появлений x в этом префиксе.
  canonical_skeleton: |-
    count = {}
    for x in data:
        count[x] = count.get(x, 0) + 1

    use(count)
  mini_example: |-
    В Valid Anagram считаем символы первой строки и уменьшаем счётчики по второй; все итоговые значения должны стать нулём.
- code: membership_deduplication
  what_it_is: |-
    `Set` используется, чтобы быстро помнить: видели мы значение раньше или нет.
  mental_model: |-
    Перед обработкой `x` проверяем `x in seen`. Затем при необходимости добавляем `x` в `seen`.
  recognition_cues:
  - нужно найти дубликаты
  - нужны уникальные элементы
  - часто звучит вопрос «уже встречалось?»
  anti_cues:
  - Если важна частота, индекс или другое связанное значение — нужен `Hash Map`, а не только `Set`.
  core_invariant: |-
    `Set` хранит факт присутствия, а не количество.
  canonical_skeleton: |-
    seen = set()
    for x in data:
        if x in seen:
            handle_repeat(x)
        seen.add(x)
  mini_example: |-
    В `[4, 1, 7, 4]` второй `4` сразу обнаруживается, потому что первый уже лежит в `seen`.

    ---
- code: complement_lookup
  what_it_is: |-
    Для текущего элемента вычисляем, какого значения не хватает до ответа, и быстро ищем его в `Hash Map` или `Set`.
  mental_model: |-
    Для `x` считаем `need = target - x`. Проверяем, встречался ли `need`, затем сохраняем текущий элемент.
  recognition_cues:
  - нужна пара с заданной суммой
  - для `x` можно вычислить требуемый партнёр
  - двойной перебор выглядит слишком медленным
  anti_cues:
  - Если нужен отсортированный порядок, ближайшая пара или все комбинации с более сложными ограничениями.
  core_invariant: |-
    Не ищи все пары — ищи дополнение к текущему элементу.
  canonical_skeleton: |-
    pos = {}
    for i, x in enumerate(data):
        need = target - x
        if need in pos:
            return pos[need], i
        pos[x] = i
  mini_example: |-
    Для суммы `9`, увидев `2`, запоминаем: нужен `7`. Когда приходит `7`, пара найдена.

    ---



    Два указателя двигаются по данным так, чтобы не перебирать все пары или не копировать массив без необходимости.
- code: opposite_direction_pointers
  what_it_is: |-
    Два указателя стартуют с противоположных концов диапазона и движутся навстречу друг другу. Подходит, когда сравнение текущей пары позволяет понять, какую сторону безопасно сдвинуть и тем самым исключить множество вариантов.

    Частые задачи: pair sum в отсортированном массиве, палиндромы, container with most water. Ключевое условие — должна существовать причина, почему движение конкретного указателя не пропустит лучший ответ.
  mental_model: |-
    Ставим left и right на края. По текущему условию двигаем только ту сторону, изменение которой может приблизить к цели или улучшить ответ. Это решение требует явного обоснования безопасного исключения вариантов.
  recognition_cues:
  - массив отсортирован или есть монотонная реакция на движение указателя
  - ищется пара с двух концов
  - сравниваются симметричные элементы
  core_invariant: |-
    После каждого сдвига все пары, использующие отброшенный край в исключённой области, доказуемо не могут дать ещё не рассмотренный подходящий/лучший ответ.
  canonical_skeleton: |-
    left, right = 0, n - 1
    while left < right:
        state = evaluate(a[left], a[right])
        if good(state): return answer
        if need_larger(state): left += 1
        else: right -= 1
  mini_example: |-
    В Two Sum II сумма мала — двигаем left, потому что при фиксированном левом элементе уменьшение right сумму не увеличит.
- code: same_direction_read_write
  what_it_is: |-
    Один указатель читает элементы, другой показывает, куда записать следующий нужный элемент.
  mental_model: |-
    `read` идёт по всем элементам. Когда элемент нужно сохранить, записываем его в позицию `write` и двигаем `write`.
  recognition_cues:
  - нужно изменить массив на месте
  - удалить элементы или дубликаты
  - сохранить относительный порядок оставшихся
  anti_cues:
  - Если элементы нужно переставлять в сложном порядке или нужна дополнительная глобальная структура.
  core_invariant: |-
    Один читает всё, второй строит полезный префикс.
  canonical_skeleton: |-
    write = 0
    for read in range(n):
        if keep(a[read]):
            a[write] = a[read]
            write += 1
    return write
  mini_example: |-
    Удаляя нули, `read` просматривает массив, а `write` подряд собирает ненулевые элементы.

    ---
- code: fast_slow_pointers
  what_it_is: |-
    Два указателя идут с разной скоростью. Это помогает обнаружить цикл или найти специальную позицию без дополнительной памяти.
  mental_model: |-
    `slow` идёт на один шаг, `fast` — на два. Их взаимное положение раскрывает структуру пути.
  recognition_cues:
  - linked list или повторяющийся переход `next`
  - нужно найти цикл
  - нужно найти середину
  anti_cues:
  - Если нет цепочки последовательных переходов или нужно помнить много отдельных посещённых состояний.
  core_invariant: |-
    Разная скорость превращает скрытый цикл в встречу указателей.
  canonical_skeleton: |-
    slow = fast = head
    while fast and fast.next:
        slow = slow.next
        fast = fast.next.next
        if slow is fast:
            return True
    return False
  mini_example: |-
    В списке с циклом быстрый указатель рано или поздно догонит медленный внутри цикла.

    ---



    Окно хранит состояние непрерывного участка массива или строки и обновляет его при движении границ.
- code: fixed_size_window
  what_it_is: |-
    Окно всегда содержит ровно `k` соседних элементов и двигается по одному шагу.
  mental_model: |-
    При сдвиге один элемент выходит слева, один входит справа. Состояние окна обновляем, а не считаем заново.
  recognition_cues:
  - нужен непрерывный участок
  - его размер заранее известен
  - надо проверить все участки длины `k`
  anti_cues:
  - Если размер подходящего участка должен меняться по ходу решения.
  core_invariant: |-
    Окно сдвинулось: один ушёл, один пришёл.
  canonical_skeleton: |-
    state = init()
    for right, x in enumerate(a):
        add(x)
        if right >= k: remove(a[right-k])
        if right >= k-1: update_answer(state)
  mini_example: |-
    Для суммы трёх соседних чисел: `8 - ушедшее + пришедшее`.

    ---
- code: longest_valid_window
  what_it_is: |-
    Ищем самый длинный непрерывный участок, который удовлетворяет условию. Правая граница расширяет окно, левая чинит его при нарушении.
  mental_model: |-
    Добавляем `right`. Пока окно невалидно, двигаем `left` и удаляем его вклад. После восстановления обновляем максимум.
  recognition_cues:
  - «самый длинный подмассив/подстрока»
  - условие можно поддерживать при добавлении и удалении элементов
  - слишком большое окно можно сделать допустимым, сдвинув `left`
  anti_cues:
  - Если удаление слева не восстанавливает условие предсказуемо или допустимость не монотонна.
  core_invariant: |-
    Расширяйся смело, сжимайся только когда условие нарушено.
  canonical_skeleton: |-
    left = 0
    for right in range(n):
        add(a[right])
        while not valid():
            remove(a[left]); left += 1
        ans = max(ans, right-left+1)
  mini_example: |-
    Ищем самую длинную подстроку без повторов: при дубле двигаем левую границу.

    ---
- code: shortest_valid_window
  what_it_is: |-
    Ищем самый короткий участок, который уже удовлетворяет условию. Как только окно стало подходящим, пытаемся его уменьшить.
  mental_model: |-
    Расширяем `right`, пока условие не выполнено. Затем двигаем `left`, пока окно остаётся валидным, обновляя минимум.
  recognition_cues:
  - «минимальная длина»
  - «самый короткий подмассив/подстрока»
  - после достижения порога можно сжимать слева
  anti_cues:
  - Если наличие отрицательных чисел разрушает монотонность суммы и простое сжатие больше не работает.
  core_invariant: |-
    Стало достаточно — сразу пытайся выбросить лишнее слева.
  canonical_skeleton: |-
    left = 0
    for right in range(n):
        add(a[right])
        while valid():
            ans = min(ans, right-left+1)
            remove(a[left]); left += 1
  mini_example: |-
    Для минимального подмассива с суммой хотя бы `S` на положительных числах сначала набираем сумму, затем сжимаем.

    ---
- code: frequency_coverage_window
  what_it_is: |-
    Окно должно содержать нужные элементы в нужном количестве. Поэтому внутри окна поддерживаются частоты и степень покрытия требований.
  mental_model: |-
    Храним `window_count` и сравниваем его с `need`. Отдельный счётчик показывает, сколько требований уже выполнено.
  recognition_cues:
  - подстрока должна содержать все символы шаблона
  - важны количества элементов внутри окна
  - условие меняется при входе и выходе символов
  anti_cues:
  - Если нужен просто участок фиксированной длины или условие не связано с локальными частотами.
  core_invariant: |-
    Окно валидно не по длине, а по тому, что оно покрывает.
  canonical_skeleton: |-
    need = counts(target)
    window = {}; formed = 0
    for right in range(n):
        add_and_update(s[right])
        while formed == required:
            update_answer()
            remove_and_update(s[left]); left += 1
  mini_example: |-
    Для шаблона `"AABC"` окно должно содержать минимум две `A`, одну `B` и одну `C`.

    ---



    Эти подходы помогают быстро отвечать на вопросы о префиксах, диапазонах и динамически упорядоченных данных.
- code: prefix_sum_range_query
  what_it_is: |-
    Заранее считаем накопленные суммы, чтобы сумму любого отрезка получать по двум значениям.
  mental_model: |-
    `prefix[i]` хранит сумму элементов до позиции `i`. Тогда сумма `[l, r]` получается как разность двух префиксов.
  recognition_cues:
  - много запросов суммы на диапазоне
  - массив почти не меняется
  - повторный проход по каждому отрезку слишком дорог
  anti_cues:
  - Если элементы часто меняются — могут понадобиться Fenwick Tree или Segment Tree.
  core_invariant: |-
    Сумма отрезка = большой префикс минус лишний левый префикс.
  canonical_skeleton: |-
    prefix = [0]*(n+1)
    for i, x in enumerate(a):
        prefix[i+1] = prefix[i] + x

    def range_sum(l, r):
        return prefix[r+1] - prefix[l]
  mini_example: |-
    Для `[2, 4, 1, 3]` сумма позиций `1..3` равна `prefix[4] - prefix[1]`.

    ---
- code: prefix_balance_hashmap
  what_it_is: |-
    На каждом префиксе считаем баланс или накопленное значение. Повторение нужного префиксного состояния означает, что между двумя позициями есть подходящий отрезок.
  mental_model: |-
    Храним в `map`, где раньше встречалось каждое значение префикса. Для текущего `prefix` ищем нужный прошлый `prefix - target`.
  recognition_cues:
  - подмассив с заданной суммой
  - равное число двух типов элементов
  - ответ зависит от разности префиксов
  anti_cues:
  - Если нужен только один статический диапазон или состояние нельзя выразить компактным префиксом.
  core_invariant: |-
    Нужный подмассив прячется между двумя подходящими префиксами.
  canonical_skeleton: |-
    freq = {0: 1}
    p = ans = 0
    for x in a:
        p += x
        ans += freq.get(p-target, 0)
        freq[p] = freq.get(p, 0) + 1
  mini_example: |-
    Если одинаковый баланс `0/1` встретился дважды, между этими позициями нулей и единиц поровну.

    ---
- code: difference_array
  what_it_is: |-
    Позволяет быстро применить много изменений ко всем элементам диапазона, не проходя каждый диапазон целиком.
  mental_model: |-
    В `diff[l]` добавляем `v`, а после `r` вычитаем `v`. Затем один prefix sum восстанавливает итоговые значения.
  recognition_cues:
  - много операций «добавить `v` на `[l, r]`»
  - итоговый массив нужен после всех обновлений
  - онлайн-ответы между обновлениями не обязательны
  anti_cues:
  - Если после каждого обновления сразу нужны сложные запросы — нужен динамический диапазонный инструмент.
  core_invariant: |-
    Отмечай начало и конец влияния, а середину восстанови префиксом.
  canonical_skeleton: |-
    diff = [0]*(n+1)
    for l, r, delta in updates:
        diff[l] += delta
        if r+1 < n: diff[r+1] -= delta
    cur = 0
    for i in range(n):
        cur += diff[i]
        a[i] += cur
  mini_example: |-
    Добавить `+5` на позиции `2..4`: ставим `+5` в `2` и `-5` в `5`.

    ---
- code: exact_search_monotone
  what_it_is: |-
    Ищем точное значение в отсортированном или монотонном пространстве, каждый раз отбрасывая половину вариантов.
  mental_model: |-
    Сравниваем цель с `a[mid]` и оставляем только половину, где цель ещё может находиться.
  recognition_cues:
  - данные отсортированы
  - сравнение с `mid` однозначно говорит идти влево или вправо
  - нужен конкретный элемент
  anti_cues:
  - Если порядок не даёт однозначного направления или данные слишком малы для усложнения.
  core_invariant: |-
    После каждого шага сохраняй только половину, где ответ всё ещё возможен.
  canonical_skeleton: |-
    lo, hi = 0, n-1
    while lo <= hi:
        mid = lo + (hi-lo)//2
        if a[mid] == target: return mid
        if a[mid] < target: lo = mid+1
        else: hi = mid-1
    return -1
  mini_example: |-
    Если `target < a[mid]`, правая половина больше не нужна.

    ---
- code: lower_upper_bound
  what_it_is: |-
    Ищем не обязательно точное совпадение, а первую позицию, где значение стало достаточно большим или уже перешло границу.
  mental_model: |-
    Формулируем булево условие для позиции и ищем первую позицию, где оно становится истинным.
  recognition_cues:
  - «первый элемент ≥ x»
  - «первый элемент > x»
  - место вставки
  - начало или конец группы одинаковых значений
  anti_cues:
  - Если предикат по индексам меняется `false → true → false` и не является монотонным.
  core_invariant: |-
    Binary Search может искать границу, а не элемент.
  canonical_skeleton: |-
    lo, hi = 0, n
    while lo < hi:
        mid = (lo+hi)//2
        if pred(mid): hi = mid
        else: lo = mid+1
    return lo
  mini_example: |-
    В `[1, 3, 3, 7]` lower bound для `3` — первая позиция с `3`.

    ---
- code: binary_search_on_answer
  what_it_is: |-
    Не ищем ответ в массиве. Перебираем возможные значения ответа бинарным поиском и проверяем, достижимо ли каждое.
  mental_model: |-
    Берём `mid` как кандидат ответа и запускаем проверку. По результату отбрасываем половину диапазона ответов.
  recognition_cues:
  - «минимально возможный максимум»
  - «максимально возможный минимум»
  - есть функция `can(x)`
  - если `x` подходит, то все большие или меньшие значения тоже подходят
  anti_cues:
  - Если допустимость кандидатов скачет и не образует монотонную границу.
  core_invariant: |-
    Бинарный поиск работает там, где «можно?» меняется только один раз.
  canonical_skeleton: |-
    lo, hi = min_answer, max_answer
    while lo < hi:
        mid = (lo+hi)//2
        if feasible(mid): hi = mid
        else: lo = mid+1
    return lo
  mini_example: |-
    Проверяем, можно ли закончить работу за `mid` часов. Если можно, пробуем меньше.

    ---
- code: rotated_peak_search
  what_it_is: |-
    Данные не полностью отсортированы, но в них остаётся структура, которая позволяет каждый раз выбрать правильную половину.
  mental_model: |-
    На каждом шаге определяем, какая часть упорядочена или куда идёт подъём, и сохраняем только перспективную сторону.
  recognition_cues:
  - rotated sorted array
  - поиск пика
  - частичная или неявная упорядоченность
  - '`mid` сообщает направление'
  anti_cues:
  - Если структура массива не даёт гарантии, что одна половина бесполезна.
  core_invariant: |-
