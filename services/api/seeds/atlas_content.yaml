- code: dijkstra_nonnegative
  what_it_is: |-
    Ищем кратчайшие пути при разных, но неотрицательных весах рёбер.
  mental_model: |-
    Min-heap хранит вершину с текущей минимальной известной дистанцией. Из неё пытаемся улучшить расстояния соседей.
  recognition_cues:
  - weighted graph
  - веса `>= 0`
  - shortest cost/time/distance
  anti_cues:
  - При отрицательных рёбрах обычный Dijkstra теряет гарантию.
  core_invariant: |-
    Обрабатывай следующим самый дешёвый достигнутый кандидат.
  canonical_skeleton: |-
    dist[start] = 0
    heap = [(0,start)]
    while heap:
        d,v = pop_min(heap)
        if d != dist[v]: continue
        for nei,w in g[v]:
            nd = d+w
            if nd < dist[nei]:
                dist[nei] = nd
                push(heap,(nd,nei))
  mini_example: |-
