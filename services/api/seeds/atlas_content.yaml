# Realgo Taxonomy v1: методический материал субпаттернов.
# Один субпаттерн = одна компактная учебная единица (не статья).
# Субпаттерны без записи здесь показывают честный empty state
# «материал готовится» — контент довозится порциями в этот файл.
code: realgo_atlas_content
title: Realgo Atlas Learning Materials
materials:
  - code: binary_search_on_answer
    what_it_is: >-
      Бинарный поиск не по массиву, а по пространству возможных ответов:
      ищем минимальное (или максимальное) значение, при котором условие
      задачи выполнимо.
    mental_model: >-
      Представь ползунок «жёсткости» ограничения. Крутишь вправо — задача
      становится выполнимой, влево — невыполнимой. Где-то есть щёлк —
      граница. Функция feasible(x) монотонна, значит границу можно искать
      делением пополам, не перебирая все значения.
    recognition_cues:
      - "«Минимальная скорость / вместимость / время, чтобы успеть…»"
      - "«Максимальное значение, при котором ещё возможно…»"
      - "Ответ — число из большого диапазона, а проверка кандидата дешёвая (O(n))."
      - "Прямой формулы для ответа не видно, но «а сработает ли x?» проверяется просто."
    anti_cues:
      - "feasible(x) не монотонна: из выполнимости x не следует выполнимость x+1."
      - "Ищется элемент в конкретном отсортированном массиве — это обычный бинарный поиск."
      - "Кандидатов мало — дешевле перебрать напрямую."
    core_invariant: >-
      На каждом шаге граница ответа лежит в [lo, hi]: всё левее lo —
      невыполнимо, всё правее hi — выполнимо (или наоборот для максимума).
      Инвариант сохраняется выбором половины после проверки mid.
    canonical_skeleton: |-
      lo, hi = min_answer, max_answer
      while lo < hi:
          mid = (lo + hi) // 2
          if feasible(mid):
              hi = mid        # mid может быть ответом
          else:
              lo = mid + 1    # mid точно не ответ
      return lo
    common_mistakes:
      - "hi = mid - 1 при поиске минимума: выкидываешь потенциальный ответ."
      - "Неверные начальные границы: min_answer завышен или max_answer занижен."
      - "feasible() с побочным эффектом или несимметричной логикой для mid на краях."
      - "Бесконечный цикл из-за mid = (lo+hi+1)//2 против hi = mid (несогласованное округление)."
    dont_confuse_with:
      - title: Exact Binary Search
        note: >-
          Обычный поиск ищет элемент в данных. Здесь данных нет — есть
          монотонный предикат над воображаемым диапазоном ответов.
      - title: Greedy
        note: >-
          Жадный ход строит ответ напрямую. Binary Search on Answer
          не строит — только проверяет кандидата целиком.

  - code: exact_search_monotone
    what_it_is: >-
      Классический бинарный поиск конкретного значения в отсортированной
      (монотонной) структуре за O(log n).
    mental_model: >-
      Телефонная книга: открываешь посередине, сравниваешь, выбрасываешь
      половину. Ключевое право на это даёт отсортированность.
    recognition_cues:
      - "Массив отсортирован и нужно найти элемент или его позицию."
      - "Требование O(log n) прямо в условии."
      - "Данные монотонны по строкам/столбцам (матрица с отсортированными строками)."
    anti_cues:
      - "Массив не отсортирован и сортировка дороже задачи."
      - "Нужны все вхождения/агрегат по диапазону — смотри prefix sums."
    core_invariant: >-
      Целевой элемент (если существует) всегда внутри [lo, hi].
      Каждая итерация строго сужает отрезок.
    canonical_skeleton: |-
      lo, hi = 0, len(a) - 1
      while lo <= hi:
          mid = (lo + hi) // 2
          if a[mid] == target: return mid
          if a[mid] < target: lo = mid + 1
          else: hi = mid - 1
      return -1
    common_mistakes:
      - "lo < hi вместо lo <= hi — теряется последний элемент."
      - "mid = (lo+hi)/2 с переполнением в языках с фиксированным int."
      - "Смешение конвенций [lo, hi] и [lo, hi) в одном цикле."
    dont_confuse_with:
      - title: Lower / Upper Bound
        note: >-
          Exact search останавливается на любом совпадении. Bound-варианты
          продолжают до первой/последней подходящей позиции.

  - code: lower_upper_bound
    what_it_is: >-
      Бинарный поиск границы: первая позиция, где условие становится
      истинным (lower bound), или последняя, где ещё истинно (upper bound).
    mental_model: >-
      Массив из нулей и единиц: 000111. Ищем не «единицу», а место, где
      нули кончаются. Любой монотонный предикат сводится к этой картинке.
    recognition_cues:
      - "«Первый элемент ≥ x», «последнее значение ≤ t»."
      - "Поиск по отсортированным событиям во времени (версии, таймстемпы)."
      - "Есть дубликаты, и важно самое левое/правое вхождение."
    anti_cues:
      - "Нужен просто факт наличия — хватит exact search или множества."
      - "Предикат не монотонен вдоль массива."
    core_invariant: >-
      Всё левее lo — гарантированно false, всё правее hi — гарантированно
      true (для lower bound). Отрезок неопределённости только сужается.
    canonical_skeleton: |-
      lo, hi = 0, n            # [lo, hi) — полуинтервал
      while lo < hi:
          mid = (lo + hi) // 2
          if pred(mid): hi = mid
          else: lo = mid + 1
      return lo                # первый индекс с pred == true (или n)
    common_mistakes:
      - "Возврат lo без проверки lo == n (условие нигде не выполнено)."
      - "Off-by-one между «первый ≥» и «первый >»."
      - "Полуинтервал [lo, hi) и замкнутый [lo, hi] перепутаны в границах цикла."
    dont_confuse_with:
      - title: Binary Search on Answer
        note: >-
          Тот же каркас, но bound ищется в реальном массиве, а не в
          абстрактном диапазоне значений ответа.

  - code: rotated_peak_search
    what_it_is: >-
      Бинарный поиск в «почти отсортированном» пространстве: повёрнутый
      массив, пик, неявная сортировка. Монотонность есть локально, и на
      каждом шаге можно определить, в какой половине искать.
    mental_model: >-
      Хотя массив в целом не монотонен, сравнение mid с краем говорит,
      какая половина «нормальная». Решение о выборе половины принимается
      по структуре, а не по одному сравнению с target.
    recognition_cues:
      - "«Отсортирован, затем повёрнут вокруг неизвестного пивота»."
      - "Поиск пика/локального максимума за O(log n)."
      - "Массив с двумя монотонными кусками."
    anti_cues:
      - "Дубликаты стирают различимость половин — гарантия O(log n) пропадает."
      - "Больше двух монотонных кусков."
    core_invariant: >-
      Целевая точка всегда остаётся в выбранной половине: инвариант
      подтверждается сравнением a[mid] с a[lo] или a[hi], а не только с target.
    canonical_skeleton: |-
      lo, hi = 0, n - 1
      while lo < hi:
          mid = (lo + hi) // 2
          if a[mid] > a[hi]:      # минимум справа от mid
              lo = mid + 1
          else:                   # минимум в [lo, mid]
              hi = mid
      return lo                   # индекс минимума / точки поворота
    common_mistakes:
      - "Сравнение с a[lo] вместо a[hi] без корректировки веток."
      - "Игнорирование случая «массив не повёрнут вовсе»."
      - "Попытка применить шаблон при наличии дубликатов без деградации к O(n)."
    dont_confuse_with:
      - title: Exact Search on Monotone Space
        note: >-
          Там одна монотонная зона и сравнение с target. Здесь сперва
          определяется «правильная» половина по структуре массива.

  - code: fixed_size_window
    what_it_is: >-
      Окно фиксированной длины k скользит по последовательности; агрегат
      окна пересчитывается за O(1) на шаг: добавили правый, убрали левый.
    mental_model: >-
      Линейка длины k, приклеенная к массиву. Двигается на одну позицию —
      меняются ровно два элемента. Всё, что можно поддерживать
      инкрементально (сумма, счётчики), не нужно пересчитывать заново.
    recognition_cues:
      - "«Подмассив/подстрока длины ровно k» в условии."
      - "Среднее/сумма/число различных на каждом окне длины k."
      - "Наивное решение — пересчёт O(k) на каждый сдвиг."
    anti_cues:
      - "Длина окна не фиксирована, а зависит от условия — это variable window."
      - "Агрегат не поддерживается инкрементально (медиана — уже two heaps)."
    core_invariant: >-
      После каждого сдвига состояние (сумма, счётчики) точно описывает
      текущее окно [i-k+1, i] — ни больше ни меньше.
    canonical_skeleton: |-
      state = init(a[0:k])
      best = evaluate(state)
      for i in range(k, n):
          state.add(a[i])
          state.remove(a[i - k])
          best = max(best, evaluate(state))
    common_mistakes:
      - "Удаление a[i-k] вместо a[i-k] до/после добавления — сдвиг на единицу."
      - "Ответ снят до того, как окно впервые заполнилось до k."
      - "Пересоздание структуры окна на каждом шаге — теряется весь выигрыш."
    dont_confuse_with:
      - title: Longest Valid Variable Window
        note: >-
          Там размер окна — искомая величина. Здесь k дан, ищется агрегат.

  - code: longest_valid_window
    what_it_is: >-
      Переменное окно, растущее вправо и сжимающееся слева, когда условие
      нарушено; ищется максимальная длина валидного окна.
    mental_model: >-
      Жадный резиновый жгут: правый конец тянет вперёд всегда, левый
      подтягивается ровно настолько, чтобы восстановить валидность.
      Работает потому, что нарушение монотонно: если окно невалидно,
      любое его расширение тоже невалидно.
    recognition_cues:
      - "«Длиннейшая подстрока/подмассив, где …» (без повторов, ≤ k замен)."
      - "Условие окна портится от расширения и чинится сужением."
      - "Наивный перебор всех подотрезков O(n²) с дешёвой проверкой."
    anti_cues:
      - "Условие не монотонно (сумма с отрицательными числами — сужение может и портить)."
      - "Ищется число подотрезков, а не максимум длины — там другая арифметика (at most K)."
    core_invariant: >-
      Окно [left, right] валидно после каждой итерации; left двигается
      только вправо, каждый индекс входит и выходит из окна не более
      одного раза (амортизированный O(n)).
    canonical_skeleton: |-
      left = 0
      for right in range(n):
          state.add(a[right])
          while not valid(state):
              state.remove(a[left])
              left += 1
          best = max(best, right - left + 1)
    common_mistakes:
      - "Снятие ответа внутри while (окно ещё невалидно)."
      - "if вместо while при сужении: одного шага может не хватить."
      - "Отрицательные числа в сумме — монотонность молча сломана."
    dont_confuse_with:
      - title: Prefix Sum
        note: >-
          Prefix sum считает агрегаты произвольных отрезков без сдвига
          окна; sliding window требует монотонного условия, зато O(n) и O(1) память.
      - title: Shortest Valid Variable Window
        note: >-
          Симметричный случай: там окно сжимают, ПОКА оно валидно,
          и ответ снимается внутри сжатия.

  - code: shortest_valid_window
    what_it_is: >-
      Переменное окно для поиска минимальной длины: расширяемся до
      валидности, затем сжимаем слева, пока валидность не пропадёт,
      снимая ответ на каждом валидном шаге.
    mental_model: >-
      Тиски: правая губка накрывает достаточно материала, левая поджимает
      до предела. Минимум достигается в момент, когда дальнейшее сжатие
      ломает условие.
    recognition_cues:
      - "«Кратчайший подмассив/подстрока, содержащая …»"
      - "«Минимальная длина при сумме ≥ S» (положительные числа)."
      - "Валидность появляется от расширения и исчезает от сужения."
    anti_cues:
      - "Отрицательные элементы при условии на сумму — нужен prefix + monotonic deque."
      - "Ищется максимум длины — зеркальный шаблон longest window."
    core_invariant: >-
      В момент снятия ответа окно валидно и не сжимаемо дальше без потери
      валидности слева.
    canonical_skeleton: |-
      left = 0
      for right in range(n):
          state.add(a[right])
          while valid(state):
              best = min(best, right - left + 1)
              state.remove(a[left])
              left += 1
    common_mistakes:
      - "Ответ снимается после while, когда окно уже невалидно."
      - "Возврат 0/∞ не обработан, если валидного окна нет вообще."
      - "Сжатие через if — застревает на неминимальном окне."
    dont_confuse_with:
      - title: Longest Valid Variable Window
        note: >-
          Порядок «снять ответ / сжать» противоположный: для минимума
          ответ снимается во время сжатия, для максимума — после него.

  - code: frequency_coverage_window
    what_it_is: >-
      Окно с частотным словарём: валидность определяется покрытием
      требуемых символов/элементов, за O(1) поддерживается счётчик
      «сколько требований уже закрыто».
    mental_model: >-
      Чек-лист покупок и корзина. Каждый входящий элемент может закрыть
      пункт чек-листа, каждый выходящий — снова открыть. Смотреть нужно
      не на весь словарь, а на счётчик закрытых пунктов.
    recognition_cues:
      - "«Окно, содержащее все символы t» / «анаграмма как подстрока»."
      - "Валидность = сравнение двух частотных распределений."
      - "Полная сверка словарей на каждом шаге кажется неизбежной."
    anti_cues:
      - "Важен порядок элементов, а не мультимножество — частоты не помогут."
      - "Требований нет, есть только длина — хватит простого окна."
    core_invariant: >-
      matched == числу требований, закрытых текущим окном; обновляется
      только на пересечении нуля разницы частот (need[c] == have[c]).
    canonical_skeleton: |-
      need = Counter(t); matched = 0
      for right, c in enumerate(s):
          have[c] += 1
          if have[c] == need[c]: matched += 1
          while matched == len(need):
              best = update(best, left, right)
              d = s[left]; left += 1
              if have[d] == need[d]: matched -= 1
              have[d] -= 1
    common_mistakes:
      - "Сравнение have[c] >= need[c] вместо == при инкременте matched — двойной счёт."
      - "Декремент matched после уменьшения have, а не до."
      - "Сверка всего словаря на каждом шаге — O(26·n) превращается в O(n²) на юникоде."
    dont_confuse_with:
      - title: Fixed-Size Window
        note: >-
          Анаграмма — частный случай с фиксированной длиной. Общий случай
          (minimum window) требует переменного окна с покрытием.

  - code: complement_lookup
    what_it_is: >-
      Хэш-таблица «что я уже видел»: для каждого элемента за O(1)
      проверяется, встречалось ли его дополнение (target - x, тот же
      остаток, парный узел).
    mental_model: >-
      Гардероб с номерками. Проходя мимо каждого элемента, спрашиваешь:
      «мой партнёр уже сдал пальто?» Если да — пара найдена; если нет —
      сдаёшь своё и идёшь дальше.
    recognition_cues:
      - "«Найти пару с суммой/разностью/условием X» в несортированном массиве."
      - "O(n²) перебор пар, где вторую половину пары можно вычислить из первой."
      - "Группировка по вычислимому ключу (остаток, канонический вид)."
    anti_cues:
      - "Массив отсортирован и нужна пара — два указателя без памяти."
      - "Нужны все пары с повторами — аккуратнее с частотами, не с множеством."
    core_invariant: >-
      К моменту обработки a[i] таблица содержит ровно все элементы
      a[0..i-1] (или их ключи) — «прошлое» полно и не содержит будущего.
    canonical_skeleton: |-
      seen = {}
      for i, x in enumerate(a):
          if target - x in seen:
              return seen[target - x], i
          seen[x] = i
    common_mistakes:
      - "Вставка до проверки — элемент находит сам себя (x == target/2)."
      - "Потеря дубликатов: ключ перезаписан, а пара из двух одинаковых значений легальна."
      - "Ключ-float без нормализации."
    dont_confuse_with:
      - title: Opposite-Direction Pointers
        note: >-
          На отсортированном массиве пару ищут указатели без O(n) памяти.
          Hash-подход не требует сортировки, но платит памятью.

  - code: fast_slow_pointers
    what_it_is: >-
      Два указателя с разной скоростью по связной структуре: детект цикла
      (Флойд), середина списка, вход в цикл.
    mental_model: >-
      Два бегуна на дорожке. Если дорожка закольцована, быстрый догонит
      медленного; если нет — быстрый упрётся в конец. Скорость 2:1 делает
      арифметику встреч предсказуемой.
    recognition_cues:
      - "«Есть ли цикл в списке / где начало цикла?»"
      - "«Середина списка за один проход»."
      - "Последовательность x -> f(x) -> f(f(x)) с неизбежным повтором (happy number, duplicate)."
    anti_cues:
      - "Есть случайный доступ по индексу — быстрее адресоваться напрямую."
      - "Память не ограничена и множество посещённых проще и читабельнее."
    core_invariant: >-
      fast всегда на чётной дистанции 2d от старта, когда slow на d;
      внутри цикла разрыв сокращается на 1 за шаг — встреча гарантирована.
    canonical_skeleton: |-
      slow = fast = head
      while fast and fast.next:
          slow = slow.next
          fast = fast.next.next
          if slow == fast:       # цикл найден
              break
    common_mistakes:
      - "Проверка только fast без fast.next — NPE на чётной длине."
      - "Старт fast с head.next меняет точку встречи — ломает фазу поиска входа в цикл."
      - "Для середины: не решено заранее, какая из двух середин нужна при чётной длине."
    dont_confuse_with:
      - title: Same-Direction Read/Write
        note: >-
          Там оба указателя идут с одной скоростью и разделяют
          «прочитано/записано». Здесь разность скоростей — суть приёма.

  - code: monotonic_stack
    what_it_is: >-
      Стек, в котором элементы поддерживаются монотонными: вталкивание
      нового элемента выталкивает всех, кто нарушает порядок. Даёт
      «ближайший больший/меньший» за O(n).
    mental_model: >-
      Очередь людей по росту, где новый пришедший отправляет домой всех,
      кто ниже его: им уже никогда не быть «ближайшим высоким» для
      будущих. Каждый входит и выходит один раз.
    recognition_cues:
      - "«Следующий больший/меньший элемент» в любом виде."
      - "«Сколько дней до более тёплой погоды», спаны, гистограммы."
      - "Наивное O(n²) с внутренним циклом «ищем вправо/влево первого …»."
    anti_cues:
      - "Нужен агрегат по окну фиксированной длины — это monotonic deque."
      - "Порядок не важен, важны только частоты."
    core_invariant: >-
      Стек всегда монотонен (например, строго убывает от дна к вершине);
      выталкиваемый элемент получает текущий индекс как своего
      «ближайшего большего».
    canonical_skeleton: |-
      stack = []                     # индексы, значения убывают
      for i, x in enumerate(a):
          while stack and a[stack[-1]] < x:
              j = stack.pop()
              answer[j] = i          # x — ближайший больший для a[j]
          stack.append(i)
    common_mistakes:
      - "Строгое/нестрогое сравнение перепутано — дубликаты дают неверные спаны."
      - "В стеке значения вместо индексов, а нужен именно индекс/дистанция."
      - "Оставшиеся в стеке элементы не обработаны после цикла."
    dont_confuse_with:
      - title: Monotonic Deque
        note: >-
          Deque дополнительно выталкивает устаревших с фронта — это нужно
          для скользящего окна. Стек про «ближайший», deque про «максимум окна».

  - code: multi_source_bfs
    what_it_is: >-
      BFS, стартующий одновременно из всех источников: волна расходится
      от множества точек, каждая клетка получает расстояние до ближайшего
      источника.
    mental_model: >-
      Несколько камней брошены в пруд одновременно. Волны расходятся с
      одной скоростью, и каждая точка воды впервые намокает от ближайшего
      камня. Инициализация очереди всеми источниками сразу — и обычный BFS.
    recognition_cues:
      - "«Расстояние до ближайшего из множества объектов» для каждой клетки."
      - "Одновременное распространение: гниение, пожар, инфекция по шагам."
      - "N запусков BFS от каждого источника напрашиваются, но дорого."
    anti_cues:
      - "Веса рёбер различны — BFS не даст кратчайших путей, нужен Dijkstra."
      - "Источник один — обычный BFS."
    core_invariant: >-
      Очередь в любой момент содержит границу волны: все клетки на
      расстоянии d извлекаются раньше любой клетки на d+1.
    canonical_skeleton: |-
      queue = deque(all_sources)     # все источники с dist = 0
      while queue:
          cell = queue.popleft()
          for nb in neighbors(cell):
              if dist[nb] is None:
                  dist[nb] = dist[cell] + 1
                  queue.append(nb)
    common_mistakes:
      - "Пометка visited при извлечении, а не при добавлении — клетки дублируются в очереди."
      - "Запуск отдельного BFS от каждого источника — O(S·V) вместо O(V)."
      - "Уровневый счётчик шагов сбивается, если время считается по уровням, а не по dist."
    dont_confuse_with:
      - title: Unweighted Shortest Path BFS
        note: >-
          Тот же механизм с одним источником. Multi-source — это BFS от
          «виртуальной вершины», соединённой со всеми источниками.

  - code: top_k_bounded_heap
    what_it_is: >-
      Куча ограниченного размера k: поток элементов проходит через неё,
      в куче выживают только k лучших. O(n log k) вместо полной сортировки.
    mental_model: >-
      Турнирная таблица на k строк. Новый результат сравнивается с худшей
      строкой: либо вытесняет её, либо отбрасывается. Важно: для top-k
      НАИБОЛЬШИХ держат min-heap — худший из лучших всегда на вершине.
    recognition_cues:
      - "«k ближайших / k самых частых / k-й по величине»."
      - "k мало по сравнению с n, полная сортировка избыточна."
      - "Поток/стрим, элементы приходят по одному."
    anti_cues:
      - "k ≈ n — сортировка проще и не медленнее."
      - "Нужен один k-й элемент офлайн — quickselect даёт O(n) среднее."
      - "Скользящая медиана — это two heaps."
    core_invariant: >-
      Куча всегда содержит k лучших из просмотренного префикса потока;
      её вершина — граница отсечения.
    canonical_skeleton: |-
      heap = []                      # min-heap для top-k наибольших
      for x in stream:
          if len(heap) < k:
              heappush(heap, x)
          elif x > heap[0]:
              heapreplace(heap, x)
      # heap = k наибольших, heap[0] — k-й по величине
    common_mistakes:
      - "Max-heap для top-k наибольших: правильный вариант — min-heap размера k."
      - "push без pop — куча растёт до n, выигрыш исчезает."
      - "Сравнение кортежей с несравнимым вторым полем падает в рантайме."
    dont_confuse_with:
      - title: Quickselect / Order Statistics
        note: >-
          Quickselect быстрее офлайн, но требует весь массив в памяти и
          мутирует его. Куча работает на потоке и держит O(k) памяти.
      - title: Two Heaps / Streaming Median
        note: >-
          Медиана требует балансировку двух куч, а не отсечение одной.
