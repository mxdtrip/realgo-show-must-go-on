- code: dp_unbounded_knapsack
  what_it_is: |-
    Каждый тип элемента можно использовать несколько раз.
  mental_model: |-
    Состояния обновляются так, чтобы текущий тип мог участвовать снова; в 1D DP часто идём по сумме вперёд.
  recognition_cues:
  - unlimited coins/items
  - coin change
  - повторное использование разрешено
  anti_cues:
  - Если каждый элемент разрешён только один раз.
  core_invariant: |-
    Прямой проход позволяет текущему предмету использовать уже обновлённое состояние и повториться.
  canonical_skeleton: |-
    dp = [INF]*(amount+1)
    dp[0] = 0
    for coin in coins:
        for s in range(coin, amount+1):
            dp[s] = min(dp[s], dp[s-coin]+1)
  mini_example: |-
    Монету `3` можно использовать для сумм `3`, затем `6`, затем `9`.

