- code: rolling_hash_rabin_karp
  what_it_is: |-
    Подстроку представляем числовым хешем и быстро обновляем его при сдвиге окна.
  mental_model: |-
    Из хеша старого окна удаляем вклад ушедшего символа и добавляем новый, не пересчитывая всю строку.
  recognition_cues:
  - много сравнений подстрок
  - поиск шаблона
  - repeated substring
  - binary search по длине подстроки
  anti_cues:
  - Если нужна абсолютная детерминированность без дополнительной проверки или задача решается проще KMP.
  core_invariant: |-
    Сравнивай компактные отпечатки подстрок, но помни о коллизиях.
  canonical_skeleton: |-
    h = hash(first_window)
    for i in range(k,n):
        h = roll(h, outgoing=s[i-k], incoming=s[i])
        if h == target_hash:
            verify_if_needed(i-k+1)
  mini_example: |-
    Хеш окна `"abc"` обновляется до хеша `"bcd"` без пересчёта всех символов.

