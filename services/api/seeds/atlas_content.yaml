- code: bitmask_state_enumeration
  what_it_is: |-
    Каждый бит числа означает «элемент выбран / не выбран» или другой бинарный признак.
  mental_model: |-
    Маска `mask` кодирует сразу множество флагов. Проверяем, добавляем и удаляем элементы битовыми операциями.
  recognition_cues:
  - маленькое `n`
  - перебор подмножеств
  - набор использованных объектов
  - DP по состояниям
  anti_cues:
  - Если элементов слишком много и `2^n` становится огромным.
  core_invariant: |-
    Один integer может хранить целое подмножество.
  canonical_skeleton: |-
    for mask in range(1<<n):
        for i in range(n):
            if not (mask & (1<<i)):
                nxt = mask | (1<<i)
                relax(mask, nxt, i)
  mini_example: |-
    Для трёх объектов маска `101₂` означает: первый и третий выбраны.

