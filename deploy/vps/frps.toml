# frp server (VPS side). Home's frpc dials in here over the control port and
# registers the realgo-web proxy; frps binds it on the internal docker network as
# frps:8080 (not published), which caddy reverse-proxies.
bindPort = 7000

auth.method = "token"
auth.token = "{{ .Envs.FRP_TOKEN }}"

# Every deployed frpc client already enables TLS. Reject plaintext control
# connections so the shared token is never accepted over an unencrypted link.
transport.tls.force = true

# Restrict which remotePorts a proxy may claim to the ones we actually publish
# (8080 for realgo-web, 8081 for staging, 8091 for repository knowledge and
# 2222 for homeserver-ssh) so a leaked token can't bind arbitrary ports.
allowPorts = [
  { start = 8080, end = 8080 },
  { start = 8081, end = 8081 },
  { start = 8091, end = 8091 },
  { start = 2222, end = 2222 },
]
